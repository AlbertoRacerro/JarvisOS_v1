version: 1
providers:
  fake:
    kind: fake
    enabled: true
    requires_network: false
    base_url: null
    api_key_ref: null
    timeout_seconds: 0
    monthly_token_cap: 0
    monthly_cost_cap_usd: 0
    models:
      fake-deterministic-v1:
        provider_model_name: fake-deterministic-v1
        route_classes: [local:fake]
        max_output_tokens: 256
  local_ollama:
    kind: local
    enabled: true
    requires_network: false
    base_url: null
    api_key_ref: null
    timeout_seconds: 0
    monthly_token_cap: 0
    monthly_cost_cap_usd: 0
    models:
      qwen3:8b:
        provider_model_name: qwen3:8b
        route_classes: [local:fast]
        max_output_tokens: 512
      gemma4:12b-it-qat:
        provider_model_name: gemma4:12b-it-qat
        route_classes: [local:general, local:gemma]
        max_output_tokens: 512
      deepseek-coder-v2:16b:
        provider_model_name: deepseek-coder-v2:16b
        route_classes: [local:coder]
        max_output_tokens: 512
      qwen3-coder:30b:
        provider_model_name: qwen3-coder:30b
        route_classes: [local:coder_heavy]
        max_output_tokens: 512
  scaleway:
    kind: openai_compatible
    enabled: true
    requires_network: true
    base_url: https://api.scaleway.ai/v1
    api_key_ref: env:SCALEWAY_API_KEY
    timeout_seconds: 20
    monthly_token_cap: 500000
    monthly_cost_cap_usd: 0
    models:
      llama-3.1-8b-instruct:
        provider_model_name: llama-3.1-8b-instruct
        route_classes: [external:cheap]
        max_output_tokens: 512
      qwen3-235b-a22b-instruct-2507:
        provider_model_name: qwen3-235b-a22b-instruct-2507
        route_classes: [external:reasoning]
        max_output_tokens: 1024
fallback_chains:
  local:fake: [local:fake]
  local:fast: [local:fast]
  local:general: [local:general]
  local:gemma: [local:gemma]
  local:coder: [local:coder]
  local:coder_heavy: [local:coder_heavy]
  external:cheap: [external:cheap]
  external:reasoning: [external:reasoning]
