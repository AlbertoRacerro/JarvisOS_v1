name: Add bundled 047 registration once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0
      - name: Add explicit bundled registration backend
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/modules/runner/service.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "from app.modules.memory.service import create_calc_parameter_proposals\n",
              "from app.modules.memory.service import create_calc_parameter_proposals\nfrom app.modules.modeling.models import ModelSpecCreate\nfrom app.modules.modeling.service import create_model_spec\n",
          )
          text = text.replace(
              "CALC_V0_IMPLEMENTATION_KIND = \"calc_v0\"\n",
              "CALC_V0_IMPLEMENTATION_KIND = \"calc_v0\"\nBUNDLED_BLUEREV_PROCESS0_LABEL = \"bluerev-geometry-hydraulics-v0-bundled\"\nBUNDLED_BLUEREV_PROCESS0_TITLE = \"BlueRev geometry and hydraulics bundled V0\"\n",
          )
          marker = '''def list_model_implementations(workspace_id: str) -> list[ModelImplementationRead]:
              with open_sqlite_connection() as connection:
                  _require_workspace(connection, workspace_id)
                  rows = connection.execute(
                      """
                      SELECT mv.*, a.sha256 AS script_sha256, a.stored_path AS script_path
                      FROM model_versions mv
                      JOIN artifacts a ON a.id = mv.implementation_artifact_id
                      WHERE mv.workspace_id = ?
                      ORDER BY mv.created_at DESC
                      """,
                      (workspace_id,),
                  ).fetchall()
              return [_model_implementation_from_row(row) for row in rows]
          '''
          addition = marker + '''

          def register_bundled_bluerev_process0(workspace_id: str) -> ModelImplementationRead:
              script_path = _bluerev_process0_script_path()
              contract_path = _bluerev_process0_contract_path()
              contract = json.loads(contract_path.read_text(encoding="utf-8"))
              _, contract_sha256, _ = canonicalize_input_contract(contract)
              script_sha256 = sha256_file(script_path)

              with open_sqlite_connection() as connection:
                  _require_workspace(connection, workspace_id)
                  existing = connection.execute(
                      """
                      SELECT mv.*, a.sha256 AS script_sha256, a.stored_path AS script_path
                      FROM model_versions mv
                      JOIN artifacts a ON a.id = mv.implementation_artifact_id
                      WHERE mv.workspace_id = ?
                        AND mv.version_label = ?
                        AND mv.input_contract_sha256 = ?
                        AND a.sha256 = ?
                      ORDER BY mv.created_at ASC
                      LIMIT 1
                      """,
                      (
                          workspace_id,
                          BUNDLED_BLUEREV_PROCESS0_LABEL,
                          contract_sha256,
                          script_sha256,
                      ),
                  ).fetchone()
                  if existing is not None:
                      return _model_implementation_from_row(existing)
                  model_spec = connection.execute(
                      """
                      SELECT id FROM model_specs
                      WHERE workspace_id = ? AND title = ?
                      ORDER BY created_at ASC
                      LIMIT 1
                      """,
                      (workspace_id, BUNDLED_BLUEREV_PROCESS0_TITLE),
                  ).fetchone()

              if model_spec is None:
                  created_spec = create_model_spec(
                      workspace_id,
                      ModelSpecCreate(
                          title=BUNDLED_BLUEREV_PROCESS0_TITLE,
                          engineering_question=(
                              "Evaluate caller-selected tubular-loop geometry, hydraulics, "
                              "turnover, and pump power without product defaults."
                          ),
                          scope=(
                              "Reviewed 047 forward model; all nine project and operating "
                              "values are supplied per scenario."
                          ),
                      ),
                  )
                  model_spec_id = created_spec.id
              else:
                  model_spec_id = str(model_spec["id"])

              return create_model_implementation(
                  workspace_id,
                  ModelImplementationCreate(
                      model_spec_id=model_spec_id,
                      version_label=BUNDLED_BLUEREV_PROCESS0_LABEL,
                      implementation_kind=CALC_V0_IMPLEMENTATION_KIND,
                      notes="Bundled reviewed 047 forward model with a value-free input contract.",
                      script_text=script_path.read_text(encoding="utf-8"),
                      input_contract=contract,
                  ),
              )
          '''
          if marker not in text:
              raise SystemExit("list implementation marker not found")
          text = text.replace(marker, addition)
          text = text.replace(
              '''def _example_script_path() -> Path:
              return Path(__file__).resolve().parent / "examples" / "batch_growth.py"
          ''',
              '''def _example_script_path() -> Path:
              return Path(__file__).resolve().parent / "examples" / "batch_growth.py"


          def _bluerev_process0_script_path() -> Path:
              return Path(__file__).resolve().parent / "examples" / "bluerev_geometry_hydraulics_v0.py"


          def _bluerev_process0_contract_path() -> Path:
              return (
                  Path(__file__).resolve().parent
                  / "examples"
                  / "bluerev_geometry_hydraulics_v0.contract.json"
              )
          ''',
          )
          path.write_text(text, encoding="utf-8")

          path = Path("backend/app/modules/runner/routes.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    preview_model_bindings,\n    run_runner_job,\n",
              "    preview_model_bindings,\n    register_bundled_bluerev_process0,\n    run_runner_job,\n",
          )
          marker = '''@router.get("/workspaces/{workspace_id}/model-implementations", response_model=list[ModelImplementationRead])
          def list_model_implementations_endpoint(workspace_id: str) -> list[ModelImplementationRead]:
          '''
          addition = '''@router.post(
              "/workspaces/{workspace_id}/bundled-models/bluerev-geometry-hydraulics-v0/register",
              response_model=ModelImplementationRead,
          )
          def register_bundled_bluerev_process0_endpoint(workspace_id: str) -> ModelImplementationRead:
              try:
                  return register_bundled_bluerev_process0(workspace_id)
              except RunnerSafetyError as exc:
                  raise _runner_error(exc) from exc


          ''' + marker
          if marker not in text:
              raise SystemExit("route marker not found")
          path.write_text(text.replace(marker, addition), encoding="utf-8")
          PY

      - name: Add bundled registration tests
        run: |
          cat >> backend/tests/test_model_scenario_dof.py <<'PY'


          def test_bundled_047_registration_is_explicit_idempotent_and_value_free(
              client: TestClient,
          ) -> None:
              before = client.get("/workspaces/bluerev/model-implementations").json()
              assert before == []

              first = client.post(
                  "/workspaces/bluerev/bundled-models/bluerev-geometry-hydraulics-v0/register"
              )
              second = client.post(
                  "/workspaces/bluerev/bundled-models/bluerev-geometry-hydraulics-v0/register"
              )
              assert first.status_code == 200, first.text
              assert second.status_code == 200, second.text
              assert second.json()["id"] == first.json()["id"]
              assert first.json()["version_label"] == "bluerev-geometry-hydraulics-v0-bundled"
              assert len(first.json()["input_contract"]["variables"]) == 9
              forbidden = {"value", "default", "recommended_value", "initial_guess"}
              assert all(
                  not forbidden.intersection(variable)
                  for variable in first.json()["input_contract"]["variables"]
              )

              implementations = client.get(
                  "/workspaces/bluerev/model-implementations"
              ).json()
              assert [item["id"] for item in implementations] == [first.json()["id"]]
          PY

      - name: Add frontend registration action
        run: |
          cat >> frontend/src/api/client.ts <<'TS'

          export function registerBundledBlueRevProcess0(workspaceId: string): Promise<ModelImplementation> {
            return postJson<ModelImplementation>(
              `/workspaces/${workspaceId}/bundled-models/bluerev-geometry-hydraulics-v0/register`
            );
          }
          TS

          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/pages/DomainFoundation.tsx")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    previewModelBindings,\n    runRunnerJob,",
              "    previewModelBindings,\n    registerBundledBlueRevProcess0,\n    runRunnerJob,",
          )
          marker = '''  const onPreviewScenario = () => {
              if (!selectedImplementation) {
                return;
              }
          '''
          addition = '''  const onRegisterBundledModel = () => {
              setScenarioBusy(true);
              setMessage(null);
              registerBundledBlueRevProcess0(workspaceId)
                .then((implementation) => {
                  setImplementationId(implementation.id);
                  return refreshWorkspaceRecords(workspaceId);
                })
                .catch((error: Error) => setMessage(error.message))
                .finally(() => setScenarioBusy(false));
            };

            const onPreviewScenario = () => {
              if (!selectedImplementation) {
                return;
              }
          '''
          if marker not in text:
              raise SystemExit("preview handler marker not found")
          text = text.replace(marker, addition)
          text = text.replace(
              "              busy={scenarioBusy}\n            />",
              "              busy={scenarioBusy}\n              onRegisterBundled={onRegisterBundledModel}\n            />",
          )
          text = text.replace(
              "  busy\n}: {",
              "  busy,\n  onRegisterBundled\n}: {",
          )
          text = text.replace(
              "  busy: boolean;\n}) {",
              "  busy: boolean;\n  onRegisterBundled: () => void;\n}) {",
          )
          text = text.replace(
              '''        {implementations.length === 0 ? (
                  <p>No reviewed model implementation exposes an input contract yet.</p>
                ) : (''',
              '''        {implementations.length === 0 ? (
                  <div className="scenario-empty-state">
                    <p>No reviewed model implementation exposes an input contract yet.</p>
                    <button type="button" disabled={busy} onClick={onRegisterBundled}>
                      Register bundled BlueRev 047 model
                    </button>
                  </div>
                ) : (''',
          )
          path.write_text(text, encoding="utf-8")
          PY

          cat >> frontend/src/styles/global.css <<'CSS'

          .scenario-empty-state {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid #d8dee9;
            border-radius: 6px;
            background: #f8fafc;
          }

          .scenario-empty-state p {
            margin: 0;
          }

          .scenario-empty-state button {
            min-height: 38px;
            padding: 8px 14px;
            border: 1px solid #1d4ed8;
            border-radius: 6px;
            background: #1d4ed8;
            color: #ffffff;
            cursor: pointer;
          }
          CSS

          rm -f reports-071-full-tail.txt .trigger-071-full-diagnostic
          rm .github/workflows/add-071-bundled-registration-once.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate backend style and frontend build
        run: |
          python -m pip install -q ruff
          python -m ruff check --fix backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py
          python -m ruff format backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py
          cd frontend
          npm ci
          npm run build

      - name: Commit explicit registration slice
        run: |
          git config user.name "jarvisos-implementation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/app/modules/runner backend/tests/test_model_scenario_dof.py frontend/src/api/client.ts frontend/src/pages/DomainFoundation.tsx frontend/src/styles/global.css reports-071-full-tail.txt .trigger-071-full-diagnostic .github/workflows/add-071-bundled-registration-once.yml
          git commit -m "Add explicit bundled 047 model registration"
          git push origin HEAD:impl/071-model-scenario-dof
