name: Export confirmed length source

on:
  pull_request:
    types: [synchronize]
    branches: [impl/061b-confirmation-resume]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 161
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage exact source
        run: |
          mkdir -p /tmp/confirmed-length/backend/app/modules/ai
          mkdir -p /tmp/confirmed-length/backend/tests
          cp backend/app/modules/ai/egress_confirmation_core.py /tmp/confirmed-length/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_external_runtime.py /tmp/confirmed-length/backend/app/modules/ai/
          cp backend/tests/test_token_flow_external_runtime_integration.py /tmp/confirmed-length/backend/tests/
      - uses: actions/upload-artifact@v4
        with:
          name: confirmed-length-exact-source
          path: /tmp/confirmed-length
          if-no-files-found: error
          retention-days: 1
