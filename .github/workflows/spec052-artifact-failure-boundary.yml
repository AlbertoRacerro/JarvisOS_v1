name: Spec 052 registered-artifact failure boundary

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Apply exact failure-boundary patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              observed = text.count(old)
              if observed != count:
                  raise SystemExit(f"{path}: expected {count} occurrence(s), found {observed}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          service = "backend/app/modules/bluecad/cad_link.py"
          replace(
              service,
              "    out_dir = candidate_work_dir(workspace_id, candidate_id, 1)\n    try:\n",
              "    out_dir = candidate_work_dir(workspace_id, candidate_id, 1)\n"
              "    spec_artifact_id: str | None = None\n"
              "    report_artifact_id: str | None = None\n"
              "    manifest_artifact_id: str | None = None\n"
              "    glb_artifact_id: str | None = None\n"
              "    attempt_finished = False\n"
              "    try:\n",
          )
          replace(
              service,
              "        manifest_artifact_id = None\n        if result.manifest_path is not None and result.manifest_path.exists():\n",
              "        if result.manifest_path is not None and result.manifest_path.exists():\n",
          )
          replace(
              service,
              "        glb_artifact_id = None\n        glb_path = out_dir / \"model.glb\"\n",
              "        glb_path = out_dir / \"model.glb\"\n",
          )
          replace(
              service,
              "        finish_attempt(\n            attempt_id,\n            proposal_outcome=\"not_applicable\",\n            build_outcome=build_outcome,\n            validation_verdict=verdict,\n            spec_artifact_id=spec_artifact_id,\n            report_artifact_id=report_artifact_id,\n            manifest_artifact_id=manifest_artifact_id,\n            error_detail={\"transformation_version\": TRANSFORMATION_VERSION},\n        )\n        record_validation_evidence(\n            workspace_id,\n            candidate_id,\n            attempt_id,\n            result.report,\n            report_artifact_id=report_artifact_id,\n        )\n        update_candidate_artifacts(\n            candidate_id,\n            spec_artifact_id=spec_artifact_id,\n            glb_artifact_id=glb_artifact_id,\n            report_artifact_id=report_artifact_id,\n        )\n",
              "        finish_attempt(\n"
              "            attempt_id,\n"
              "            proposal_outcome=\"not_applicable\",\n"
              "            build_outcome=build_outcome,\n"
              "            validation_verdict=verdict,\n"
              "            spec_artifact_id=spec_artifact_id,\n"
              "            report_artifact_id=report_artifact_id,\n"
              "            manifest_artifact_id=manifest_artifact_id,\n"
              "            error_detail={\"transformation_version\": TRANSFORMATION_VERSION},\n"
              "        )\n"
              "        attempt_finished = True\n"
              "        update_candidate_artifacts(\n"
              "            candidate_id,\n"
              "            spec_artifact_id=spec_artifact_id,\n"
              "            glb_artifact_id=glb_artifact_id,\n"
              "            report_artifact_id=report_artifact_id,\n"
              "        )\n"
              "        record_validation_evidence(\n"
              "            workspace_id,\n"
              "            candidate_id,\n"
              "            attempt_id,\n"
              "            result.report,\n"
              "            report_artifact_id=report_artifact_id,\n"
              "        )\n",
          )
          replace(
              service,
              "    except Exception as exc:\n        park_candidate(candidate_id, \"cad_link_failed\", notes=f\"cad_link_execution_error={type(exc).__name__}\")\n        _best_effort_cleanup_unregistered(out_dir)\n        raise CadLinkError(\n",
              "    except Exception as exc:\n"
              "        if not attempt_finished:\n"
              "            _best_effort_finish_failed_attempt(\n"
              "                attempt_id,\n"
              "                exc,\n"
              "                spec_artifact_id=spec_artifact_id,\n"
              "                report_artifact_id=report_artifact_id,\n"
              "                manifest_artifact_id=manifest_artifact_id,\n"
              "            )\n"
              "        park_candidate(candidate_id, \"cad_link_failed\", notes=f\"cad_link_execution_error={type(exc).__name__}\")\n"
              "        if all(\n"
              "            artifact_id is None\n"
              "            for artifact_id in (\n"
              "                spec_artifact_id,\n"
              "                report_artifact_id,\n"
              "                manifest_artifact_id,\n"
              "                glb_artifact_id,\n"
              "            )\n"
              "        ):\n"
              "            _best_effort_cleanup_unregistered(out_dir)\n"
              "        raise CadLinkError(\n",
          )
          replace(
              service,
              "def _best_effort_cleanup_unregistered(out_dir: Path) -> None:\n",
              "def _best_effort_finish_failed_attempt(\n"
              "    attempt_id: str,\n"
              "    exc: Exception,\n"
              "    *,\n"
              "    spec_artifact_id: str | None,\n"
              "    report_artifact_id: str | None,\n"
              "    manifest_artifact_id: str | None,\n"
              ") -> None:\n"
              "    try:\n"
              "        finish_attempt(\n"
              "            attempt_id,\n"
              "            proposal_outcome=\"not_applicable\",\n"
              "            build_outcome=\"cad_link_execution_error\",\n"
              "            validation_verdict=\"fail\",\n"
              "            spec_artifact_id=spec_artifact_id,\n"
              "            report_artifact_id=report_artifact_id,\n"
              "            manifest_artifact_id=manifest_artifact_id,\n"
              "            error_detail={\n"
              "                \"transformation_version\": TRANSFORMATION_VERSION,\n"
              "                \"error_type\": type(exc).__name__,\n"
              "            },\n"
              "        )\n"
              "    except Exception:\n"
              "        return\n\n\n"
              "def _best_effort_cleanup_unregistered(out_dir: Path) -> None:\n",
          )

          tests = "backend/tests/test_cad_link_boundaries.py"
          anchor = '''def test_optional_analysis_reuses_existing_stage_without_ai(\n    client: TestClient, monkeypatch: pytest.MonkeyPatch\n) -> None:\n'''
          inserted = '''def test_analysis_failure_preserves_registered_artifacts(\n    client: TestClient, monkeypatch: pytest.MonkeyPatch\n) -> None:\n    source = _source_run(client)\n    analysis = _analysis_spec()\n    preview = _preview(client, source["run_id"], analysis).json()\n\n    from app.modules.bluecad import cad_link\n\n    def fail_stage(*args, **kwargs) -> None:\n        raise RuntimeError("fixture analysis-stage failure")\n\n    monkeypatch.setattr(cad_link, "_run_simulation_stage", fail_stage)\n    response = _execute(client, source["run_id"], preview["preview_digest"], analysis)\n    assert response.status_code == 500\n    assert response.json()["detail"]["code"] == "cad_link_persistence_failed"\n\n    from app.core.database import open_sqlite_connection\n\n    with open_sqlite_connection() as connection:\n        candidate = connection.execute(\n            "SELECT * FROM bluecad_candidates"\n        ).fetchone()\n        attempt = connection.execute(\n            "SELECT * FROM bluecad_attempts"\n        ).fetchone()\n        artifact_rows = connection.execute(\n            "SELECT stored_path FROM artifacts WHERE source_ref = ?",\n            (f"bluecad_candidate:{candidate['id']}:attempt:1",),\n        ).fetchall()\n    assert candidate["status"] == "parked"\n    assert candidate["parked_reason"] == "cad_link_failed"\n    assert candidate["spec_artifact_id"] is not None\n    assert candidate["report_artifact_id"] is not None\n    assert candidate["glb_artifact_id"] is not None\n    assert attempt["finished_at"] is not None\n    assert len(artifact_rows) >= 4\n    assert all(Path(row["stored_path"]).is_file() for row in artifact_rows)\n\n\n'''
          replace(tests, anchor, inserted + anchor)

          Path(".github/workflows/spec052-artifact-failure-boundary.yml").unlink()
          PY
      - name: Commit failure-boundary fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve registered CAD-link artifacts on downstream failure"
          git push origin HEAD:spec/052-cad-link
