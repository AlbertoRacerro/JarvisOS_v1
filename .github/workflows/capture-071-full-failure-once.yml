name: Capture 071 full regression summary once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture full suite summary
        working-directory: backend
        shell: bash
        run: |
          set +e
          python -m pytest -q > ../reports-071-full.txt 2>&1
          status=$?
          tail -n 220 ../reports-071-full.txt > ../reports-071-full-tail.txt
          echo "exit_status=$status" >> ../reports-071-full-tail.txt
          exit 0
      - name: Commit diagnostic
        run: |
          rm -f reports-071-full.txt
          rm .github/workflows/capture-071-full-failure-once.yml
          git config user.name "jarvisos-diagnostic-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports-071-full-tail.txt .github/workflows/capture-071-full-failure-once.yml
          git commit -m "Capture 071 full regression diagnostics"
          git push origin HEAD:impl/071-model-scenario-dof
