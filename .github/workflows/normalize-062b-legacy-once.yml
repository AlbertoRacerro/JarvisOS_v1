name: Normalize 062b legacy evidence once

on:
  push:
    branches:
      - impl/062b-grade-cohorts

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
      - name: Normalize nullable buckets and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/modules/ai/flow_grade_cohorts.py")
          text = path.read_text(encoding="utf-8")
          old = (
              '        all_classes = {str(attempt["execution_class"]) for attempt in attempts}\n'
              '        invoked_classes = {\n'
              '            str(attempt["execution_class"])\n'
              '            for attempt in attempts\n'
              '            if bool(attempt["adapter_invoked"])\n'
              '        }\n'
              '        states = {str(attempt["external_dispatch_state"]) for attempt in attempts}\n'
          )
          new = (
              '        all_classes = {\n'
              '            _bucket(attempt["execution_class"], execution_metrics, "legacy_unknown")\n'
              '            for attempt in attempts\n'
              '        }\n'
              '        invoked_classes = {\n'
              '            _bucket(attempt["execution_class"], execution_metrics, "legacy_unknown")\n'
              '            for attempt in attempts\n'
              '            if bool(attempt["adapter_invoked"])\n'
              '        }\n'
              '        states = {\n'
              '            _bucket(attempt["external_dispatch_state"], dispatch_metrics, "unknown")\n'
              '            for attempt in attempts\n'
              '        }\n'
          )
          if text.count(old) != 1:
              raise SystemExit("flow classification anchor changed")
          text = text.replace(old, new, 1)
          old = (
              '            execution_class = str(attempt["execution_class"])\n'
              '            dispatch_state = str(attempt["external_dispatch_state"])\n'
              '            usage_source = str(attempt["normalized_usage_source"])\n'
              '            accounting_basis = str(attempt["accounting_basis"])\n'
          )
          new = (
              '            execution_class = _bucket(\n'
              '                attempt["execution_class"], execution_metrics, "legacy_unknown"\n'
              '            )\n'
              '            dispatch_state = _bucket(\n'
              '                attempt["external_dispatch_state"], dispatch_metrics, "unknown"\n'
              '            )\n'
              '            usage_source = _bucket(\n'
              '                attempt["normalized_usage_source"], usage_metrics, "legacy_unknown"\n'
              '            )\n'
              '            accounting_basis = _bucket(\n'
              '                attempt["accounting_basis"], accounting_metrics, "legacy_unknown"\n'
              '            )\n'
          )
          if text.count(old) != 1:
              raise SystemExit("attempt bucket anchor changed")
          text = text.replace(old, new, 1)
          old = '\ndef _increment(\n'
          new = (
              '\ndef _bucket(\n'
              '    value: object,\n'
              '    allowed: dict[str, object],\n'
              '    fallback: str,\n'
              ') -> str:\n'
              '    key = str(value) if value is not None else fallback\n'
              '    return key if key in allowed else fallback\n\n\n'
              'def _increment(\n'
          )
          if text.count(old) != 1:
              raise SystemExit("helper anchor changed")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/normalize-062b-legacy-once.yml").unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Normalize legacy cohort evidence"
          git push origin HEAD:impl/062b-grade-cohorts
