name: Diagnose spec 072 Pytest failure

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Capture first topology failure
        shell: bash
        run: |
          set +e
          cd backend
          python -m pytest -q -x tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py > ../docs/specs/.tmp-072-pytest.log 2>&1
          rc=$?
          cd ..
          printf '\nexit_code=%s\n' "$rc" >> docs/specs/.tmp-072-pytest.log
          rm .github/workflows/diagnose-072-pytest.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f docs/specs/.tmp-072-pytest.log
          git add .github/workflows/diagnose-072-pytest.yml
          git commit -m 'Capture spec 072 Pytest failure'
          git push origin HEAD:spec/072-process-topology
