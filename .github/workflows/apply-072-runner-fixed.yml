name: Apply corrected spec 072 runner patch

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - name: Correct quoting and apply patch
        shell: bash
        run: |
          git show f13127e0d6623ab948db449fe5de8707b0b93ead:scripts/apply_072_runner_patch.py > /tmp/apply_072_runner_patch.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply_072_runner_patch.py')
          text = path.read_text(encoding='utf-8')
          old_open = 'registration = """\n\n\ndef register_bundled_bluerev_topology_m1'
          new_open = "registration = '''\n\n\ndef register_bundled_bluerev_topology_m1"
          if text.count(old_open) != 1:
              raise SystemExit(f'opening delimiter matches: {text.count(old_open)}')
          text = text.replace(old_open, new_open, 1)
          old_close = '    )\n"""\nreplace_once(\n    service,\n    "\\n\\ndef get_model_implementation'
          new_close = "    )\n'''\nreplace_once(\n    service,\n    \"\\n\\ndef get_model_implementation"
          if text.count(old_close) != 1:
              raise SystemExit(f'closing delimiter matches: {text.count(old_close)}')
          path.write_text(text.replace(old_close, new_close, 1), encoding='utf-8')
          PY
          python /tmp/apply_072_runner_patch.py
          rm .github/workflows/apply-072-runner-fixed.yml docs/specs/.tmp-072-patch.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/modules/runner/service.py backend/app/modules/runner/safety.py backend/app/modules/runner/routes.py backend/tests/test_bluerev_process_topology_m1_runner.py .github/workflows/apply-072-runner-fixed.yml
          git add -u docs/specs/.tmp-072-patch.log
          git commit -m 'Integrate BlueRev topology M1 runner'
          git push origin HEAD:spec/072-process-topology
