name: Temporary WP1 exact-head gate and push

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  gate-and-push:
    if: github.event.pull_request.head.ref == 'tmp/wp1-source-export'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout control payload
        uses: actions/checkout@v4
        with:
          ref: tmp/wp1-source-export
          path: control
          fetch-depth: 1

      - name: Checkout exact PR 134 head
        uses: actions/checkout@v4
        with:
          ref: e8afe90ed10523c2adc775bdaa1b8ae559f69254
          path: target
          fetch-depth: 1

      - name: Reconstruct, repair, and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat control/.github/wp1-patch/part*.b64 | tr -d '\n\r' | base64 -d > /tmp/wp1.patch
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/wp1.patch')
          data = path.read_bytes()
          replacements = [
              (
                  b'@@ -440,6 +497,9 @@ def _terminal_outcome(\n',
                  b'@@ -440,6 +497,9 @@ def _create_confirmation_job(\n \n def _terminal_outcome(\n',
              ),
              (b'persisted_tickket_id', b'persisted_ticket_id'),
              (
                  b'+        (persisted_ticket_id,),\n    ).fetchone()\n',
                  b'+        (persisted_ticket_id,),\n     ).fetchone()\n',
              ),
          ]
          for old, new in replacements:
              count = data.count(old)
              if count != 1:
                  raise SystemExit(f'patch repair expected exactly one match, found {count}: {old!r}')
              data = data.replace(old, new, 1)
          path.write_bytes(data)
          PY
          echo 'f390bd4ae48e08e411964a8843e6f1c3742e7dd40af522034b7d31af97d3ad5f  /tmp/wp1.patch' | sha256sum -c -
          test "$(wc -c < /tmp/wp1.patch)" = '59589'
          cd target
          test "$(git rev-parse HEAD)" = 'e8afe90ed10523c2adc775bdaa1b8ae559f69254'
          test "$(git rev-parse HEAD^{tree})" = '27b1c89ccf495882af030563145e73c513dc321b'
          git apply --check /tmp/wp1.patch
          git apply /tmp/wp1.patch
          git diff --check
          (git diff --name-only; git ls-files --others --exclude-standard) | sort > /tmp/actual-paths
          cat > /tmp/expected-paths <<'EOF'
          backend/app/modules/ai/egress_confirmation.py
          backend/app/modules/ai/token_flow_service.py
          backend/tests/test_ai_egress_confirmation.py
          backend/tests/test_ai_egress_confirmation_metadata.py
          backend/tests/test_ai_scaleway_token_flow.py
          backend/tests/test_ai_task_endpoint.py
          docs/specs/061a-token-flow-core-0.md
          EOF
          diff -u /tmp/expected-paths /tmp/actual-paths

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            target/backend/requirements.txt
            target/backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: target/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Spec status self-test
        working-directory: target
        run: python scripts/check_spec_status.py --self-test

      - name: STATUS authority gate
        working-directory: target
        run: python scripts/check_spec_status.py

      - name: Cheap review self-test
        working-directory: target
        run: python scripts/cheap_review.py --self-test

      - name: Manual review self-test
        working-directory: target
        run: python scripts/manual_review.py --self-test

      - name: Ruff
        working-directory: target/backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Full backend pytest
        working-directory: target/backend
        run: python -m pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: target/frontend/package-lock.json

      - name: Frontend production build
        working-directory: target/frontend
        run: |
          npm ci
          npm run build

      - name: Commit and fast-forward PR 134 branch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin spec/061-token-flow-implementation
          test "$(git rev-parse FETCH_HEAD)" = 'e8afe90ed10523c2adc775bdaa1b8ae559f69254'
          git diff --check
          git add \
            backend/app/modules/ai/egress_confirmation.py \
            backend/app/modules/ai/token_flow_service.py \
            backend/tests/test_ai_egress_confirmation.py \
            backend/tests/test_ai_egress_confirmation_metadata.py \
            backend/tests/test_ai_scaleway_token_flow.py \
            backend/tests/test_ai_task_endpoint.py \
            docs/specs/061a-token-flow-core-0.md
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Close canonical confirmation flow execution'
          git push origin HEAD:spec/061-token-flow-implementation
          git rev-parse HEAD | tee "$RUNNER_TEMP/wp1-new-head.txt"

      - name: Upload WP1 gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp1-exact-head-gate
          path: ${{ runner.temp }}/wp1-new-head.txt
          if-no-files-found: warn
          retention-days: 7
