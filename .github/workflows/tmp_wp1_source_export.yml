name: Temporary WP1 exact-head gate and push

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  gate-and-push:
    if: github.event.pull_request.head.ref == 'tmp/wp1-source-export'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout control payload
        uses: actions/checkout@v4
        with:
          ref: tmp/wp1-source-export
          path: control
          fetch-depth: 1

      - name: Checkout exact PR 134 head
        uses: actions/checkout@v4
        with:
          ref: e8afe90ed10523c2adc775bdaa1b8ae559f69254
          path: target
          fetch-depth: 1

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat control/.github/wp1-patch/part*.b64 | tr -d '\n\r' | base64 -d > /tmp/wp1.patch
          echo 'f390bd4ae48e08e411964a8843e6f1c3742e7dd40af522034b7d31af97d3ad5f  /tmp/wp1.patch' | sha256sum -c -
          cd target
          test "$(git rev-parse HEAD)" = 'e8afe90ed10523c2adc775bdaa1b8ae559f69254'
          test "$(git rev-parse HEAD^{tree})" = '27b1c89ccf495882af030563145e73c513dc321b'
          git apply --check /tmp/wp1.patch
          git apply /tmp/wp1.patch
          git diff --check
          git diff --name-only | sort > /tmp/actual-paths
          cat > /tmp/expected-paths <<'EOF'
          backend/app/modules/ai/egress_confirmation.py
          backend/app/modules/ai/token_flow_service.py
          backend/tests/test_ai_egress_confirmation.py
          backend/tests/test_ai_egress_confirmation_metadata.py
          backend/tests/test_ai_scaleway_token_flow.py
          backend/tests/test_ai_task_endpoint.py
          docs/specs/061a-token-flow-core-0.md
          EOF
          diff -u /tmp/expected-paths /tmp/actual-paths

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            target/backend/requirements.txt
            target/backend/requirements-dev.txt

      - name: Install Python dependencies
        working-directory: target/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Governance and license gates
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_spec_status.py --self-test
          python scripts/check_spec_status.py
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r'^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)')
          paths = list(Path('backend/app').rglob('*.py'))
          src_root = Path('frontend/src')
          if src_root.exists():
              paths.extend(path for path in src_root.rglob('*') if path.suffix in {'.ts', '.tsx'})
          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding='utf-8').splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f'{path}:{lineno}: {line.strip()}')
          if violations:
              print('\n'.join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: target/backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Full backend pytest
        working-directory: target/backend
        run: python -m pytest -q

      - name: BLUECAD bounded canary
        working-directory: target/backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -euo pipefail
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py
          test "$SECONDS" -le 240

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: target/frontend/package-lock.json

      - name: Frontend production build
        working-directory: target/frontend
        run: |
          npm ci
          npm run build

      - name: Install distro-pinned BLUECAD tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gmsh calculix-ccx

      - name: Build external hash-pinned BLUECAD registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          GMSH_BIN="$(command -v gmsh)"
          CCX_BIN="$(command -v ccx || true)"
          if [ -z "$CCX_BIN" ]; then
            CCX_BIN="$(dpkg -L calculix-ccx | awk '/\/ccx([_0-9.]*)?$/ {print; exit}')"
          fi
          test -x "$GMSH_BIN"
          test -x "$CCX_BIN"
          export GMSH_BIN CCX_BIN
          export GMSH_VERSION="$(dpkg-query -W -f='${Version}' gmsh)"
          export CCX_VERSION="$(dpkg-query -W -f='${Version}' calculix-ccx)"
          export REGISTRY_PATH="$RUNNER_TEMP/bluecad-tools.yaml"
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path
          import yaml

          def digest(path: str) -> str:
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          registry_path = Path(os.environ['REGISTRY_PATH'])
          gmsh = os.environ['GMSH_BIN']
          ccx = os.environ['CCX_BIN']
          health_deck = registry_path.with_name('health.inp')
          health_deck.write_text(
              '''*HEADING
          BLUECAD CalculiX registry health check
          *NODE
          1,0,0,0
          2,1,0,0
          3,0,1,0
          4,0,0,1
          *ELEMENT, TYPE=C3D4, ELSET=BODY
          1,1,2,3,4
          *MATERIAL, NAME=STEEL
          *ELASTIC
          200000.,0.3
          *SOLID SECTION, ELSET=BODY, MATERIAL=STEEL
          *BOUNDARY
          1,1,3,0
          2,2,3,0
          3,3,3,0
          *STEP
          *STATIC
          *CLOAD
          4,1,1.
          *NODE FILE
          U
          *EL FILE
          S
          *END STEP
          ''',
              encoding='utf-8',
          )
          payload = {
              'registry_version': 'bluecad_tool_registry_v0_1',
              'tools': [
                  {
                      'id': 'gmsh', 'kind': 'mesher', 'integration_mode': 'subprocess',
                      'version_pin': os.environ['GMSH_VERSION'],
                      'license': {'spdx': 'GPL-2.0-or-later', 'boundary': 'C', 'verified_date': '2026-07-10'},
                      'enabled': True, 'entrypoint': gmsh, 'binary_sha256': digest(gmsh),
                      'provenance_url': 'https://packages.ubuntu.com/noble/gmsh',
                      'capabilities': ['step_import', 'tet_mesh', 'physical_groups', 'inp_export'],
                      'health_check': f'{gmsh} -version',
                  },
                  {
                      'id': 'calculix', 'kind': 'fem_solver', 'integration_mode': 'subprocess',
                      'version_pin': os.environ['CCX_VERSION'],
                      'license': {'spdx': 'GPL-2.0', 'boundary': 'C', 'verified_date': '2026-07-10'},
                      'enabled': True, 'entrypoint': ccx, 'binary_sha256': digest(ccx),
                      'provenance_url': 'https://packages.ubuntu.com/noble/calculix-ccx',
                      'capabilities': ['static'], 'health_check': f'{ccx} health',
                  },
              ],
          }
          registry_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding='utf-8')
          PY
          echo "path=$REGISTRY_PATH" >> "$GITHUB_OUTPUT"

      - name: BLUECAD strict real-tool proof
        working-directory: target/backend
        env:
          JARVISOS_BLUECAD_TOOL_REGISTRY: ${{ steps.registry.outputs.path }}
          JARVISOS_BLUECAD_PROOF_JSON: ${{ runner.temp }}/bluecad-alpha-proof.json
          JARVISOS_BLUECAD_FEM_BATTERY_JSON: ${{ runner.temp }}/bluecad-fem-verification-battery.json
          JARVISOS_BLUECAD_PROOF_DEBUG_DIR: ${{ runner.temp }}/bluecad-proof-debug
          JARVISOS_BLUECAD_PROOF_GIT_SHA: e8afe90ed10523c2adc775bdaa1b8ae559f69254
        run: |
          python -m app.modules.bluecad.registry check
          python -m pytest -q \
            tests/bluecad/test_alpha_real_tools.py \
            tests/bluecad/test_fem_verification_real_tools.py \
            tests/bluecad/test_fem_verification_battery_real_tools.py \
            --require-bluecad-real-tools

      - name: Commit and fast-forward PR 134 branch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin spec/061-token-flow-implementation
          test "$(git rev-parse FETCH_HEAD)" = 'e8afe90ed10523c2adc775bdaa1b8ae559f69254'
          git diff --check
          git add \
            backend/app/modules/ai/egress_confirmation.py \
            backend/app/modules/ai/token_flow_service.py \
            backend/tests/test_ai_egress_confirmation.py \
            backend/tests/test_ai_egress_confirmation_metadata.py \
            backend/tests/test_ai_scaleway_token_flow.py \
            backend/tests/test_ai_task_endpoint.py \
            docs/specs/061a-token-flow-core-0.md
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Close canonical confirmation flow execution'
          git push origin HEAD:spec/061-token-flow-implementation
          git rev-parse HEAD | tee "$RUNNER_TEMP/wp1-new-head.txt"

      - name: Upload WP1 gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp1-exact-head-gate
          path: |
            ${{ runner.temp }}/wp1-new-head.txt
            ${{ runner.temp }}/bluecad-property-canary-actual.json
            ${{ runner.temp }}/bluecad-alpha-proof.json
            ${{ runner.temp }}/bluecad-fem-verification-battery.json
            ${{ runner.temp }}/bluecad-proof-debug
          if-no-files-found: warn
          retention-days: 7
