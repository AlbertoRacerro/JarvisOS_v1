name: Apply 061a Final Boundaries

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Apply and verify final boundary fixes
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python scripts/fix_061a_final_boundaries.py
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
          cd backend
          python -m ruff check \
            app/modules/ai/egress_confirmation.py \
            app/modules/ai/models.py \
            app/modules/ai/token_flow_service.py \
            tests/test_ai_egress_confirmation.py \
            tests/test_ai_task_endpoint.py
          python -m pytest -q \
            tests/test_ai_egress_confirmation.py \
            tests/test_ai_task_endpoint.py \
            tests/test_token_flow_service.py \
            tests/test_token_flow_execution_wiring.py
          cd ..
          rm scripts/fix_061a_final_boundaries.py
          rm .github/workflows/apply-061a-final-boundaries.yml
          rm .github/workflows/diagnose-061a-symbols.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix final 061a confirmation and task boundaries"
          git push origin "HEAD:$TARGET_BRANCH"
