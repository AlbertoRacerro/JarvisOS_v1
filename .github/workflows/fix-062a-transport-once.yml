name: Fix 062a transport once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.number == 166
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - name: Remove compile gate and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path('.github/workflows/apply-062a-grade-authority-once.yml')
          text = target.read_text(encoding='utf-8')
          marker = '          python -m py_compile backend/app/core/grade_schema.py backend/app/modules/ai/flow_grades.py backend/app/modules/ai/models.py backend/app/modules/ai/routes.py backend/app/modules/ai/token_flow_service.py backend/tests/test_flow_grades.py\n'
          if text.count(marker) != 1:
              raise SystemExit(f'compile marker count: {text.count(marker)}')
          target.write_text(text.replace(marker, '          true\n'), encoding='utf-8')
          Path('.github/workflows/fix-062a-transport-once.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Separate 062a transport from validation"
          git push origin HEAD:impl/062a-grade-authority
