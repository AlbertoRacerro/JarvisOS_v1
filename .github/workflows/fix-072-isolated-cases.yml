name: Isolate spec 072 zero-bend test cases

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Isolate zero-bend failures
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/tests/test_bluerev_process_topology_m1.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
            '({"branch_bend_count": (0, "1"), "branch_bend_centerline_radius": (1.0, "mm")}, "branch_bend_centerline_radius"),': '({"branch_bend_count": (0, "1"), "branch_illuminated_bend_count": (0, "1"), "branch_bend_centerline_radius": (1.0, "mm"), "branch_bend_angle": (0.0, "deg"), "branch_bend_loss_coefficient_per_bend": (0.0, "1")}, "branch_bend_centerline_radius"),',
            '({"branch_bend_count": (0, "1"), "branch_bend_loss_coefficient_per_bend": (0.1, "1")}, "branch_bend_loss_coefficient_per_bend"),': '({"branch_bend_count": (0, "1"), "branch_illuminated_bend_count": (0, "1"), "branch_bend_centerline_radius": (0.0, "mm"), "branch_bend_angle": (0.0, "deg"), "branch_bend_loss_coefficient_per_bend": (0.1, "1")}, "branch_bend_loss_coefficient_per_bend"),',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected one match, found {text.count(old)}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Verify targeted suite and retain only useful diagnostics
        shell: bash
        run: |
          set +e
          cd backend
          python -m ruff check tests/test_bluerev_process_topology_m1.py --fix
          python -m pytest -q -x tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py > ../docs/specs/.tmp-072-pytest-next.log 2>&1
          rc=$?
          cd ..
          rm -f docs/specs/.tmp-072-pytest.log
          if [ "$rc" -eq 0 ]; then
            rm -f docs/specs/.tmp-072-pytest-next.log
          else
            printf '\nexit_code=%s\n' "$rc" >> docs/specs/.tmp-072-pytest-next.log
          fi
          rm .github/workflows/fix-072-isolated-cases.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/tests/test_bluerev_process_topology_m1.py .github/workflows/fix-072-isolated-cases.yml
          git add -u docs/specs/.tmp-072-pytest.log
          if [ -f docs/specs/.tmp-072-pytest-next.log ]; then git add -f docs/specs/.tmp-072-pytest-next.log; fi
          git commit -m 'Isolate spec 072 zero-bend tests'
          git push origin HEAD:spec/072-process-topology
