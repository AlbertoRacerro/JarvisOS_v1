name: Apply Token Flow Fixture Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Apply fixture corrections and restore clean tree
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
          CLEAN_CI_COMMIT: 22109b4e5aad2006c3cbdef1a6b15e2b72481817
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python scripts/fix_external_dispatch_test_fixtures.py
          git checkout "$CLEAN_CI_COMMIT" -- .github/workflows/ci.yml
          rm scripts/fix_external_dispatch_test_fixtures.py
          rm .github/workflows/apply-token-flow-fixture-fix.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Align external dispatch test fixtures"
          git push origin "HEAD:$TARGET_BRANCH"
