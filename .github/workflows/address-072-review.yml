name: Address spec 072 Codex review findings

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  address:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply review fixes
        run: python scripts/address_072_review.py
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run targeted verification
        shell: bash
        run: |
          cd backend
          python -m ruff check app/modules/runner tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py tests/test_python_runner_calc_v0.py --fix
          python -m pytest -q tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py tests/test_python_runner_calc_v0.py
      - name: Commit verified fixes and remove patch machinery
        shell: bash
        run: |
          rm .github/workflows/address-072-review.yml scripts/address_072_review.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/modules/runner/examples/bluerev_process_topology_m1_v0.py backend/app/modules/runner/service.py backend/tests/test_bluerev_process_topology_m1.py backend/tests/test_bluerev_process_topology_m1_runner.py .github/workflows/address-072-review.yml scripts/address_072_review.py
          git commit -m 'Address spec 072 Codex review findings'
          git push origin HEAD:spec/072-process-topology
