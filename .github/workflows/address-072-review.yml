name: Address spec 072 Codex review findings

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  address:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply and verify review fixes
        shell: bash
        run: |
          set +e
          : > /tmp/address-072.log
          python scripts/address_072_review.py >> /tmp/address-072.log 2>&1
          rc=$?
          if [ "$rc" -eq 0 ]; then
            python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt >> /tmp/address-072.log 2>&1
            rc=$?
          fi
          if [ "$rc" -eq 0 ]; then
            cd backend
            python -m ruff check app/modules/runner tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py tests/test_python_runner_calc_v0.py --fix >> /tmp/address-072.log 2>&1
            rc=$?
            if [ "$rc" -eq 0 ]; then
              python -m pytest -q -x tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py tests/test_python_runner_calc_v0.py >> /tmp/address-072.log 2>&1
              rc=$?
            fi
            cd ..
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$rc" -eq 0 ]; then
            rm .github/workflows/address-072-review.yml scripts/address_072_review.py
            git add backend/app/modules/runner/examples/bluerev_process_topology_m1_v0.py backend/app/modules/runner/service.py backend/tests/test_bluerev_process_topology_m1.py backend/tests/test_bluerev_process_topology_m1_runner.py .github/workflows/address-072-review.yml scripts/address_072_review.py
            git commit -m 'Address spec 072 Codex review findings'
          else
            git reset --hard HEAD
            cp /tmp/address-072.log docs/specs/.tmp-072-review-fix.log
            printf '\nexit_code=%s\n' "$rc" >> docs/specs/.tmp-072-review-fix.log
            rm .github/workflows/address-072-review.yml
            git add -f docs/specs/.tmp-072-review-fix.log
            git add .github/workflows/address-072-review.yml
            git commit -m 'Capture spec 072 review fix failure'
          fi
          git push origin HEAD:spec/072-process-topology
