name: Apply Token Flow Status Split

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply bounded spec registry split
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python scripts/split_token_flow_status.py
          python scripts/check_spec_status.py --self-test
          rm scripts/split_token_flow_status.py
          rm .github/workflows/apply-token-flow-status-split.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Split token-flow core from continuation"
          git push origin "HEAD:$TARGET_BRANCH"
