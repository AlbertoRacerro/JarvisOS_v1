name: One-shot 059b status sync

on:
  push:
    branches: [docs/reconcile-roadmap-061-067]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/reconcile-roadmap-061-067
          fetch-depth: 2

      - name: Mark merged 059b state
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/STATUS.md")
          text = path.read_text(encoding="utf-8")
          replacements = (
              (
                  """2. `059b` has completed full-spec reconciliation and is the next implementation
   slice; policy-autopilot runtime and real project-data external egress remain
   inactive until its implementation PR is reviewed and merged.""",
                  """2. `059b` policy-autopilot and execution enforcement merged in PR #119. Keep
   real project-data external egress disabled by default; any activation must use the
   merged server-owned policy, sensitivity, sanitization, budget, confirmation, and
   audit boundaries.""",
                  "priority",
              ),
              (
                  """| 059b | ready | — | IP-EGRESS-1B: policy autopilot and execution enforcement | 059a | The full implementation contract and binding clarification are reconciled for prompt/manual-context authority, automatic sanitizer provenance, exact per-binding packets/decisions, ticket-ID confirmation, atomic projected-budget reservation, sampled audit, and fallback enforcement; implementation may start, but runtime activation remains blocked until the implementation PR is reviewed and merged. |""",
                  """| 059b | merged | [#119](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/119) | IP-EGRESS-1B: policy autopilot and execution enforcement | 059a | Prompt/manual-context authority, automatic sanitizer provenance, exact per-binding packets/decisions, ticket-ID confirmation, atomic projected-budget reservation, sampled audit, fallback enforcement, and usage-source-bound reconciliation merged in #119. |""",
                  "registry row",
              ),
          )
          for old, new, label in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"unexpected {label} source count: {text.count(old)}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY
          git diff --check
          git config user.name "JarvisOS Maintainer Actuator"
          git config user.email "actions@users.noreply.github.com"
          git add docs/specs/STATUS.md
          git commit -m "Mark 059b merged in spec registry"
          git push origin HEAD:docs/reconcile-roadmap-061-067
