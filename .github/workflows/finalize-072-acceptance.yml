name: Finalize spec 072 acceptance coverage

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/finalize_072_acceptance.py
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run final targeted acceptance
        shell: bash
        run: |
          cd backend
          python -m ruff check app/modules/runner tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py --fix
          python -m pytest -q tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py
      - name: Commit verified acceptance and remove patch machinery
        shell: bash
        run: |
          rm .github/workflows/finalize-072-acceptance.yml scripts/finalize_072_acceptance.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/modules/runner/examples/bluerev_process_topology_m1_v0.py backend/tests/test_bluerev_process_topology_m1.py backend/tests/test_bluerev_process_topology_m1_runner.py schemas/bluerev_process_topology_m1_v0_1.schema.json .github/workflows/finalize-072-acceptance.yml scripts/finalize_072_acceptance.py
          git commit -m 'Finalize spec 072 acceptance coverage'
          git push origin HEAD:spec/072-process-topology
