name: Diagnose 062a transport

on:
  push:
    branches:
      - impl/062a-grade-authority

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - name: Run payload in temporary copy
        shell: bash
        run: |
          cp -a . /tmp/062a-diagnose
          cd /tmp/062a-diagnose
          python - <<'PY'
          from pathlib import Path
          import traceback

          output = Path('/tmp/062a-transport-error.txt')
          transport = Path('.github/workflows/apply-062a-grade-authority-once.yml')
          try:
              text = transport.read_text(encoding='utf-8')
              start_marker = "          python - <<'PY'\n"
              end_marker = "          PY\n"
              start = text.index(start_marker) + len(start_marker)
              end = text.index(end_marker, start)
              lines = text[start:end].splitlines()
              script = '\n'.join(
                  line[10:] if line.startswith('          ') else line
                  for line in lines
              )
              exec(compile(script, str(transport), 'exec'), {'__name__': '__main__'})
          except Exception:
              output.write_text(traceback.format_exc(), encoding='utf-8')
          else:
              output.write_text('payload completed without Python exception', encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: 062a-transport-error
          path: /tmp/062a-transport-error.txt
          if-no-files-found: error
          retention-days: 1
