name: Diagnose 051 refinement

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run refinement diagnostics
        id: diagnose
        continue-on-error: true
        run: |
          set +e
          {
            pip install -q -r backend/requirements.txt ruff
            echo '--- ruff version ---'
            ruff --version
            echo '--- format ---'
            ruff format backend/app/modules/flowsheet backend/app/modules/memory backend/app/modules/modeling backend/tests/test_flowsheet_stale_propagation.py
            echo '--- check fix ---'
            ruff check --fix backend/app/modules/flowsheet backend/app/modules/memory backend/app/modules/modeling backend/tests/test_flowsheet_stale_propagation.py
            echo '--- compileall ---'
            python -m compileall -q backend/app
          } > /tmp/refine-051.log 2>&1
          code=$?
          echo "exit_code=$code" >> /tmp/refine-051.log
          exit $code
      - name: Upload refinement log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine-051-log
          path: /tmp/refine-051.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce diagnostic result
        if: steps.diagnose.outcome != 'success'
        run: exit 1
