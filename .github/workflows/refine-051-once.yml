name: Diagnose reviewed 051 refinements

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply reviewed refinements in workspace
        run: |
          python - <<'PY'
          from pathlib import Path

          freshness = Path('backend/app/modules/flowsheet/freshness.py')
          text = freshness.read_text(encoding='utf-8')
          anchor = '    FlowsheetFreshnessMarkRead,\n    FlowsheetNodeFreshnessRead,\n'
          if text.count(anchor) != 1:
              raise SystemExit(f'freshness import anchor count={text.count(anchor)}')
          text = text.replace(anchor, '    FlowsheetFreshnessMarkRead,\n    FlowsheetGraphRead,\n    FlowsheetNodeFreshnessRead,\n')
          start = text.index('def _graph_digest(')
          end = text.index('\ndef _parse_path', start)
          replacement = '''def _graph_digest(graph: FlowsheetGraphRead) -> str:
              payload = {
                  "nodes": sorted(node.ref for node in graph.nodes),
                  "edges": [
                      {
                          "upstream_ref": edge.upstream_ref,
                          "downstream_ref": edge.downstream_ref,
                          "relation": edge.relation,
                          "edge_class": edge.edge_class,
                          "authorities": sorted(edge.authorities),
                          "source_fields": sorted(edge.source_fields),
                      }
                      for edge in graph.edges
                  ],
                  "unresolved_references": [
                      {
                          "owner_ref": item.owner_ref,
                          "source_field": item.source_field,
                          "code": item.code,
                          "raw_ref": item.raw_ref,
                      }
                      for item in graph.diagnostics.unresolved_references
                  ],
              }
              return _sha256_prefixed(_canonical_json(payload))
          
          '''
          freshness.write_text(text[:start] + replacement + text[end + 1:], encoding='utf-8')

          memory = Path('backend/app/modules/memory/service.py')
          text = memory.read_text(encoding='utf-8')
          start = text.rindex('                validate_parameter_replacement_proposal(')
          end = text.index('\n\n                now = utc_now()', start)
          replacement = '''                already = connection.execute(
                      "SELECT id FROM freshness_invalidations WHERE superseded_parameter_id = ?",
                      (superseded_id,),
                  ).fetchone()
                  if already is not None:
                      raise ParameterReplacementError(
                          "parameter_already_replaced",
                          "The accepted Parameter already has an accepted replacement.",
                      )
                  validate_parameter_replacement_proposal(
                      connection,
                      workspace_id=str(replacement["workspace_id"]),
                      supersedes_parameter_id=superseded_id,
                      replacement_parameter_id=record_id,
                      unit=str(replacement["unit"]),
                      value=None if replacement["value"] is None else str(replacement["value"]),
                  )'''
          memory.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY
      - name: Capture exact formatter and lint output
        id: diagnose
        continue-on-error: true
        run: |
          set +e
          {
            pip install -q -r backend/requirements.txt ruff
            echo '--- ruff version ---'
            ruff --version
            echo '--- format ---'
            ruff format backend/app/modules/flowsheet backend/app/modules/memory backend/app/modules/modeling backend/tests/test_flowsheet_stale_propagation.py
            echo '--- check fix ---'
            ruff check --fix backend/app/modules/flowsheet backend/app/modules/memory backend/app/modules/modeling backend/tests/test_flowsheet_stale_propagation.py
            echo '--- check final ---'
            ruff check backend/app/modules/flowsheet backend/app/modules/memory backend/app/modules/modeling backend/tests/test_flowsheet_stale_propagation.py
            echo '--- compileall ---'
            python -m compileall -q backend/app
          } > /tmp/reviewed-refine-051.log 2>&1
          code=$?
          echo "exit_code=$code" >> /tmp/reviewed-refine-051.log
          exit $code
      - name: Upload reviewed refinement log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewed-refine-051-log
          path: /tmp/reviewed-refine-051.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce diagnostic result
        if: steps.diagnose.outcome != 'success'
        run: exit 1
