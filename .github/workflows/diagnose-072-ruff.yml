name: Diagnose spec 072 Ruff failures

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install ruff
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          cd backend
          python -m ruff check app tests > ../docs/specs/.tmp-072-ruff.log 2>&1
          rc=$?
          cd ..
          printf '\nexit_code=%s\n' "$rc" >> docs/specs/.tmp-072-ruff.log
          rm .github/workflows/diagnose-072-ruff.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f docs/specs/.tmp-072-ruff.log
          git add .github/workflows/diagnose-072-ruff.yml
          git commit -m 'Capture spec 072 Ruff failures'
          git push origin HEAD:spec/072-process-topology
