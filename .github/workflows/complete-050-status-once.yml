name: Complete 050 status once

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  reconcile:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 156 &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/050-flowsheet-dag
          fetch-depth: 0
      - name: Link 050 implementation and remove workflow
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 050 | ready | — | FLOWSHEET-1 dependency DAG | 047, 048, 049 | Materialize an inspectable graph from existing provenance without a recompute engine; normalize legacy FK/source forms at read time and own the shared `<kind>:<id>` resolver. |'
          new = '| 050 | in_review | [#156](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/156) | FLOWSHEET-1 dependency DAG | 047, 048, 049 | Materialize an inspectable graph from existing provenance without a recompute engine; normalize legacy FK/source forms at read time and own the shared `<kind>:<id>` resolver. |'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one 050 ready row, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/complete-050-status-once.yml').unlink()
      - name: Commit linked status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/STATUS.md .github/workflows/complete-050-status-once.yml
          git commit -m "Link spec 050 implementation"
          git push origin HEAD:impl/050-flowsheet-dag
