name: Capture remaining 071 failures once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture targeted tests
        working-directory: backend
        shell: bash
        run: |
          set +e
          python -m pytest -q tests/test_model_scenario_dof.py > ../reports-071-postfix.txt 2>&1
          echo "exit_status=$?" >> ../reports-071-postfix.txt
          exit 0
      - name: Commit diagnostic
        run: |
          rm .github/workflows/capture-071-postfix-diagnostic-once.yml
          git config user.name "jarvisos-diagnostic-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports-071-postfix.txt .github/workflows/capture-071-postfix-diagnostic-once.yml
          git commit -m "Capture remaining 071 test diagnostics"
          git push origin HEAD:impl/071-model-scenario-dof
