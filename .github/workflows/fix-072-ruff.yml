name: Fix spec 072 Ruff import ordering

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install ruff
      - run: cd backend && python -m ruff check app/modules/runner/service.py --fix
      - name: Commit mechanical fix
        shell: bash
        run: |
          rm .github/workflows/fix-072-ruff.yml docs/specs/.tmp-072-ruff.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/modules/runner/service.py .github/workflows/fix-072-ruff.yml
          git add -u docs/specs/.tmp-072-ruff.log
          git commit -m 'Fix spec 072 runner import ordering'
          git push origin HEAD:spec/072-process-topology
