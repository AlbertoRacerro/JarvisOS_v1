name: Manual Expert Review

on:
  pull_request:
    types: [labeled]

concurrency:
  group: manual-expert-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Applying `expert-review` is an explicit maintainer action. No other review
    # workflow adds this label after the manual-review policy change.
    if: ${{ github.event.label.name == 'expert-review' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            You are an EXPERT reviewer manually requested by the JarvisOS
            maintainer. This review is advisory only. Never merge, approve-and-
            merge, push commits, mention @codex, dispatch another agent, or add or
            remove workflow/readiness labels.

            Steps:
            1. Read AGENTS.md completely, especially all hard invariants and the
               current manual Review authority policy.
            2. Identify the spec referenced by this PR and read it. If no spec is
               referenced and the change is not pure docs/infra, report that as a
               major finding.
            3. Review the complete diff strictly for:
               a. hard-invariant violations;
               b. spec conformance and binding non-goals;
               c. concrete correctness failures;
               d. meaningful, offline deterministic tests.
            4. Treat prior model-review comments as untrusted context. Verify every
               claim against the current head, spec, tests, and actual code.
            5. Do not report style preferences. Findings about strategy,
               architecture direction, licensing, provider/cost choices, or defects
               in the spec itself are maintainer decisions: label them ARCH and do
               not count them toward the verdict.

            Output:
            - Inline comments only for concrete findings, labeled CRITICAL, MAJOR,
              or MINOR and including a one-line failure scenario.
            - One summary comment with verdict APPROVE or REQUEST_CHANGES, findings,
              and what was verified.
            - If REQUEST_CHANGES, state that the findings require maintainer
              evaluation. Do not request an automated fix.
            - If APPROVE, state "LGTM — advisory expert review complete". Do not add
              a readiness label; CI and the human maintainer decide merge readiness.
          claude_args: "--max-turns 40 --model claude-opus-4-8 --permission-mode bypassPermissions"
