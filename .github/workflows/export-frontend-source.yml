name: Export Frontend Source

on:
  pull_request:

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-source
          path: |
            frontend/src
            frontend/package.json
            frontend/package-lock.json
          if-no-files-found: error
          retention-days: 1
