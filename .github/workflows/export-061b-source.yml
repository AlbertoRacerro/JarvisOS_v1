name: Export 061b source snapshot

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage reviewed source
        run: |
          mkdir -p /tmp/061b-source/backend/app/modules/ai
          mkdir -p /tmp/061b-source/backend/tests
          cp backend/app/modules/ai/egress_runtime.py /tmp/061b-source/backend/app/modules/ai/
          cp backend/app/modules/ai/execution.py /tmp/061b-source/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_external_transaction.py /tmp/061b-source/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_external_runtime.py /tmp/061b-source/backend/app/modules/ai/
          cp backend/tests/test_token_flow_external_runtime_integration.py /tmp/061b-source/backend/tests/
          cp backend/tests/test_token_flow_local_runtime_integration.py /tmp/061b-source/backend/tests/
      - name: Upload reviewed source
        uses: actions/upload-artifact@v4
        with:
          name: source-061b-exact-head
          path: /tmp/061b-source
          if-no-files-found: error
          retention-days: 1
