name: Temporary 059a snapshot binding fix

on:
  push:
    branches: [impl/spec-059a-sensitivity-context]
    paths: [.github/workflows/tmp-059a-snapshot-fix.yml]

permissions:
  contents: write

jobs:
  apply-snapshot-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/spec-059a-sensitivity-context
          fetch-depth: 0

      - name: Apply snapshot-binding patch
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          sensitivity = Path("backend/app/modules/ai/sensitivity.py")
          text = sensitivity.read_text(encoding="utf-8")

          helper = '''

def _resolve_current_snapshot_and_label(
    workspace_id: str, subject_ref: str
) -> tuple[SourceSnapshot, SensitivityLabelRead | None]:
    """Read the source row and latest label from one SQLite read snapshot."""
    kind, record_id = _parse_subject_ref(subject_ref)
    with open_sqlite_connection() as connection:
        _require_workspace(connection, workspace_id)
        connection.execute("BEGIN")
        source_row = connection.execute(
            f"SELECT * FROM {_SOURCE_TABLES[kind]} WHERE id = ? AND workspace_id = ?",
            (record_id, workspace_id),
        ).fetchone()
        label_row = connection.execute(
            """
            SELECT * FROM sensitivity_labels
            WHERE workspace_id = ? AND subject_ref = ?
            ORDER BY created_at DESC, id DESC LIMIT 1
            """,
            (workspace_id, f"{kind}:{record_id}"),
        ).fetchone()
    if source_row is None:
        raise SensitivityNotFoundError(f"Source not found: {subject_ref}")
    model = _SOURCE_MODELS[kind].model_validate(dict(source_row))
    snapshot = _snapshot_from_block(workspace_id, _block_for_record(kind, model))
    if label_row is None:
        return snapshot, None
    current = label_row["content_digest"] == snapshot.content_digest
    label = _label_read(
        label_row,
        current=current,
        stale_reason=None if current else "content_digest_mismatch",
    )
    return snapshot, label
'''
          if "def _resolve_current_snapshot_and_label(" not in text:
              anchor = "\n\ndef create_sensitivity_label"
              if anchor not in text:
                  raise SystemExit("create_sensitivity_label anchor missing")
              text = text.replace(anchor, helper + anchor, 1)

          replacement = '''def get_current_sensitivity_label(
    workspace_id: str, subject_ref: str
) -> SensitivityLabelRead | None:
    _, label = _resolve_current_snapshot_and_label(workspace_id, subject_ref)
    return label


def create_sanitized_derivative'''
          text, count = re.subn(
              r"def get_current_sensitivity_label\(.*?\n\ndef create_sanitized_derivative",
              replacement,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f"get_current_sensitivity_label replacement count={count}")

          old_candidate = '''def _candidate_for_snapshot(
    snapshot: SourceSnapshot, *, allowed_derivative_sources: set[str]
) -> tuple[_CandidateBlock | None, dict[str, Any]]:
    label = get_current_sensitivity_label(snapshot.workspace_id, snapshot.subject_ref)
    floor = deterministic_floor(snapshot.block["content"])'''
          new_candidate = '''def _candidate_for_snapshot(
    snapshot: SourceSnapshot, *, allowed_derivative_sources: set[str]
) -> tuple[_CandidateBlock | None, dict[str, Any]]:
    current_snapshot, label = _resolve_current_snapshot_and_label(
        snapshot.workspace_id, snapshot.subject_ref
    )
    if current_snapshot.content_digest != snapshot.content_digest:
        return (
            None,
            {
                "source_ref": snapshot.subject_ref,
                "effective_level": "unknown",
                "reason": "source_changed_during_preview",
            },
        )
    snapshot = current_snapshot
    floor = deterministic_floor(snapshot.block["content"])'''
          if old_candidate not in text:
              raise SystemExit("candidate anchor missing")
          text = text.replace(old_candidate, new_candidate, 1)

          old_effective = '''def _effective_source_level(snapshot: SourceSnapshot) -> str:
    label = get_current_sensitivity_label(snapshot.workspace_id, snapshot.subject_ref)
    floor = deterministic_floor(snapshot.block["content"])
    if label is None or not label.current:
        return floor or "unknown"
    return _max_level(label.level, floor)'''
          new_effective = '''def _effective_source_level(snapshot: SourceSnapshot) -> str:
    current_snapshot, label = _resolve_current_snapshot_and_label(
        snapshot.workspace_id, snapshot.subject_ref
    )
    floor = deterministic_floor(current_snapshot.block["content"])
    if current_snapshot.content_digest != snapshot.content_digest:
        return floor or "unknown"
    if label is None or not label.current:
        return floor or "unknown"
    return _max_level(label.level, floor)'''
          if old_effective not in text:
              raise SystemExit("effective-level anchor missing")
          text = text.replace(old_effective, new_effective, 1)
          sensitivity.write_text(text, encoding="utf-8")

          tests = Path("backend/tests/test_ai_sensitivity_context.py")
          test_text = tests.read_text(encoding="utf-8")
          if "import app.modules.ai.sensitivity as sensitivity_module" not in test_text:
              test_text = test_text.replace(
                  "import pytest\n\nfrom app.core.database import (",
                  "import pytest\n\nimport app.modules.ai.sensitivity as sensitivity_module\nfrom app.core.database import (",
                  1,
              )
          if "def test_preview_withholds_source_changed_after_selection" not in test_text:
              test_text += '''


def test_preview_withholds_source_changed_after_selection(monkeypatch: pytest.MonkeyPatch) -> None:
    _bootstrap()
    record_id = _decision("Generic public-domain pump sizing note")
    source_ref = f"decision:{record_id}"
    create_sensitivity_label(
        SensitivityLabelCreate(
            workspace_id=WORKSPACE_ID,
            subject_ref=source_ref,
            level="S1",
        )
    )
    original_select = sensitivity_module.select_context_records

    def racing_select(*args, **kwargs):
        selected = original_select(*args, **kwargs)
        _update_decision(record_id, "Changed generic note after selection")
        return selected

    monkeypatch.setattr(sensitivity_module, "select_context_records", racing_select)

    preview = build_external_context_preview(WORKSPACE_ID, 32_000, _selection(record_id))

    assert preview.blocks == []
    assert preview.withheld_sources_manifest == [
        {
            "source_ref": source_ref,
            "effective_level": "unknown",
            "reason": "source_changed_during_preview",
        }
    ]
'''
          tests.write_text(test_text, encoding="utf-8")
          PY

          git rm .github/workflows/tmp-059a-snapshot-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/modules/ai/sensitivity.py backend/tests/test_ai_sensitivity_context.py
          git commit -m "Bind 059a previews to one source snapshot"
          git push origin HEAD:impl/spec-059a-sensitivity-context
