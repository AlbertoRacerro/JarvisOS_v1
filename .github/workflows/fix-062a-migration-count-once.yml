name: Fix 062a migration count once

on:
  push:
    branches:
      - impl/062a-grade-authority

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - name: Update count and clean diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/tests/test_ai_egress_schema.py")
          text = path.read_text(encoding="utf-8")
          old = "    assert count_schema_migrations() == 13\n"
          new = "    assert count_schema_migrations() == 14\n"
          if text.count(old) != 1:
              raise SystemExit("migration count anchor changed")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          for workflow in (
              ".github/workflows/diagnose-pytest-062a-current.yml",
              ".github/workflows/fix-062a-migration-count-once.yml",
          ):
              candidate = Path(workflow)
              if candidate.exists():
                  candidate.unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Update 062a migration count expectation"
          git push origin HEAD:impl/062a-grade-authority
