name: Apply confirmed length loop once

on:
  pull_request:
    types: [synchronize]
    branches: [impl/061b-confirmation-resume]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 161
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Decode and apply reviewed patch
        run: |
          base64 -d .jarvis-tmp/confirmed-length-loop.patch.gz.b64 \
            | gzip -d > /tmp/confirmed-length-loop.patch
          echo '930ef56ec53e998aba68e8d469b74d46e6a9876e0643c9f2a22e017df5b1d4ee  /tmp/confirmed-length-loop.patch' \
            | sha256sum -c -
          git apply --check --index /tmp/confirmed-length-loop.patch
          git apply --index /tmp/confirmed-length-loop.patch
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Validate confirmed length loop
        id: validate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            set -e
            python -m ruff check \
              app/modules/ai/egress_confirmation_core.py \
              app/modules/ai/token_flow_confirmed_length.py \
              tests/test_token_flow_confirmed_length_resume.py
            python -m pytest -q --tb=short \
              tests/test_token_flow_confirmed_length_resume.py \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_ai_egress_confirmation.py \
              tests/test_token_flow_rejected_confirmation_access.py
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/confirmed-length-loop.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confirmed-length-loop-validation
          path: ${{ runner.temp }}/confirmed-length-loop.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit reviewed source only
        if: steps.validate.outputs.status == '0'
        run: |
          git rm \
            .github/workflows/apply-confirmed-length-loop.yml \
            .github/workflows/export-confirmed-length-source.yml \
            .jarvis-tmp/confirmed-length-loop.patch.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: continue after confirmed length response'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Enforce validation
        if: always()
        run: test "${{ steps.validate.outputs.status }}" = '0'
