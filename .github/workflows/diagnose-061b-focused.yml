name: Diagnose 061b focused runtime

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  focused-runtime:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused external continuation
        id: focused
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          python -m pytest -q --tb=short \
            tests/test_token_flow_external_runtime_integration.py \
            2>&1 | tee "$RUNNER_TEMP/pytest-061b-focused.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-061b-focused
          path: ${{ runner.temp }}/pytest-061b-focused.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce focused result
        if: always()
        run: test "${{ steps.focused.outputs.status }}" = "0"
