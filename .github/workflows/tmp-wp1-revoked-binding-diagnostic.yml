name: Temporary WP1 revoked-binding diagnostic

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'tmp/wp1-revoked-binding-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 78575d2a0b59d8ab4bafa5c06c6522cb582e4ecb
      - name: Count patch anchors
        shell: bash
        run: |
          python - <<'PY' > /tmp/wp1-anchor-diagnostic.txt 2>&1
          from pathlib import Path

          cases = [
              ('confirmation.field', 'backend/app/modules/ai/egress_confirmation.py', '    max_output_tokens: int\n\n\ndef run_confirmation_ticket('),
              ('confirmation.order', 'backend/app/modules/ai/egress_confirmation.py', '''    flow = get_confirmation_flow_for_ticket(ticket_id)\n    flow_id = str(flow["id"])\n    binding = _binding_from_ticket(metadata, registry)\n\n    consumed = consume_confirmation_ticket(\n        ticket_id,\n        registry=registry,\n        policy=policy,\n    )\n    activate_confirmation_flow(flow_id=flow_id, ticket_id=ticket_id)\n'''),
              ('confirmation.query', 'backend/app/modules/ai/egress_confirmation.py', '''                   decision.source_count,\n                   ticket.trigger_ids_json, ticket.packet_digest,\n'''),
              ('confirmation.metadata-return', 'backend/app/modules/ai/egress_confirmation.py', '''        fallback_index=int(row["fallback_index"]),\n        max_output_tokens=int(row["max_output_tokens"]),\n    )\n'''),
              ('confirmation.finalizer-call', 'backend/app/modules/ai/egress_confirmation.py', '''        reservation_id=reservation_id,\n        registry=registry,\n    )\n    outcome = _outcome(\n'''),
              ('confirmation.route-marker', 'backend/app/modules/ai/egress_confirmation.py', 'def _route_metadata(\n'),
              ('transaction.signature', 'backend/app/modules/ai/token_flow_external_transaction.py', '''    reservation_id: str | None = None,\n    registry: ProviderRegistry | None = None,\n    now: datetime | None = None,\n'''),
              ('transaction.pricing', 'backend/app/modules/ai/token_flow_external_transaction.py', '''    registry = registry or load_default_provider_registry()\n    pricing = resolve_model_pricing(registry, binding.provider_id, binding.model_id)\n    with persistence._immediate_transaction() as connection:\n'''),
              ('transaction.pricing-uses', 'backend/app/modules/ai/token_flow_external_transaction.py', 'pricing_version=pricing.pricing_version'),
              ('reserved-test.import', 'backend/tests/test_token_flow_external_reserved_transaction.py', 'from app.modules.ai.egress_service import EgressPacketMaterial\n'),
          ]
          for label, path, anchor in cases:
              text = Path(path).read_text(encoding='utf-8')
              print(f'{label}: count={text.count(anchor)}')
              if text.count(anchor) == 0:
                  needle = anchor.strip().splitlines()[0][:60]
                  print(f'  first-line needle={needle!r}')
                  for index, line in enumerate(text.splitlines(), start=1):
                      if needle and needle in line:
                          lo = max(1, index - 3)
                          hi = min(len(text.splitlines()), index + 8)
                          print(f'  nearby lines {lo}-{hi}:')
                          for number in range(lo, hi + 1):
                              print(f'    {number}: {text.splitlines()[number-1]!r}')
                          break
          PY
          cat /tmp/wp1-anchor-diagnostic.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wp1-anchor-diagnostic
          path: /tmp/wp1-anchor-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
