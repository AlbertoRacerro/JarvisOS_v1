name: Fix 050 label minimization once

on:
  push:
    branches:
      - impl/050-flowsheet-dag

permissions:
  contents: write

jobs:
  patch:
    if: github.repository == 'AlbertoRacerro/JarvisOS_v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/050-flowsheet-dag
          fetch-depth: 0
      - name: Remove statement content from graph labels
        shell: python
        run: |
          from pathlib import Path

          path = Path('backend/app/modules/flowsheet/service.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '        label = f"Assumption: {row.get(\'statement\') or record_id[:8]}"':
                  '        label = f"Assumption {record_id[:8]}"',
              '        label = f"Requirement: {row.get(\'statement\') or record_id[:8]}"':
                  '        label = f"Requirement {record_id[:8]}"',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one label anchor, found {count}: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/fix-050-label-minimization-once.yml').unlink()
      - name: Commit minimized labels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/modules/flowsheet/service.py .github/workflows/fix-050-label-minimization-once.yml
          git commit -m "Minimize flowsheet record labels"
          git push origin HEAD:impl/050-flowsheet-dag
