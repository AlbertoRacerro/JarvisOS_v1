name: Record 062 backend completion once

on:
  push:
    branches:
      - impl/062b-grade-cohorts

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
      - name: Update spec status and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/062-grade-0.md")
          text = path.read_text(encoding="utf-8")
          old = (
              "Status: implementation in review. `docs/specs/STATUS.md` is authoritative. The 062a\n"
              "backend authority slice provides immutable flow subjects, append-only grade history,\n"
              "and bounded operator API routes. Complete cohort analytics and the operator-visible\n"
              "frontend result surface remain pending.\n"
          )
          new = (
              "Status: backend implementation complete; frontend result surface pending.\n"
              "`docs/specs/STATUS.md` remains authoritative. The 062a authority and 062b read-only\n"
              "cohort slices now provide immutable flow subjects, append-only human grade history,\n"
              "bounded operator APIs, complete outcome cohorts, reconciliation checks, and external\n"
              "provider spend per useful eligible outcome. No routing actuation is authorized.\n"
          )
          if text.count(old) != 1:
              raise SystemExit("062 implementation status anchor changed")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/update-062-backend-complete-once.yml").unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Record 062 backend completion"
          git push origin HEAD:impl/062b-grade-cohorts
