name: Export 061b followup source

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage exact source
        run: |
          mkdir -p /tmp/061b-followup/backend/app/core
          mkdir -p /tmp/061b-followup/backend/app/modules/ai
          mkdir -p /tmp/061b-followup/backend/tests
          cp backend/app/core/egress_schema.py /tmp/061b-followup/backend/app/core/
          cp backend/app/modules/ai/egress_persistence.py /tmp/061b-followup/backend/app/modules/ai/
          cp backend/tests/test_ai_egress_runtime.py /tmp/061b-followup/backend/tests/
          cp backend/tests/test_ai_execution_spine.py /tmp/061b-followup/backend/tests/
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: source-061b-followup
          path: /tmp/061b-followup
          if-no-files-found: error
          retention-days: 1
