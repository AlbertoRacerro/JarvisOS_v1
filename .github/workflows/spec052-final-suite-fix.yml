name: Spec 052 final suite compatibility fix

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Update exact Grade migration expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/tests/test_flow_grades.py")
          text = path.read_text(encoding="utf-8")
          old_import = "from app.core.database import get_current_schema_migration, open_sqlite_connection\n"
          new_import = (
              "from app.core.cad_link_schema import CAD_LINK_SCHEMA_MIGRATION_RECORD\n"
              "from app.core.database import get_current_schema_migration, open_sqlite_connection\n"
              "from app.core.grade_schema import GRADE_SCHEMA_MIGRATION_ID\n"
          )
          if text.count(old_import) != 1:
              raise SystemExit("unexpected flow-grade import block")
          text = text.replace(old_import, new_import, 1)
          old_test = '''def test_grade_schema_is_current_and_required(initialized_database) -> None:\n    migration = get_current_schema_migration()\n    assert migration.migration_id == "0014_grade_0"\n    with open_sqlite_connection() as connection:\n        tables = {\n            row["name"]\n            for row in connection.execute(\n                "SELECT name FROM sqlite_master WHERE type = 'table'"\n            ).fetchall()\n        }\n    assert {"ai_flow_grade_subjects", "ai_flow_grade_events"} <= tables\n'''
          new_test = '''def test_grade_schema_remains_applied_and_required(initialized_database) -> None:\n    migration = get_current_schema_migration()\n    assert migration.migration_id == CAD_LINK_SCHEMA_MIGRATION_RECORD["migration_id"]\n    with open_sqlite_connection() as connection:\n        tables = {\n            row["name"]\n            for row in connection.execute(\n                "SELECT name FROM sqlite_master WHERE type = 'table'"\n            ).fetchall()\n        }\n        grade_migration = connection.execute(\n            "SELECT status FROM schema_migrations WHERE migration_id = ?",\n            (GRADE_SCHEMA_MIGRATION_ID,),\n        ).fetchone()\n    assert grade_migration is not None\n    assert grade_migration["status"] == "applied"\n    assert {"ai_flow_grade_subjects", "ai_flow_grade_events"} <= tables\n'''
          if text.count(old_test) != 1:
              raise SystemExit("unexpected flow-grade migration test")
          path.write_text(text.replace(old_test, new_test, 1), encoding="utf-8")

          for disposable in (
              Path("reports/spec052-residual-full-suite.txt"),
              Path(".github/workflows/spec052-final-suite-fix.yml"),
          ):
              if disposable.exists():
                  disposable.unlink()
          PY
      - name: Commit final compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep Grade migration assertions additive after spec 052"
          git push origin HEAD:spec/052-cad-link
