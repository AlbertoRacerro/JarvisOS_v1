name: Promote 062 ready once

on:
  push:
    branches:
      - status/promote-062-ready

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: status/promote-062-ready
      - name: Promote exact registry row and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = "| 062 | planned | — | GRADE-0 | 021, 059b, 061a, 061b | Record optional human flow grades (`useful`, `partly`, `rework`, `failed`) over finalized flow outcomes while keeping attempt execution/accounting evidence, external provider spend, local-unpriced coverage, synthetic exclusions, deterministic failures, and ungraded flows visible; grades never actuate routing. |"
          new = "| 062 | ready | — | GRADE-0 | 021, 059b, 061a, 061b | Record optional human flow grades (`useful`, `partly`, `rework`, `failed`) over finalized flow outcomes while keeping attempt execution/accounting evidence, external provider spend, local-unpriced coverage, synthetic exclusions, deterministic failures, and ungraded flows visible; grades never actuate routing. |"
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one 062 planned row, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git rm .github/workflows/promote-062-ready-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/specs/STATUS.md
          git commit -m "Promote spec 062 to ready"
          git push origin HEAD:status/promote-062-ready
