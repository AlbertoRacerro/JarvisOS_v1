name: Set 062 frontend pending once

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'status/062-frontend-pending'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: status/062-frontend-pending
          fetch-depth: 0
      - name: Record joint frontend design boundary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 062 | in_review | [#166](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/166), [#167](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/167) | GRADE-0 | 021, 059b, 061a, 061b | Backend grade authority and complete read-only outcome cohorts are implemented; the operator-visible four-choice result surface remains pending. Human grades preserve deterministic flow/attempt evidence, external provider spend, local-unpriced coverage, synthetic exclusions, failures, and ungraded denominators and never actuate routing. |'
          new = '| 062 | blocked | [#166](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/166), [#167](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/167) | GRADE-0 | 021, 059b, 061a, 061b | Backend grade authority and complete read-only outcome cohorts are merged. The operator-visible four-choice result surface is blocked pending joint operator design of placement, interaction states, accessibility, revision and withdrawal behavior, and stale-subject conflict handling; no autonomous frontend implementation is authorized. |'
          if text.count(old) != 1:
              raise SystemExit('expected one in-review 062 row')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit status and remove workflow
        shell: bash
        run: |
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/set-062-frontend-pending-once.yml
          git add docs/specs/STATUS.md
          git commit -m "Block 062 pending joint frontend design"
          git push origin HEAD:status/062-frontend-pending
