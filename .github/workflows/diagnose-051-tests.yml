name: Diagnose 051 canonical suite

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  canonical-suite:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install canonical dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run canonical backend suite
        id: full
        continue-on-error: true
        working-directory: backend
        run: python -m pytest -q --tb=short > /tmp/pytest-051-canonical.log 2>&1
      - name: Upload canonical suite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-051-canonical-log
          path: /tmp/pytest-051-canonical.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce canonical result
        if: steps.full.outcome == 'failure'
        run: exit 1
