name: Repair 051 test drift

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  repair-test-drift:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Apply bounded test-only repair
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          replace_exact(
              "backend/tests/test_ai_egress_schema.py",
              "    SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID,\n",
              "    CURRENT_SCHEMA_MIGRATION_ID,\n",
          )
          replace_exact(
              "backend/tests/test_ai_egress_schema.py",
              "assert get_current_schema_migration().migration_id == SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID",
              "assert get_current_schema_migration().migration_id == CURRENT_SCHEMA_MIGRATION_ID",
          )
          replace_exact(
              "backend/tests/test_ai_egress_schema.py",
              "assert count_schema_migrations() == 12",
              "assert count_schema_migrations() == 13",
          )

          replace_exact(
              "backend/tests/test_data_infrastructure.py",
              "        SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID,\n",
              "        SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_ID,\n",
          )
          replace_exact(
              "backend/tests/test_data_infrastructure.py",
              "assert CURRENT_SCHEMA_MIGRATION_ID == SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID",
              "assert CURRENT_SCHEMA_MIGRATION_ID == SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_ID",
          )

          replace_exact(
              "backend/tests/test_token_flow_schema.py",
              "    SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID,\n",
              "    CURRENT_SCHEMA_MIGRATION_ID,\n",
          )
          replace_exact(
              "backend/tests/test_token_flow_schema.py",
              "assert get_current_schema_migration().migration_id == SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID",
              "assert get_current_schema_migration().migration_id == CURRENT_SCHEMA_MIGRATION_ID",
          )

          replace_exact(
              "backend/tests/test_flowsheet_stale_propagation.py",
              "        assert event is not None\n        assert \"20\" not in event[\"payload\"]\n        assert \"22\" not in event[\"payload\"]",
              '''        assert event is not None
        event_payload = json.loads(event["payload"])
        assert event_payload == {
            "replacement_parameter_id": ids["replacement"],
            "superseded_parameter_id": ids["old"],
            "invalidation_id": body["invalidation"]["id"],
            "affected_count": body["invalidation"]["affected_count"],
            "graph_digest": body["invalidation"]["graph_digest"],
            "cycle_count": body["invalidation"]["cycle_count"],
            "unresolved_diagnostic_count": body["invalidation"]["unresolved_diagnostic_count"],
        }''',
          )
          PY
      - name: Install canonical dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused repaired tests
        working-directory: backend
        run: |
          python -m pytest -q --tb=short \
            tests/test_ai_egress_schema.py \
            tests/test_data_infrastructure.py \
            tests/test_token_flow_schema.py \
            tests/test_flowsheet_stale_propagation.py
      - name: Commit bounded repair
        run: |
          if git diff --quiet -- \
            backend/tests/test_ai_egress_schema.py \
            backend/tests/test_data_infrastructure.py \
            backend/tests/test_token_flow_schema.py \
            backend/tests/test_flowsheet_stale_propagation.py; then
            echo "No repair required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/tests/test_ai_egress_schema.py \
            backend/tests/test_data_infrastructure.py \
            backend/tests/test_token_flow_schema.py \
            backend/tests/test_flowsheet_stale_propagation.py
          git commit -m "test: repair 051 migration and audit assertions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
