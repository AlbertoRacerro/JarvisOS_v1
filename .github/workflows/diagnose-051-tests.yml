name: Diagnose 051 full suite

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  full-suite:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -q -r backend/requirements.txt pytest
      - name: Run complete backend suite
        id: full
        continue-on-error: true
        env:
          PYTHONPATH: backend
        run: pytest -q backend/tests --tb=short > /tmp/pytest-051-full.log 2>&1
      - name: Upload complete suite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-051-full-log
          path: /tmp/pytest-051-full.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce complete result
        if: steps.full.outcome == 'failure'
        run: exit 1
