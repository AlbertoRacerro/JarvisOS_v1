name: Reconcile 062 status once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.event.pull_request.number == 167 && github.head_ref == 'impl/062b-grade-cohorts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
          fetch-depth: 0
      - name: Update authoritative registry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 062 | in_review | [#166](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/166) | GRADE-0 | 021, 059b, 061a, 061b | Record optional human flow grades (`useful`, `partly`, `rework`, `failed`) over finalized flow outcomes while keeping attempt execution/accounting evidence, external provider spend, local-unpriced coverage, synthetic exclusions, deterministic failures, and ungraded flows visible; grades never actuate routing. |'
          new = '| 062 | in_review | [#166](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/166), [#167](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/167) | GRADE-0 | 021, 059b, 061a, 061b | Backend grade authority and complete read-only outcome cohorts are implemented; the operator-visible four-choice result surface remains pending. Human grades preserve deterministic flow/attempt evidence, external provider spend, local-unpriced coverage, synthetic exclusions, failures, and ungraded denominators and never actuate routing. |'
          if text.count(old) != 1:
              raise SystemExit('expected one authoritative 062 registry row')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit registry change and remove workflow
        shell: bash
        run: |
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/reconcile-062-status-once.yml
          git add docs/specs/STATUS.md
          git commit -m "Reconcile 062 backend implementation status"
          git push origin HEAD:impl/062b-grade-cohorts
