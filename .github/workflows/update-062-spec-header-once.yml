name: Update 062 spec header once

on:
  push:
    branches:
      - impl/062a-grade-authority

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - name: Update implementation status and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/062-grade-0.md")
          text = path.read_text(encoding="utf-8")
          old = (
              "Status: planned full-spec draft. `docs/specs/STATUS.md` is authoritative. This\n"
              "contract must not become `ready` until 061 is implemented and merged, terminal flow\n"
              "identity/accounting finalization are stable, and the operator-visible result surface is\n"
              "rechecked.\n"
          )
          new = (
              "Status: implementation in review. `docs/specs/STATUS.md` is authoritative. The 062a\n"
              "backend authority slice provides immutable flow subjects, append-only grade history,\n"
              "and bounded operator API routes. Complete cohort analytics and the operator-visible\n"
              "frontend result surface remain pending.\n"
          )
          if text.count(old) != 1:
              raise SystemExit("062 status header anchor changed")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/update-062-spec-header-once.yml").unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Update 062 implementation status"
          git push origin HEAD:impl/062a-grade-authority
