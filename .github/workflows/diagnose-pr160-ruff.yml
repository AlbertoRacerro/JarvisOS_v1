name: Diagnose PR160 Ruff

on:
  pull_request:
    types: [synchronize]
    branches: [spec/061b-token-flow-continuation]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 160
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Produce canonical Ruff fixes
        shell: bash
        run: |
          cd backend
          python -m ruff check --fix \
            app/modules/ai/egress_rejected_continuation.py \
            tests/test_token_flow_rejected_confirmation_access.py
          mkdir -p "$RUNNER_TEMP/pr160-fixed/app/modules/ai" "$RUNNER_TEMP/pr160-fixed/tests"
          cp app/modules/ai/egress_rejected_continuation.py \
            "$RUNNER_TEMP/pr160-fixed/app/modules/ai/"
          cp tests/test_token_flow_rejected_confirmation_access.py \
            "$RUNNER_TEMP/pr160-fixed/tests/"
          python -m ruff check . > "$RUNNER_TEMP/pr160-fixed/pr160-ruff.log" 2>&1
      - name: Upload canonical fixes
        uses: actions/upload-artifact@v4
        with:
          name: pr160-ruff-fixed-files
          path: ${{ runner.temp }}/pr160-fixed
          if-no-files-found: error
          retention-days: 1
