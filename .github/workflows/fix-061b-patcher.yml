name: Apply corrected 061b runtime once

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  apply-corrected-runtime:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Extract existing runtime patch
        run: |
          if grep -q '^def _run_local_continuations' backend/app/modules/ai/execution.py; then
            echo "Runtime integration already present."
            touch "$RUNNER_TEMP/runtime-already-present"
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/ci.yml').read_text(encoding='utf-8')
          start_marker = "      - name: Apply bounded local runtime patch\n        run: |\n"
          end_marker = "\n      - name: Install dependencies\n"
          if start_marker not in workflow or end_marker not in workflow:
              raise SystemExit('runtime patch block markers not found')
          block = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          Path('/tmp/apply-061b-runtime.sh').write_text(
              dedent(block),
              encoding='utf-8',
          )
          PY
          bash /tmp/apply-061b-runtime.sh

      - name: Break generated import cycle
        if: hashFiles(format('{0}/runtime-already-present', runner.temp)) == ''
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/modules/ai/execution.py')
          text = path.read_text(encoding='utf-8')
          top_level = (
              'from app.modules.ai.token_flow_local_continuation import (\n'
              '    plan_local_continuation,\n'
              ')\n'
          )
          lazy_anchor = (
              ') -> AiTaskOutcome:\n'
              '    current_attempt_id = initial_attempt_id\n'
          )
          lazy_replacement = (
              ') -> AiTaskOutcome:\n'
              '    from app.modules.ai.token_flow_local_continuation import (\n'
              '        plan_local_continuation,\n'
              '    )\n'
              '\n'
              '    current_attempt_id = initial_attempt_id\n'
          )
          if top_level not in text:
              raise SystemExit('generated top-level planner import not found')
          if lazy_anchor not in text:
              raise SystemExit('generated continuation function anchor not found')
          text = text.replace(top_level, '', 1)
          text = text.replace(lazy_anchor, lazy_replacement, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Install dependencies
        if: hashFiles(format('{0}/runtime-already-present', runner.temp)) == ''
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run full verified suite
        id: verified
        if: hashFiles(format('{0}/runtime-already-present', runner.temp)) == ''
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            python -m ruff check app tests
            ruff_status=$?
            if [ "$ruff_status" -ne 0 ]; then
              exit "$ruff_status"
            fi
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/local-continuation-runtime.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full-suite diagnostics
        if: always() && hashFiles(format('{0}/runtime-already-present', runner.temp)) == ''
        uses: actions/upload-artifact@v4
        with:
          name: local-continuation-runtime-diagnostics
          path: ${{ runner.temp }}/local-continuation-runtime.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce verified result
        if: always() && hashFiles(format('{0}/runtime-already-present', runner.temp)) == ''
        run: test "${{ steps.verified.outputs.status }}" = "0"

      - name: Commit verified runtime only
        if: steps.verified.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/modules/ai/execution.py \
            backend/app/modules/ai/token_flow_terminalization.py
          git diff --cached --quiet && exit 0
          git commit -m "feat: run governed local output continuations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
