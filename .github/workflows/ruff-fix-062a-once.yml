name: Ruff fix 062a once

on:
  push:
    branches:
      - impl/062a-grade-authority

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Fix only 062a files and self-delete
        shell: bash
        run: |
          ruff check --fix \
            backend/app/core/database.py \
            backend/app/core/grade_schema.py \
            backend/app/modules/ai/flow_grade_contracts.py \
            backend/app/modules/ai/flow_grade_event_store.py \
            backend/app/modules/ai/flow_grade_events.py \
            backend/app/modules/ai/flow_grade_evidence.py \
            backend/app/modules/ai/flow_grade_models.py \
            backend/app/modules/ai/flow_grade_read.py \
            backend/app/modules/ai/flow_grade_routes.py \
            backend/app/modules/ai/flow_grade_subjects.py \
            backend/app/modules/ai/routes.py \
            backend/app/modules/ai/token_flow_service.py \
            backend/app/modules/ai/token_flow_terminalization.py \
            backend/tests/test_flow_grades.py
          rm .github/workflows/ruff-fix-062a-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply Ruff fixes to 062a"
          git push origin HEAD:impl/062a-grade-authority
