name: Apply 061a Terminal Replay Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Apply and verify terminal replay fix
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python scripts/fix_061a_terminal_replay.py
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
          cd backend
          python -m ruff check \
            app/modules/ai/token_flow_evidence.py \
            tests/test_token_flow_evidence.py
          python -m pytest -q \
            tests/test_token_flow_evidence.py \
            tests/test_token_flow_transaction.py \
            tests/test_token_flow_service.py
          cd ..
          rm scripts/fix_061a_terminal_replay.py
          rm .github/workflows/apply-061a-terminal-replay.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Allow exact evidence replay on terminal flows"
          git push origin "HEAD:$TARGET_BRANCH"
