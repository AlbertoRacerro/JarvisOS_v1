name: Spec 052 deterministic integration patch

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Apply exact bounded replacements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              observed = text.count(old)
              if observed != count:
                  raise SystemExit(f"{path}: expected {count} exact occurrence(s), found {observed}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          # Database bootstrap and migration registration.
          replace(
              "backend/app/core/database.py",
              "from app.core.egress_schema import (\n",
              "from app.core.cad_link_schema import (\n"
              "    CAD_LINK_SCHEMA_INDEX_STATEMENTS,\n"
              "    CAD_LINK_SCHEMA_MIGRATION_RECORD,\n"
              "    CAD_LINK_SCHEMA_STATEMENTS,\n"
              ")\n"
              "from app.core.egress_schema import (\n",
          )
          replace(
              "backend/app/core/database.py",
              "        for statement in SCHEMA_STATEMENTS:\n            connection.execute(statement)\n",
              "        for statement in SCHEMA_STATEMENTS:\n            connection.execute(statement)\n"
              "        for statement in CAD_LINK_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n",
          )
          replace(
              "backend/app/core/database.py",
              "        for statement in SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n",
              "        for statement in SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n"
              "        for statement in CAD_LINK_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n",
          )
          replace(
              "backend/app/core/database.py",
              '        "ai_jobs",\n        "ai_settings",\n',
              '        "ai_jobs",\n        "bluecad_cad_links",\n        "ai_settings",\n',
          )
          replace(
              "backend/app/core/database.py",
              "        *SCHEMA_MIGRATION_RECORDS,\n        EGRESS_SCHEMA_MIGRATION_RECORD,\n",
              "        *SCHEMA_MIGRATION_RECORDS,\n        CAD_LINK_SCHEMA_MIGRATION_RECORD,\n        EGRESS_SCHEMA_MIGRATION_RECORD,\n",
          )

          # Typed BLUECAD ledger contracts.
          replace(
              "backend/app/modules/bluecad/models.py",
              'ParkedReason = Literal["attempts_exhausted", "budget_blocked", "policy_blocked", "malformed_repeated", "user_cancelled"]',
              'ParkedReason = Literal["attempts_exhausted", "budget_blocked", "policy_blocked", "malformed_repeated", "user_cancelled", "cad_link_failed"]',
          )
          replace(
              "backend/app/modules/bluecad/models.py",
              'CandidateOrigin = Literal["ai", "parametric_variant"]',
              'CandidateOrigin = Literal["ai", "parametric_variant", "process_linked"]',
          )
          replace(
              "backend/app/modules/bluecad/models.py",
              'ProposalOutcome = Literal["ok", "malformed", "provider_error", "blocked"]',
              'ProposalOutcome = Literal["ok", "malformed", "provider_error", "blocked", "not_applicable"]',
          )

          # Reuse the existing artifact store with explicit producer provenance.
          replace(
              "backend/app/modules/bluecad/ledger.py",
              "def register_artifact(workspace_id: str, source_path: Path, *, role: str, source_ref: str) -> str:\n",
              "def register_artifact(\n"
              "    workspace_id: str,\n"
              "    source_path: Path,\n"
              "    *,\n"
              "    role: str,\n"
              "    source_ref: str,\n"
              "    producer_notes: str = \"Generated by BLUECAD AI loop v0.\",\n"
              ") -> str:\n",
          )
          replace(
              "backend/app/modules/bluecad/ledger.py",
              '                "Generated by BLUECAD AI loop v0.",\n',
              "                producer_notes,\n",
          )

          # API endpoints and bounded error mapping.
          replace(
              "backend/app/modules/bluecad/routes.py",
              "from app.modules.bluecad.ledger import archive_candidate, get_candidate, list_candidates, mark_promoted\n",
              "from app.modules.bluecad.cad_link import (\n"
              "    CadLinkError,\n"
              "    CadLinkExecuteRequest,\n"
              "    CadLinkExecuteResponse,\n"
              "    CadLinkPreviewRequest,\n"
              "    execute_cad_link_047,\n"
              "    preview_cad_link_047,\n"
              ")\n"
              "from app.modules.bluecad.ledger import archive_candidate, get_candidate, list_candidates, mark_promoted\n",
          )
          replace(
              "backend/app/modules/bluecad/routes.py",
              "def _domain_error(exc: Exception) -> HTTPException:\n",
              "def _cad_link_error(exc: CadLinkError) -> HTTPException:\n"
              "    return HTTPException(\n"
              "        status_code=exc.status_code,\n"
              "        detail={\"code\": exc.code, \"message\": exc.message},\n"
              "    )\n\n\n"
              "def _domain_error(exc: Exception) -> HTTPException:\n",
          )
          replace(
              "backend/app/modules/bluecad/routes.py",
              "@router.get(\"/candidates\", response_model=list[BluecadCandidateRead])\n",
              "@router.post(\"/cad-link/047/preview\")\n"
              "def preview_cad_link_047_endpoint(\n"
              "    workspace_id: str, payload: CadLinkPreviewRequest\n"
              ") -> dict[str, object]:\n"
              "    try:\n"
              "        return preview_cad_link_047(workspace_id, payload)\n"
              "    except CadLinkError as exc:\n"
              "        raise _cad_link_error(exc) from exc\n\n\n"
              "@router.post(\"/cad-link/047/execute\", response_model=CadLinkExecuteResponse)\n"
              "def execute_cad_link_047_endpoint(\n"
              "    workspace_id: str, payload: CadLinkExecuteRequest\n"
              ") -> CadLinkExecuteResponse:\n"
              "    try:\n"
              "        return execute_cad_link_047(workspace_id, payload)\n"
              "    except CadLinkError as exc:\n"
              "        raise _cad_link_error(exc) from exc\n\n\n"
              "@router.get(\"/candidates\", response_model=list[BluecadCandidateRead])\n",
          )

          # Extend the existing flowsheet rather than introducing a second graph.
          replace(
              "backend/app/modules/flowsheet/service.py",
              '        "run_artifact": ("SELECT simulation_run_id, artifact_id, role FROM run_artifacts WHERE workspace_id = ?"),\n',
              '        "run_artifact": ("SELECT simulation_run_id, artifact_id, role FROM run_artifacts WHERE workspace_id = ?"),\n'
              '        "cad_link": (\n'
              '            "SELECT source_simulation_run_id, child_candidate_id "\n'
              '            "FROM bluecad_cad_links WHERE workspace_id = ?"\n'
              '        ),\n',
          )
          replace(
              "backend/app/modules/flowsheet/service.py",
              "    for row in rows[\"bluecad_candidate\"]:\n        candidate_ref = _ref(\"bluecad_candidate\", row[\"id\"])\n",
              "    for row in rows[\"cad_link\"]:\n"
              "        _add_typed_edge(\n"
              "            builder,\n"
              "            \"simulation_run\",\n"
              "            row.get(\"source_simulation_run_id\"),\n"
              "            _ref(\"bluecad_candidate\", row.get(\"child_candidate_id\")),\n"
              "            \"m0_geometry_link\",\n"
              "            \"dependency\",\n"
              "            \"bluecad_cad_links.source_simulation_run_id\",\n"
              "        )\n"
              "    for row in rows[\"bluecad_candidate\"]:\n        candidate_ref = _ref(\"bluecad_candidate\", row[\"id\"])\n",
          )
          replace(
              "backend/app/modules/flowsheet/service.py",
              "                    \"current_candidate_artifact\",\n                    \"provenance\",\n                    f\"bluecad_candidates.{field_name}\",\n",
              "                    \"process_link_artifact\"\n"
              "                    if row.get(\"origin\") == \"process_linked\"\n"
              "                    else \"current_candidate_artifact\",\n"
              "                    \"dependency\"\n"
              "                    if row.get(\"origin\") == \"process_linked\"\n"
              "                    else \"provenance\",\n"
              "                    f\"bluecad_candidates.{field_name}\",\n",
          )
          replace(
              "backend/app/modules/flowsheet/service.py",
              "            \"has_attempt\",\n            \"provenance\",\n            \"bluecad_attempts.candidate_id\",\n",
              "            \"process_link_build\"\n"
              "            if next(\n"
              "                (candidate.get(\"origin\") for candidate in rows[\"bluecad_candidate\"] if candidate.get(\"id\") == row.get(\"candidate_id\")),\n"
              "                None,\n"
              "            ) == \"process_linked\"\n"
              "            else \"has_attempt\",\n"
              "            \"dependency\"\n"
              "            if next(\n"
              "                (candidate.get(\"origin\") for candidate in rows[\"bluecad_candidate\"] if candidate.get(\"id\") == row.get(\"candidate_id\")),\n"
              "                None,\n"
              "            ) == \"process_linked\"\n"
              "            else \"provenance\",\n"
              "            \"bluecad_attempts.candidate_id\",\n",
          )

          # Canonical live registry.
          replace(
              "docs/specs/STATUS.md",
              "| 052 | ready | — | CAD-LINK-0: 047 M0 cylinder proxy to BLUECAD | 005, 038, 050, 051, 071 | Convert one fresh successful bundled-047 run with accepted parameter-backed geometry inputs into an idempotent one-`tube_run` BLUECAD candidate, reconcile CAD geometry against 047 volume/area outputs, and return dependency/evidence lineage; full-reactor topology and tube-count semantics remain deferred. |",
              "| 052 | in_review | [#170](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/170) | CAD-LINK-0: 047 M0 cylinder proxy to BLUECAD | 005, 038, 050, 051, 071 | Convert one fresh successful bundled-047 run with accepted parameter-backed geometry inputs into an idempotent one-`tube_run` BLUECAD candidate, reconcile CAD geometry against 047 volume/area outputs, and return dependency/evidence lineage; full-reactor topology and tube-count semantics remain deferred. |",
          )

          Path(".github/workflows/spec052-deterministic-patch.yml").unlink()
          PY
      - name: Commit bounded integration patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate spec 052 service boundaries"
          git push origin HEAD:spec/052-cad-link
