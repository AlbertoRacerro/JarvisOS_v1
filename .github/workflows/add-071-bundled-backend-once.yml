name: Add bundled 047 backend once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0
      - name: Add bundled registration service and route
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/modules/runner/service.py")
          text = path.read_text(encoding="utf-8")
          if "register_bundled_bluerev_process0" in text:
              raise SystemExit("bundled registration already present")
          text = text.replace(
              "from app.modules.memory.service import create_calc_parameter_proposals\n",
              "from app.modules.memory.service import create_calc_parameter_proposals\nfrom app.modules.modeling.models import ModelSpecCreate\nfrom app.modules.modeling.service import create_model_spec\n",
              1,
          )
          text = text.replace(
              'CALC_V0_IMPLEMENTATION_KIND = "calc_v0"\n',
              'CALC_V0_IMPLEMENTATION_KIND = "calc_v0"\nBUNDLED_BLUEREV_PROCESS0_LABEL = "bluerev-geometry-hydraulics-v0-bundled"\nBUNDLED_BLUEREV_PROCESS0_TITLE = "BlueRev geometry and hydraulics bundled V0"\n',
              1,
          )
          registration = '''

          def register_bundled_bluerev_process0(workspace_id: str) -> ModelImplementationRead:
              script_path = _bluerev_process0_script_path()
              contract_path = _bluerev_process0_contract_path()
              contract = json.loads(contract_path.read_text(encoding="utf-8"))
              _, contract_sha256, _ = canonicalize_input_contract(contract)
              script_sha256 = sha256_file(script_path)

              with open_sqlite_connection() as connection:
                  _require_workspace(connection, workspace_id)
                  existing = connection.execute(
                      """
                      SELECT mv.*, a.sha256 AS script_sha256, a.stored_path AS script_path
                      FROM model_versions mv
                      JOIN artifacts a ON a.id = mv.implementation_artifact_id
                      WHERE mv.workspace_id = ?
                        AND mv.version_label = ?
                        AND mv.input_contract_sha256 = ?
                        AND a.sha256 = ?
                      ORDER BY mv.created_at ASC
                      LIMIT 1
                      """,
                      (
                          workspace_id,
                          BUNDLED_BLUEREV_PROCESS0_LABEL,
                          contract_sha256,
                          script_sha256,
                      ),
                  ).fetchone()
                  if existing is not None:
                      return _model_implementation_from_row(existing)
                  model_spec = connection.execute(
                      """
                      SELECT id FROM model_specs
                      WHERE workspace_id = ? AND title = ?
                      ORDER BY created_at ASC
                      LIMIT 1
                      """,
                      (workspace_id, BUNDLED_BLUEREV_PROCESS0_TITLE),
                  ).fetchone()

              if model_spec is None:
                  created_spec = create_model_spec(
                      workspace_id,
                      ModelSpecCreate(
                          title=BUNDLED_BLUEREV_PROCESS0_TITLE,
                          engineering_question=(
                              "Evaluate caller-selected tubular-loop geometry, hydraulics, "
                              "turnover, and pump power without product defaults."
                          ),
                          scope=(
                              "Reviewed 047 forward model; all nine project and operating "
                              "values are supplied per scenario."
                          ),
                      ),
                  )
                  model_spec_id = created_spec.id
              else:
                  model_spec_id = str(model_spec["id"])

              return create_model_implementation(
                  workspace_id,
                  ModelImplementationCreate(
                      model_spec_id=model_spec_id,
                      version_label=BUNDLED_BLUEREV_PROCESS0_LABEL,
                      implementation_kind=CALC_V0_IMPLEMENTATION_KIND,
                      notes="Bundled reviewed 047 forward model with a value-free input contract.",
                      script_text=script_path.read_text(encoding="utf-8"),
                      input_contract=contract,
                  ),
              )
          '''
          marker = "\n\ndef get_model_implementation("
          if text.count(marker) != 1:
              raise SystemExit("get_model_implementation marker mismatch")
          text = text.replace(marker, registration + marker, 1)
          helper = '''

          def _bluerev_process0_script_path() -> Path:
              return Path(__file__).resolve().parent / "examples" / "bluerev_geometry_hydraulics_v0.py"


          def _bluerev_process0_contract_path() -> Path:
              return (
                  Path(__file__).resolve().parent
                  / "examples"
                  / "bluerev_geometry_hydraulics_v0.contract.json"
              )
          '''
          marker = "\n\ndef _pretty_json("
          if text.count(marker) != 1:
              raise SystemExit("pretty json marker mismatch")
          text = text.replace(marker, helper + marker, 1)
          path.write_text(text, encoding="utf-8")

          path = Path("backend/app/modules/runner/routes.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    preview_model_bindings,\n    run_runner_job,\n",
              "    preview_model_bindings,\n    register_bundled_bluerev_process0,\n    run_runner_job,\n",
              1,
          )
          route = '''

          @router.post(
              "/workspaces/{workspace_id}/bundled-models/bluerev-geometry-hydraulics-v0/register",
              response_model=ModelImplementationRead,
          )
          def register_bundled_bluerev_process0_endpoint(
              workspace_id: str,
          ) -> ModelImplementationRead:
              try:
                  return register_bundled_bluerev_process0(workspace_id)
              except RunnerSafetyError as exc:
                  raise _runner_error(exc) from exc
          '''
          marker = "\n\n@router.get(\"/workspaces/{workspace_id}/model-implementations\""
          if text.count(marker) != 1:
              raise SystemExit("list route marker mismatch")
          text = text.replace(marker, route + marker, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Add idempotency test
        run: |
          cat >> backend/tests/test_model_scenario_dof.py <<'PY'


          def test_bundled_047_registration_is_explicit_idempotent_and_value_free(
              client: TestClient,
          ) -> None:
              before = client.get("/workspaces/bluerev/model-implementations").json()
              assert before == []

              endpoint = "/workspaces/bluerev/bundled-models/bluerev-geometry-hydraulics-v0/register"
              first = client.post(endpoint)
              second = client.post(endpoint)
              assert first.status_code == 200, first.text
              assert second.status_code == 200, second.text
              assert second.json()["id"] == first.json()["id"]
              assert first.json()["version_label"] == "bluerev-geometry-hydraulics-v0-bundled"
              assert len(first.json()["input_contract"]["variables"]) == 9
              forbidden = {"value", "default", "recommended_value", "initial_guess"}
              assert all(
                  not forbidden.intersection(variable)
                  for variable in first.json()["input_contract"]["variables"]
              )

              implementations = client.get(
                  "/workspaces/bluerev/model-implementations"
              ).json()
              assert [item["id"] for item in implementations] == [first.json()["id"]]
          PY

          rm .github/workflows/add-071-bundled-backend-once.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate style
        run: |
          python -m pip install -q ruff
          python -m ruff check --fix backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py
          python -m ruff format backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py
          python -m ruff check backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py
      - name: Commit backend registration
        run: |
          git config user.name "jarvisos-implementation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/app/modules/runner/service.py backend/app/modules/runner/routes.py backend/tests/test_model_scenario_dof.py .github/workflows/add-071-bundled-backend-once.yml
          git commit -m "Add explicit bundled 047 backend registration"
          git push origin HEAD:impl/071-model-scenario-dof
