name: One-shot 024-A guard runner

on:
  push:
    branches: [impl/spec-024-a-quadratic-tetrahedra]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/spec-024-a-quadratic-tetrahedra
      - name: Execute frozen patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/one-shot-024a-high-order-guard.yml').read_text(encoding='utf-8')
          block = source.split("          python - <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
          code = "\n".join(line[10:] if line.startswith("          ") else line for line in block.splitlines())
          exec(compile(code, 'one-shot-024a-high-order-guard', 'exec'))
          PY
      - name: Commit verified patch and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/one-shot-024a-high-order-guard.yml
          rm -f .github/workflows/one-shot-024a-run.yml
          rm -f .tmp-024a-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reject invalid quadratic meshes before solving"
          git push origin HEAD:impl/spec-024-a-quadratic-tetrahedra
