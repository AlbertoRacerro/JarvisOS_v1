name: Ruff Diagnostic

on:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install Ruff
        working-directory: backend
        run: python -m pip install -r requirements-dev.txt
      - name: Capture Ruff
        id: ruff
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          python -m ruff check app tests ../scripts/check_spec_status.py \
            ../scripts/cheap_review.py ../scripts/manual_review.py \
            2>&1 | tee "$RUNNER_TEMP/ruff.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-diagnostic
          path: ${{ runner.temp }}/ruff.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce Ruff
        run: test "${{ steps.ruff.outputs.status }}" = "0"
