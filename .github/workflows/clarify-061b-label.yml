name: Clarify 061b Setting Label

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Clarify inactive setting and build
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python - <<'PY'
          from pathlib import Path
          path = Path("frontend/src/pages/AIDraft.tsx")
          text = path.read_text(encoding="utf-8")
          old_title = "                Direct continuation limit\n"
          new_title = "                Reserved continuation limit (available after 061b)\n"
          old_note = '                  Server-owned per-flow snapshot · {settings?.direct_continuation_policy_version ?? "token-flow-v0"}\n'
          new_note = '                  Configuration substrate only; runtime remains disabled in 061a · {settings?.direct_continuation_policy_version ?? "token-flow-v0"}\n'
          if text.count(old_title) != 1 or text.count(old_note) != 1:
              raise RuntimeError("continuation setting label target is missing or ambiguous")
          path.write_text(text.replace(old_title, new_title).replace(old_note, new_note), encoding="utf-8")
          PY
          npm ci --prefix frontend
          npm run build --prefix frontend
          rm .github/workflows/clarify-061b-label.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Clarify inactive continuation setting"
          git push origin "HEAD:$TARGET_BRANCH"
