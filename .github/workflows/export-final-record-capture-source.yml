name: Export final record capture source

on:
  pull_request:
    types: [synchronize]
    branches: [impl/061b-confirmed-length-loop]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 162
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage exact source
        run: |
          mkdir -p /tmp/final-capture/backend/app/core
          mkdir -p /tmp/final-capture/backend/app/modules/ai
          mkdir -p /tmp/final-capture/backend/app/modules/memory
          mkdir -p /tmp/final-capture/backend/tests
          cp backend/app/core/token_flow_schema.py /tmp/final-capture/backend/app/core/
          cp backend/app/core/database.py /tmp/final-capture/backend/app/core/
          cp backend/app/modules/ai/execution.py /tmp/final-capture/backend/app/modules/ai/
          cp backend/app/modules/ai/egress_confirmation_core.py /tmp/final-capture/backend/app/modules/ai/
          cp backend/app/modules/ai/record_capture.py /tmp/final-capture/backend/app/modules/ai/
          cp backend/app/modules/memory/service.py /tmp/final-capture/backend/app/modules/memory/
          cp backend/tests/test_ai_record_capture_integration.py /tmp/final-capture/backend/tests/ || true
          cp backend/tests/test_token_flow_confirmed_length_resume.py /tmp/final-capture/backend/tests/
          cp backend/tests/test_token_flow_external_runtime_integration.py /tmp/final-capture/backend/tests/
          cp backend/tests/test_token_flow_local_runtime_integration.py /tmp/final-capture/backend/tests/
      - uses: actions/upload-artifact@v4
        with:
          name: final-record-capture-source
          path: /tmp/final-capture
          if-no-files-found: error
          retention-days: 1
