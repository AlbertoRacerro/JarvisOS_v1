name: Manual Senior Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Open pull request number to review"
        required: true
        type: string

concurrency:
  group: manual-senior-review-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    # Dispatch from master only. This prevents a feature branch from changing the
    # workflow and then receiving provider secrets.
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The PR checkout supplies its spec and diff context. Executable reviewer
      # code and authority policy are always replaced with trusted master copies.
      - name: Pin manual reviewer and policy to master
        run: |
          git fetch origin master
          git checkout FETCH_HEAD -- AGENTS.md scripts/cheap_review.py scripts/manual_review.py

      - name: Self-test trusted review helpers
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Run manually requested senior review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_PR_NUMBER: ${{ inputs.pr_number }}
          CHEAP_REVIEW_PROVIDER: glm
          CHEAP_REVIEW_BASE_URL: https://api.z.ai/api/paas/v4/chat/completions
          CHEAP_REVIEW_MODEL: glm-5.2
          CHEAP_REVIEW_API_KEY: ${{ secrets.GLM_API_KEY }}
          REVIEW_TIER: senior
          REVIEW_TITLE: "Manual senior review"
          CHEAP_REVIEW_DIFF_CAP: "60000"
          REVIEW_HTTP_TIMEOUT: "480"
          REVIEW_STREAM: "true"
        run: python scripts/manual_review.py
