name: Export 061b confirmation resume source

on:
  pull_request:
    types: [opened, synchronize]
    branches: [spec/061b-token-flow-continuation]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.head.ref == 'impl/061b-confirmation-resume'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage exact source and transport payloads
        run: |
          mkdir -p /tmp/061b-resume/backend/app/core
          mkdir -p /tmp/061b-resume/backend/app/modules/ai
          mkdir -p /tmp/061b-resume/backend/tests
          mkdir -p /tmp/061b-resume/.jarvis-tmp
          cp backend/app/core/egress_schema.py /tmp/061b-resume/backend/app/core/
          cp backend/app/modules/ai/egress_persistence.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/egress_lifecycle.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/egress_revalidation.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/egress_runtime.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/egress_confirmation.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_service.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_external_runtime.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/app/modules/ai/token_flow_continuation.py /tmp/061b-resume/backend/app/modules/ai/
          cp backend/tests/test_ai_egress_confirmation.py /tmp/061b-resume/backend/tests/
          cp backend/tests/test_token_flow_external_runtime_integration.py /tmp/061b-resume/backend/tests/
          cp .jarvis-tmp/061b-confirmation-resume.patch.gz.b64 /tmp/061b-resume/.jarvis-tmp/
          cp .jarvis-tmp/061b-confirmation-resume-diagnostic.patch /tmp/061b-resume/.jarvis-tmp/
          cp .jarvis-tmp/061b-confirmation-resume-followup.patch /tmp/061b-resume/.jarvis-tmp/
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: source-061b-confirmation-resume
          path: /tmp/061b-resume
          if-no-files-found: error
          retention-days: 1
