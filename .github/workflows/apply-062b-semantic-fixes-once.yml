name: Apply 062b semantic fixes once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.number == 167 && github.head_ref == 'impl/062b-grade-cohorts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply bounded semantic fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, pattern: str, replacement: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              updated, count = re.subn(
                  pattern,
                  replacement,
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              if count != 1:
                  raise SystemExit(f"expected exactly one match in {path}, found {count}")
              target.write_text(updated, encoding="utf-8")

          replace_once(
              "backend/app/modules/ai/flow_grade_cohort_models.py",
              r"^    current_failed_grade_rate: float \| None = None$",
              "    deterministic_failure_rate: float | None = None",
          )
          replace_once(
              "backend/app/modules/ai/flow_grade_cohorts.py",
              r'''        current_failed_grade_rate=\(\n\s*current_grade_counts\["failed"\] / graded if graded else None\n\s*\),''',
              '''        deterministic_failure_rate=(
              state_counts["failed_terminal"] / terminal_flows
              if terminal_flows
              else None
          ),''',
          )
          replace_once(
              "backend/app/modules/ai/flow_grade_cohort_contracts.py",
              r'''def execution_composition\(classes: set\[str\]\) -> str:\n    known = classes & \{"synthetic", "local_compute", "external_provider"\}''',
              '''def execution_composition(classes: set[str]) -> str:
              if "legacy_unknown" in classes:
                  return "mixed_executed_classes"
              known = classes & {"synthetic", "local_compute", "external_provider"}''',
          )
          replace_once(
              "backend/tests/test_flow_grade_cohorts.py",
              r"^    assert cohort\.current_failed_grade_rate == 0$",
              "    assert cohort.deterministic_failure_rate == pytest.approx(1 / 6)",
          )
          PY
      - name: Commit source changes and remove workflow
        shell: bash
        run: |
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/apply-062b-semantic-fixes-once.yml
          git add backend/app/modules/ai/flow_grade_cohort_models.py \
                  backend/app/modules/ai/flow_grade_cohorts.py \
                  backend/app/modules/ai/flow_grade_cohort_contracts.py \
                  backend/tests/test_flow_grade_cohorts.py
          git commit -m "Fix 062b cohort semantics"
          git push origin HEAD:impl/062b-grade-cohorts
