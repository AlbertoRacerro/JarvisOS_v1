name: Diagnose 061a Symbols

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Build symbol location report
        run: |
          python - <<'PY'
          from pathlib import Path
          terms = ("run_confirmation_ticket", "/ai/tasks/run", "_create_proposed_records_from_response")
          lines = []
          for root in (Path("backend/app"), Path("backend/tests")):
              for path in root.rglob("*.py"):
                  text = path.read_text(encoding="utf-8")
                  for number, line in enumerate(text.splitlines(), 1):
                      if any(term in line for term in terms):
                          lines.append(f"{path}:{number}:{line.strip()}")
          Path("symbol-locations.txt").write_text("\n".join(lines), encoding="utf-8")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: symbol-locations
          path: symbol-locations.txt
          retention-days: 1
