name: Complete 051 structure once

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 159 &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact structural patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_name: str, old: str, new: str) -> None:
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path_name}: expected one anchor, found {count}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'backend/app/core/schema.py',
              '''SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID = "0012_model_input_contract"
          SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_NAME = "Model-version input contracts and scenario DOF metadata"
          CURRENT_SCHEMA_MIGRATION_ID = SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID
          CURRENT_SCHEMA_MIGRATION_NAME = SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_NAME
          ''',
              '''SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID = "0012_model_input_contract"
          SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_NAME = "Model-version input contracts and scenario DOF metadata"
          SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_ID = "0013_freshness_invalidation"
          SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_NAME = "Parameter replacement and freshness invalidation overlay"
          CURRENT_SCHEMA_MIGRATION_ID = SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_ID
          CURRENT_SCHEMA_MIGRATION_NAME = SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_NAME
          ''',
          )
          replace_once(
              'backend/app/core/schema.py',
              '''    {
                  "migration_id": SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID,
                  "name": SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_NAME,
                  "checksum": None,
              },
          ]
          ''',
              '''    {
                  "migration_id": SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_ID,
                  "name": SCHEMA_MODEL_INPUT_CONTRACT_MIGRATION_NAME,
                  "checksum": None,
              },
              {
                  "migration_id": SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_ID,
                  "name": SCHEMA_FRESHNESS_INVALIDATION_MIGRATION_NAME,
                  "checksum": None,
              },
          ]
          ''',
          )
          replace_once(
              'backend/app/core/schema.py',
              '''        source_ai_job_id TEXT,
                  promoted_at TEXT,
                  created_at TEXT NOT NULL,
                  updated_at TEXT NOT NULL,
                  notes TEXT,
                  FOREIGN KEY (workspace_id) REFERENCES workspaces(id)
              )
              """,
              """
              CREATE TABLE IF NOT EXISTS model_versions (
          ''',
              '''        source_ai_job_id TEXT,
                  promoted_at TEXT,
                  supersedes_parameter_id TEXT,
                  created_at TEXT NOT NULL,
                  updated_at TEXT NOT NULL,
                  notes TEXT,
                  FOREIGN KEY (workspace_id) REFERENCES workspaces(id),
                  FOREIGN KEY (supersedes_parameter_id) REFERENCES parameters(id)
              )
              """,
              """
              CREATE TABLE IF NOT EXISTS freshness_invalidations (
                  id TEXT PRIMARY KEY,
                  workspace_id TEXT NOT NULL,
                  superseded_parameter_id TEXT NOT NULL,
                  replacement_parameter_id TEXT NOT NULL,
                  source_graph_digest TEXT NOT NULL,
                  affected_count INTEGER NOT NULL,
                  unresolved_diagnostic_count INTEGER NOT NULL,
                  cycle_count INTEGER NOT NULL,
                  created_at TEXT NOT NULL,
                  FOREIGN KEY (workspace_id) REFERENCES workspaces(id),
                  FOREIGN KEY (superseded_parameter_id) REFERENCES parameters(id),
                  FOREIGN KEY (replacement_parameter_id) REFERENCES parameters(id),
                  UNIQUE(workspace_id, superseded_parameter_id),
                  UNIQUE(workspace_id, replacement_parameter_id)
              )
              """,
              """
              CREATE TABLE IF NOT EXISTS freshness_marks (
                  id TEXT PRIMARY KEY,
                  workspace_id TEXT NOT NULL,
                  invalidation_id TEXT NOT NULL,
                  record_ref TEXT NOT NULL,
                  record_kind TEXT NOT NULL,
                  record_id TEXT NOT NULL,
                  reason_code TEXT NOT NULL,
                  path_json TEXT NOT NULL,
                  path_digest TEXT NOT NULL,
                  created_at TEXT NOT NULL,
                  FOREIGN KEY (workspace_id) REFERENCES workspaces(id),
                  FOREIGN KEY (invalidation_id) REFERENCES freshness_invalidations(id),
                  UNIQUE(invalidation_id, record_ref)
              )
              """,
              """
              CREATE TABLE IF NOT EXISTS model_versions (
          ''',
          )
          replace_once(
              'backend/app/core/schema.py',
              '''    "ALTER TABLE model_versions ADD COLUMN input_contract_payload TEXT",
              "ALTER TABLE model_versions ADD COLUMN input_contract_sha256 TEXT",
          ]
          ''',
              '''    "ALTER TABLE model_versions ADD COLUMN input_contract_payload TEXT",
              "ALTER TABLE model_versions ADD COLUMN input_contract_sha256 TEXT",
              "ALTER TABLE parameters ADD COLUMN supersedes_parameter_id TEXT",
          ]
          ''',
          )
          replace_once(
              'backend/app/core/schema.py',
              '''    "CREATE INDEX IF NOT EXISTS idx_evidence_records_workspace_kind ON evidence_records(workspace_id, kind, created_at)",
          ]
          ''',
              '''    "CREATE INDEX IF NOT EXISTS idx_evidence_records_workspace_kind ON evidence_records(workspace_id, kind, created_at)",
              "CREATE INDEX IF NOT EXISTS idx_parameters_workspace_supersedes ON parameters(workspace_id, supersedes_parameter_id)",
              "CREATE INDEX IF NOT EXISTS idx_freshness_marks_workspace_ref ON freshness_marks(workspace_id, record_ref)",
              "CREATE INDEX IF NOT EXISTS idx_freshness_marks_invalidation_ref ON freshness_marks(invalidation_id, record_ref)",
              "CREATE INDEX IF NOT EXISTS idx_freshness_invalidations_workspace_created ON freshness_invalidations(workspace_id, created_at)",
          ]
          ''',
          )
          replace_once(
              'backend/app/core/database.py',
              '''        "simulation_runs",
                  "runner_jobs",
          ''',
              '''        "simulation_runs",
                  "freshness_invalidations",
                  "freshness_marks",
                  "runner_jobs",
          ''',
          )

          old_flowsheet = '''def get_flowsheet_node(workspace_id: str, node_ref: str) -> FlowsheetNodeRead:
              kind, record_id = _parse_node_ref(node_ref)
              with open_sqlite_connection() as connection:
                  connection.execute("PRAGMA query_only = ON")
                  connection.execute("BEGIN")
                  try:
                      _require_workspace(connection, workspace_id)
                      row = _select_node_row(connection, workspace_id, kind, record_id)
                      if row is None:
                          raise FlowsheetError("flowsheet_node_not_found", "Flowsheet node not found.")
                      return _node_from_row(kind, row)
                  finally:
                      connection.rollback()
          
          
          def get_flowsheet_graph(workspace_id: str) -> FlowsheetGraphRead:
              with open_sqlite_connection() as connection:
                  connection.execute("PRAGMA query_only = ON")
                  connection.execute("BEGIN")
                  try:
                      _require_workspace(connection, workspace_id)
                      rows = _load_workspace_rows(connection, workspace_id)
                      nodes = _build_nodes(rows)
                      _enforce_bound("nodes", len(nodes), MAX_GRAPH_NODES)
                      builder = _GraphBuilder(nodes)
                      _add_foreign_key_edges(builder, rows)
                      run_payloads = _add_payload_edges(builder, rows)
                      _add_source_reference_edges(builder, rows, run_payloads)
                      _add_ai_context_edges(builder, rows)
                      edges = _materialize_edges(builder.edges)
                      _enforce_bound("edges", len(edges), MAX_GRAPH_EDGES)
                      unresolved = sorted(
                          builder.diagnostics.values(),
                          key=lambda item: (item.owner_ref, item.source_field, item.code, item.raw_ref or ""),
                      )
                      if len(unresolved) > MAX_GRAPH_DIAGNOSTICS:
                          raise FlowsheetError(
                              "flowsheet_diagnostics_limit_exceeded",
                              "Flowsheet unresolved-reference diagnostics exceed the V0 limit.",
                              bound="diagnostics",
                              observed_count=len(unresolved),
                          )
                      node_list = sorted(nodes.values(), key=lambda item: (item.kind, item.id))
                      is_acyclic, order, cycles = _topological_projection(nodes, edges)
                      diagnostics = FlowsheetDiagnosticsRead(
                          unsupported_reference_count=sum(item.code == "unsupported_reference" for item in unresolved),
                          malformed_reference_count=sum(item.code == "malformed_reference" for item in unresolved),
                          dangling_reference_count=sum(item.code == "dangling_reference" for item in unresolved),
                          cycle_count=len(cycles),
                          manual_binding_count=builder.manual_binding_count,
                          unresolved_references=unresolved,
                          cycles=cycles,
                      )
                      return FlowsheetGraphRead(
                          workspace_id=workspace_id,
                          nodes=node_list,
                          edges=edges,
                          topological_order=order,
                          is_acyclic=is_acyclic,
                          diagnostics=diagnostics,
                      )
                  finally:
                      connection.rollback()
          '''
          new_flowsheet = '''def get_flowsheet_node(workspace_id: str, node_ref: str) -> FlowsheetNodeRead:
              with open_sqlite_connection() as connection:
                  connection.execute("PRAGMA query_only = ON")
                  connection.execute("BEGIN")
                  try:
                      return resolve_flowsheet_node_from_connection(connection, workspace_id, node_ref)
                  finally:
                      connection.rollback()
          
          
          def resolve_flowsheet_node_from_connection(
              connection: sqlite3.Connection,
              workspace_id: str,
              node_ref: str,
          ) -> FlowsheetNodeRead:
              _require_workspace(connection, workspace_id)
              kind, record_id = _parse_node_ref(node_ref)
              row = _select_node_row(connection, workspace_id, kind, record_id)
              if row is None:
                  raise FlowsheetError("flowsheet_node_not_found", "Flowsheet node not found.")
              return _node_from_row(kind, row)
          
          
          def get_flowsheet_graph(workspace_id: str) -> FlowsheetGraphRead:
              with open_sqlite_connection() as connection:
                  connection.execute("PRAGMA query_only = ON")
                  connection.execute("BEGIN")
                  try:
                      return build_flowsheet_graph_from_connection(connection, workspace_id)
                  finally:
                      connection.rollback()
          
          
          def build_flowsheet_graph_from_connection(
              connection: sqlite3.Connection,
              workspace_id: str,
          ) -> FlowsheetGraphRead:
              _require_workspace(connection, workspace_id)
              rows = _load_workspace_rows(connection, workspace_id)
              nodes = _build_nodes(rows)
              _enforce_bound("nodes", len(nodes), MAX_GRAPH_NODES)
              builder = _GraphBuilder(nodes)
              _add_foreign_key_edges(builder, rows)
              run_payloads = _add_payload_edges(builder, rows)
              _add_source_reference_edges(builder, rows, run_payloads)
              _add_ai_context_edges(builder, rows)
              edges = _materialize_edges(builder.edges)
              _enforce_bound("edges", len(edges), MAX_GRAPH_EDGES)
              unresolved = sorted(
                  builder.diagnostics.values(),
                  key=lambda item: (item.owner_ref, item.source_field, item.code, item.raw_ref or ""),
              )
              if len(unresolved) > MAX_GRAPH_DIAGNOSTICS:
                  raise FlowsheetError(
                      "flowsheet_diagnostics_limit_exceeded",
                      "Flowsheet unresolved-reference diagnostics exceed the V0 limit.",
                      bound="diagnostics",
                      observed_count=len(unresolved),
                  )
              node_list = sorted(nodes.values(), key=lambda item: (item.kind, item.id))
              is_acyclic, order, cycles = _topological_projection(nodes, edges)
              diagnostics = FlowsheetDiagnosticsRead(
                  unsupported_reference_count=sum(item.code == "unsupported_reference" for item in unresolved),
                  malformed_reference_count=sum(item.code == "malformed_reference" for item in unresolved),
                  dangling_reference_count=sum(item.code == "dangling_reference" for item in unresolved),
                  cycle_count=len(cycles),
                  manual_binding_count=builder.manual_binding_count,
                  unresolved_references=unresolved,
                  cycles=cycles,
              )
              return FlowsheetGraphRead(
                  workspace_id=workspace_id,
                  nodes=node_list,
                  edges=edges,
                  topological_order=order,
                  is_acyclic=is_acyclic,
                  diagnostics=diagnostics,
              )
          '''
          replace_once('backend/app/modules/flowsheet/service.py', old_flowsheet, new_flowsheet)

          replace_once(
              'backend/app/modules/modeling/service.py',
              '''from app.modules.events.service import log_event, utc_now
          from app.modules.modeling.models import (
          ''',
              '''from app.modules.events.service import log_event, utc_now
          from app.modules.memory.replacement import validate_parameter_replacement_proposal
          from app.modules.modeling.models import (
          ''',
          )
          replace_once(
              'backend/app/modules/modeling/service.py',
              '''        _require_workspace(connection, workspace_id)
                  connection.execute(
                      """
                      INSERT INTO parameters (
                          id, workspace_id, name, symbol, value, unit, value_status, value_min,
                          value_max, source_ref, confidence, status, created_at, updated_at, notes
                      ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
                      """,
                      (
                          record_id,
                          workspace_id,
                          payload.name,
                          payload.symbol,
                          payload.value,
                          payload.unit,
                          payload.value_status,
                          payload.value_min,
                          payload.value_max,
                          payload.source_ref,
                          payload.confidence,
                          payload.status,
                          now,
                          now,
                          payload.notes,
                      ),
                  )
          ''',
              '''        _require_workspace(connection, workspace_id)
                  validate_parameter_replacement_proposal(
                      connection,
                      workspace_id=workspace_id,
                      supersedes_parameter_id=payload.supersedes_parameter_id,
                      replacement_parameter_id=record_id,
                      unit=payload.unit,
                      value=payload.value,
                  )
                  connection.execute(
                      """
                      INSERT INTO parameters (
                          id, workspace_id, name, symbol, value, unit, value_status, value_min,
                          value_max, source_ref, confidence, status, created_at, updated_at, notes,
                          supersedes_parameter_id
                      ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
                      """,
                      (
                          record_id,
                          workspace_id,
                          payload.name,
                          payload.symbol,
                          payload.value,
                          payload.unit,
                          payload.value_status,
                          payload.value_min,
                          payload.value_max,
                          payload.source_ref,
                          payload.confidence,
                          payload.status,
                          now,
                          now,
                          payload.notes,
                          payload.supersedes_parameter_id,
                      ),
                  )
          ''',
          )
          replace_once(
              'backend/app/modules/modeling/service.py',
              '''                value_min, value_max, source_ref, confidence, status,
                          created_at, updated_at, notes
          ''',
              '''                value_min, value_max, source_ref, confidence, status,
                          created_at, updated_at, notes, supersedes_parameter_id
          ''',
          )
          replace_once(
              'backend/app/modules/modeling/models.py',
              '''        if self.value_min is not None and self.value_max is not None and self.value_min > self.value_max:
                      raise ValueError("value_min must be less than or equal to value_max")
                  return self
          ''',
              '''        if self.value_min is not None and self.value_max is not None and self.value_min > self.value_max:
                      raise ValueError("value_min must be less than or equal to value_max")
                  if self.supersedes_parameter_id is not None and self.status != "proposed":
                      raise ValueError("Parameter replacements must be created with proposed status.")
                  return self
          ''',
          )
          replace_once(
              'docs/specs/STATUS.md',
              '| 051 | ready | — | FLOWSHEET-RECALC stale propagation | 050 | When an accepted input changes, deterministically mark dependent outputs stale and explain the dependency path; no automatic recomputation or silent promotion. |',
              '| 051 | in_review | [#159](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/159) | FLOWSHEET-RECALC stale propagation | 050 | When an accepted input changes, deterministically mark dependent outputs stale and explain the dependency path; no automatic recomputation or silent promotion. |',
          )
          PY
          rm -f .github/workflows/complete-051-structure-once.yml
          python -m compileall -q backend/app
          git diff --check
      - name: Commit verified structural patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete spec 051 persistence and graph seams"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
