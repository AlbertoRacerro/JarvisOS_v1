name: Promote 048 ready once

on:
  push:
    branches:
      - spec/048-bluerev-process-1-definition

permissions:
  contents: write

jobs:
  promote:
    if: github.repository == 'AlbertoRacerro/JarvisOS_v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/048-bluerev-process-1-definition
          fetch-depth: 0
      - name: Promote exact registry row and remove temporary files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 048 | planned | — | BLUEREV-PROCESS-1: biomass, nutrients, gas, harvest, and energy/cost KPIs |'
          new = '| 048 | ready | — | BLUEREV-PROCESS-1: biomass, nutrients, gas, harvest, and energy/cost KPIs |'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one old 048 row prefix, found {text.count(old)}')
          if new in text:
              raise SystemExit('new 048 ready row already present before replacement')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/promote-048-ready-once.yml .trigger-048-ready
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = ".github/workflows/promote-048-ready-once.yml .trigger-048-ready docs/specs/STATUS.md "
          git config user.name 'JarvisOS Registry Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Promote spec 048 to ready'
          git push origin HEAD:spec/048-bluerev-process-1-definition
