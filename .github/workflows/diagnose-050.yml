name: Diagnose 050 focused tests

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: read

jobs:
  focused:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 156
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -q -r backend/requirements.txt pytest
      - name: Run focused flowsheet tests
        id: focused
        continue-on-error: true
        env:
          PYTHONPATH: backend
        run: pytest -q backend/tests/test_flowsheet_dependency_graph.py -vv --tb=short > /tmp/pytest-050.log 2>&1
      - name: Upload focused test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-050-log
          path: /tmp/pytest-050.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce focused result
        if: steps.focused.outcome != 'success'
        run: exit 1
