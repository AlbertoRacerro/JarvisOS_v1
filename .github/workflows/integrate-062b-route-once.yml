name: Integrate 062b cohort route once

on:
  push:
    branches:
      - impl/062b-grade-cohorts

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
      - name: Register cohort router and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/modules/ai/routes.py")
          text = path.read_text(encoding="utf-8")
          old_import = "from app.modules.ai.flow_grade_routes import router as flow_grade_router\n"
          new_import = (
              "from app.modules.ai.flow_grade_cohort_routes import (\n"
              "    router as flow_grade_cohort_router,\n"
              ")\n"
              "from app.modules.ai.flow_grade_routes import router as flow_grade_router\n"
          )
          if text.count(old_import) != 1:
              raise SystemExit("flow grade router import anchor changed")
          text = text.replace(old_import, new_import, 1)
          old_include = "router.include_router(flow_grade_router)\n"
          new_include = (
              "router.include_router(flow_grade_router)\n"
              "router.include_router(flow_grade_cohort_router)\n"
          )
          if text.count(old_include) != 1:
              raise SystemExit("flow grade router include anchor changed")
          path.write_text(text.replace(old_include, new_include, 1), encoding="utf-8")
          Path(".github/workflows/integrate-062b-route-once.yml").unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Register 062b cohort route"
          git push origin HEAD:impl/062b-grade-cohorts
