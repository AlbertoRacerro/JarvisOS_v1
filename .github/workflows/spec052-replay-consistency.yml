name: Spec 052 replay consistency hardening

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Apply exact replay-consistency patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              observed = text.count(old)
              if observed != count:
                  raise SystemExit(f"{path}: expected {count} occurrence(s), found {observed}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          service = "backend/app/modules/bluecad/cad_link.py"
          replace(
              service,
              '''    expected = {\n        "source_snapshot_digest": preview["source_snapshot_digest"],\n        "source_model_identity_digest": preview["source_model_identity_digest"],\n        "resolved_spec_digest": preview["resolved_spec_digest"],\n        "reconciliation_digest": preview["reconciliation_digest"],\n    }\n''',
              '''    expected = {\n        "source_simulation_run_id": preview["source_simulation_run_id"],\n        "source_runner_job_id": preview["source_runner_job_id"],\n        "transformation_version": preview["transformation_version"],\n        "source_snapshot_digest": preview["source_snapshot_digest"],\n        "source_model_identity_digest": preview["source_model_identity_digest"],\n        "analysis_contract_digest": preview["analysis_contract_digest"],\n        "preview_digest": preview["preview_digest"],\n        "resolved_spec_digest": preview["resolved_spec_digest"],\n        "reconciliation_digest": preview["reconciliation_digest"],\n    }\n''',
          )

          tests = "backend/tests/test_cad_link_boundaries.py"
          anchor = '''def test_concurrent_execute_owns_one_candidate_and_one_link(\n    client: TestClient, monkeypatch: pytest.MonkeyPatch\n) -> None:\n'''
          inserted = '''def test_replay_rejects_inconsistent_persisted_link(client: TestClient) -> None:\n    source = _source_run(client)\n    preview = _preview(client, source["run_id"]).json()\n    first = _execute(client, source["run_id"], preview["preview_digest"])\n    assert first.status_code == 200, first.text\n\n    from app.core.database import open_sqlite_connection\n\n    with open_sqlite_connection() as connection:\n        connection.execute(\n            "UPDATE bluecad_cad_links SET transformation_version = 'tampered' "\n            "WHERE preview_digest = ?",\n            (preview["preview_digest"],),\n        )\n        connection.commit()\n\n    replay = _execute(client, source["run_id"], preview["preview_digest"])\n    assert replay.status_code == 409\n    assert replay.json()["detail"]["code"] == "cad_link_persistence_inconsistent"\n\n    with open_sqlite_connection() as connection:\n        assert connection.execute(\n            "SELECT COUNT(*) AS count FROM bluecad_candidates"\n        ).fetchone()["count"] == 1\n        assert connection.execute(\n            "SELECT COUNT(*) AS count FROM bluecad_attempts"\n        ).fetchone()["count"] == 1\n        assert connection.execute(\n            "SELECT COUNT(*) AS count FROM bluecad_cad_links"\n        ).fetchone()["count"] == 1\n\n\n'''
          replace(tests, anchor, inserted + anchor)

          Path(".github/workflows/spec052-replay-consistency.yml").unlink()
          PY
      - name: Commit replay-consistency hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden spec 052 replay consistency"
          git push origin HEAD:spec/052-cad-link
