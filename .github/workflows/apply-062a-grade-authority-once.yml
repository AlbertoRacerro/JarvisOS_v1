name: Apply 062a grade authority once

on:
  push:
    branches:
      - impl/062a-grade-authority

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062a-grade-authority
      - name: Apply reviewed 062a source and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          import json
          from pathlib import Path

          payloads = json.loads('{"backend/app/core/grade_schema.py": "", "backend/app/modules/ai/flow_grades.py": "", "backend/tests/test_flow_grades.py": ""}')
          for path_text, encoded in payloads.items():
              path = Path(path_text)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(gzip.decompress(base64.b64decode(encoded)))

          patches = json.loads('[["backend/app/core/database.py", "from app.core.egress_schema import (\n    EGRESS_SCHEMA_INDEX_STATEMENTS,\n    EGRESS_SCHEMA_MIGRATION_RECORD,\n    EGRESS_SCHEMA_MIGRATION_STATEMENTS,\n    EGRESS_SCHEMA_STATEMENTS,\n)\nfrom app.core.paths import build_paths\n", "from app.core.egress_schema import (\n    EGRESS_SCHEMA_INDEX_STATEMENTS,\n    EGRESS_SCHEMA_MIGRATION_RECORD,\n    EGRESS_SCHEMA_MIGRATION_STATEMENTS,\n    EGRESS_SCHEMA_STATEMENTS,\n)\nfrom app.core.grade_schema import (\n    GRADE_SCHEMA_INDEX_STATEMENTS,\n    GRADE_SCHEMA_MIGRATION_RECORD,\n    GRADE_SCHEMA_STATEMENTS,\n)\nfrom app.core.paths import build_paths\n"], ["backend/app/core/database.py", "        for statement in EGRESS_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n        for statement in TOKEN_FLOW_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n", "        for statement in EGRESS_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n        for statement in GRADE_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n        for statement in TOKEN_FLOW_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n"], ["backend/app/core/database.py", "        for statement in EGRESS_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n        for statement in TOKEN_FLOW_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n", "        for statement in EGRESS_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n        for statement in GRADE_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n        for statement in TOKEN_FLOW_SCHEMA_INDEX_STATEMENTS:\n            connection.execute(statement)\n"], ["backend/app/core/database.py", "        \"ai_flow_segments\",\n        \"ai_flow_record_captures\",\n        \"sensitivity_labels\",\n", "        \"ai_flow_segments\",\n        \"ai_flow_record_captures\",\n        \"ai_flow_grade_subjects\",\n        \"ai_flow_grade_events\",\n        \"sensitivity_labels\",\n"], ["backend/app/core/database.py", "        *SCHEMA_MIGRATION_RECORDS,\n        EGRESS_SCHEMA_MIGRATION_RECORD,\n        TOKEN_FLOW_SCHEMA_MIGRATION_RECORD,\n", "        *SCHEMA_MIGRATION_RECORDS,\n        EGRESS_SCHEMA_MIGRATION_RECORD,\n        GRADE_SCHEMA_MIGRATION_RECORD,\n        TOKEN_FLOW_SCHEMA_MIGRATION_RECORD,\n"], ["backend/app/modules/ai/token_flow_service.py", "        connection.execute(\n            \"UPDATE ai_flows SET final_accounting_digest = ?, final_output_digest = ? WHERE id = ?\",\n            (accounting_digest, output_digest, flow_id),\n        )\n    return _decode_flow(_require_flow(connection, flow_id))\n", "        connection.execute(\n            \"UPDATE ai_flows SET final_accounting_digest = ?, final_output_digest = ? WHERE id = ?\",\n            (accounting_digest, output_digest, flow_id),\n        )\n        from app.modules.ai.flow_grades import (\n            ensure_flow_grade_subject_in_transaction,\n        )\n\n        ensure_flow_grade_subject_in_transaction(connection, flow_id=flow_id)\n    return _decode_flow(_require_flow(connection, flow_id))\n"], ["backend/app/modules/ai/models.py", "from typing import Any\n", "from typing import Any, Literal\n"], ["backend/app/modules/ai/models.py", "class EscalationConfirmResponse(BaseModel):\n    status: str\n    ticket_id: str\n    execution_ledger_id: str\n    reason_code: str | None = None\n    task_response: AITaskRunResponse\n", "class EscalationConfirmResponse(BaseModel):\n    status: str\n    ticket_id: str\n    execution_ledger_id: str\n    reason_code: str | None = None\n    task_response: AITaskRunResponse\n\n\nclass FlowGradeSubjectRead(BaseModel):\n    id: str\n    flow_id: str\n    terminal_attempt_id: str | None = None\n    subject_version: int\n    flow_outcome_digest: str\n    final_accounting_digest: str\n    final_output_digest: str | None = None\n    valid: bool\n    invalidated_at: str | None = None\n    created_at: str\n\n\nclass FlowGradeEventRead(BaseModel):\n    id: str\n    flow_id: str\n    subject_id: str\n    subject_version: int\n    flow_outcome_digest: str\n    event_index: int\n    action: Literal[\"set\", \"withdraw\"]\n    grade: Literal[\"useful\", \"partly\", \"rework\", \"failed\"] | None = None\n    reason_codes: list[str] = Field(default_factory=list)\n    note: str | None = None\n    actor: str\n    source: Literal[\"operator_ui\", \"operator_api\"]\n    supersedes_event_id: str | None = None\n    idempotency_key: str\n    created_at: str\n    schema_version: str\n    policy_version: str\n    replayed: bool = False\n\n\nclass FlowGradeRead(BaseModel):\n    flow_id: str\n    subject: FlowGradeSubjectRead\n    current_grade_event: FlowGradeEventRead | None = None\n    latest_event: FlowGradeEventRead | None = None\n    history: list[FlowGradeEventRead] = Field(default_factory=list)\n\n\nclass FlowGradeSetRequest(BaseModel):\n    model_config = ConfigDict(extra=\"forbid\")\n\n    grade: Literal[\"useful\", \"partly\", \"rework\", \"failed\"]\n    expected_subject_version: int = Field(ge=1, strict=True)\n    expected_flow_outcome_digest: str = Field(pattern=r\"^sha256:[0-9a-f]{64}$\")\n    idempotency_key: str = Field(\n        min_length=1,\n        max_length=128,\n        pattern=r\"^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$\",\n    )\n    expected_current_grade_event_id: str | None = Field(\n        default=None,\n        pattern=r\"^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$\",\n    )\n    reason_codes: list[str] = Field(default_factory=list, max_length=5)\n    note: str | None = Field(default=None, max_length=1000)\n\n\nclass FlowGradeWithdrawRequest(BaseModel):\n    model_config = ConfigDict(extra=\"forbid\")\n\n    expected_subject_version: int = Field(ge=1, strict=True)\n    expected_flow_outcome_digest: str = Field(pattern=r\"^sha256:[0-9a-f]{64}$\")\n    expected_current_grade_event_id: str = Field(\n        pattern=r\"^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$\"\n    )\n    idempotency_key: str = Field(\n        min_length=1,\n        max_length=128,\n        pattern=r\"^[A-Za-z0-9][A-Za-z0-9_.:-]{0,127}$\",\n    )\n"], ["backend/app/modules/ai/routes.py", "from app.modules.ai.egress_service import EgressContractError\nfrom app.modules.ai.gateway import AIGateway\n", "from app.modules.ai.egress_service import EgressContractError\nfrom app.modules.ai.flow_grades import (\n    FlowGradeConflictError,\n    FlowGradeContractError,\n    FlowGradeNotFoundError,\n    get_flow_grade_state,\n    set_flow_grade,\n    withdraw_flow_grade,\n)\nfrom app.modules.ai.gateway import AIGateway\n"], ["backend/app/modules/ai/routes.py", "    EscalationConfirmRequest,\n    EscalationConfirmResponse,\n    ModelingDraftRequest,\n", "    EscalationConfirmRequest,\n    EscalationConfirmResponse,\n    FlowGradeEventRead,\n    FlowGradeRead,\n    FlowGradeSetRequest,\n    FlowGradeWithdrawRequest,\n    ModelingDraftRequest,\n"], ["backend/app/modules/ai/routes.py", "@router.post(\"/tasks/escalations/confirm\", response_model=EscalationConfirmResponse)\ndef confirm_ai_task_escalation(payload: EscalationConfirmRequest) -> EscalationConfirmResponse:\n    ensure_ai_settings()\n    try:\n        return confirm_escalation(payload)\n    except EgressStateError as exc:\n        raise HTTPException(status_code=409, detail=str(exc)) from exc\n    except EgressContractError as exc:\n        raise HTTPException(status_code=422, detail=str(exc)) from exc\n", "@router.post(\"/tasks/escalations/confirm\", response_model=EscalationConfirmResponse)\ndef confirm_ai_task_escalation(payload: EscalationConfirmRequest) -> EscalationConfirmResponse:\n    ensure_ai_settings()\n    try:\n        return confirm_escalation(payload)\n    except EgressStateError as exc:\n        raise HTTPException(status_code=409, detail=str(exc)) from exc\n    except EgressContractError as exc:\n        raise HTTPException(status_code=422, detail=str(exc)) from exc\n\n\n@router.get(\"/flows/{flow_id}/grade\", response_model=FlowGradeRead)\ndef read_flow_grade(flow_id: str) -> FlowGradeRead:\n    try:\n        return FlowGradeRead.model_validate(get_flow_grade_state(flow_id))\n    except (FlowGradeNotFoundError, FlowGradeConflictError, FlowGradeContractError) as exc:\n        raise _flow_grade_http_exception(exc) from exc\n\n\n@router.post(\"/flows/{flow_id}/grade\", response_model=FlowGradeEventRead)\ndef set_flow_grade_endpoint(\n    flow_id: str,\n    payload: FlowGradeSetRequest,\n) -> FlowGradeEventRead:\n    try:\n        event = set_flow_grade(\n            flow_id=flow_id,\n            grade=payload.grade,\n            expected_subject_version=payload.expected_subject_version,\n            expected_flow_outcome_digest=payload.expected_flow_outcome_digest,\n            idempotency_key=payload.idempotency_key,\n            expected_current_grade_event_id=payload.expected_current_grade_event_id,\n            reason_codes=payload.reason_codes,\n            note=payload.note,\n            source=\"operator_api\",\n        )\n        return FlowGradeEventRead.model_validate(event)\n    except (FlowGradeNotFoundError, FlowGradeConflictError, FlowGradeContractError) as exc:\n        raise _flow_grade_http_exception(exc) from exc\n\n\n@router.post(\"/flows/{flow_id}/grade/withdraw\", response_model=FlowGradeEventRead)\ndef withdraw_flow_grade_endpoint(\n    flow_id: str,\n    payload: FlowGradeWithdrawRequest,\n) -> FlowGradeEventRead:\n    try:\n        event = withdraw_flow_grade(\n            flow_id=flow_id,\n            expected_subject_version=payload.expected_subject_version,\n            expected_flow_outcome_digest=payload.expected_flow_outcome_digest,\n            expected_current_grade_event_id=payload.expected_current_grade_event_id,\n            idempotency_key=payload.idempotency_key,\n            source=\"operator_api\",\n        )\n        return FlowGradeEventRead.model_validate(event)\n    except (FlowGradeNotFoundError, FlowGradeConflictError, FlowGradeContractError) as exc:\n        raise _flow_grade_http_exception(exc) from exc\n"], ["backend/app/modules/ai/routes.py", "def _optional_text(value: object) -> str | None:\n    return value if isinstance(value, str) and value else None\n", "\ndef _flow_grade_http_exception(\n    exc: FlowGradeNotFoundError | FlowGradeConflictError | FlowGradeContractError,\n) -> HTTPException:\n    if isinstance(exc, FlowGradeNotFoundError):\n        return HTTPException(status_code=404, detail=str(exc))\n    if isinstance(exc, FlowGradeConflictError):\n        return HTTPException(status_code=409, detail=str(exc))\n    return HTTPException(status_code=422, detail=str(exc))\n\ndef _optional_text(value: object) -> str | None:\n    return value if isinstance(value, str) and value else None\n"]]')
          for path_text, old, new in patches:
              path = Path(path_text)
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f"expected one patch anchor in {path_text}, found {count}"
                  )
              path.write_text(text.replace(old, new), encoding="utf-8")

          workflow = Path(".github/workflows/apply-062a-grade-authority-once.yml")
          if not workflow.exists():
              raise SystemExit("one-shot workflow is missing")
          workflow.unlink()
          PY
          python -m py_compile             backend/app/core/grade_schema.py             backend/app/modules/ai/flow_grades.py             backend/app/modules/ai/models.py             backend/app/modules/ai/routes.py             backend/app/modules/ai/token_flow_service.py             backend/tests/test_flow_grades.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement 062a flow grade authority"
          git push origin HEAD:impl/062a-grade-authority
