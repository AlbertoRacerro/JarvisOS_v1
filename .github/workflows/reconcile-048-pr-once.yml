name: Reconcile 048 merged once

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master]

permissions:
  contents: write

jobs:
  reconcile:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 151 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/048-merged-status'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/048-merged-status
          fetch-depth: 0
      - name: Reconcile exact row and remove temporary files
        shell: bash
        run: |
          python scripts/reconcile_048_once.py
          rm -f scripts/reconcile_048_once.py .github/workflows/reconcile-048-pr-once.yml
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = ".github/workflows/reconcile-048-pr-once.yml docs/specs/STATUS.md scripts/reconcile_048_once.py "
          git config user.name 'JarvisOS Registry Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Mark spec 048 merged'
          git push origin HEAD:docs/048-merged-status
