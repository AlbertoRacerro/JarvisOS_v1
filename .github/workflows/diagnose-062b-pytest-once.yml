name: Diagnose 062b Pytest once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 167 && github.head_ref == 'impl/062b-grade-cohorts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture focused tests
        working-directory: backend
        shell: bash
        run: |
          python -m pytest -q \
            tests/test_flow_grade_cohort_bounds.py \
            tests/test_flow_grade_cohort_distributions.py \
            tests/test_flow_grade_cohort_note_privacy.py \
            tests/test_flow_grade_cohort_unknown_buckets.py \
            tests/test_flow_grade_cohort_withdrawal_invariance.py \
            tests/test_flow_grade_cohorts.py \
            tests/test_grade_cohort_endpoint_methods.py \
            tests/test_grade_status_registry.py \
            > /tmp/pytest-062b.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-062b-diagnostic
          path: /tmp/pytest-062b.txt
          if-no-files-found: error
          retention-days: 1
