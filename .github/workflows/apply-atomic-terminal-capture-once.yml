name: Apply atomic terminal capture once

on:
  pull_request:
    types: [synchronize]
    branches: [impl/061b-final-record-capture]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 163
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Decode and apply reviewed patch
        shell: bash
        run: |
          set -o pipefail
          {
            base64 -d .jarvis-tmp/atomic-terminal-capture.patch.gz.b64 \
              | gzip -d > /tmp/atomic-terminal-capture.patch
            echo 'cdaef09f7a09d3787d0b5c09da929ed9078f5f0e47d60094e4f31a80ca80f16e  /tmp/atomic-terminal-capture.patch' \
              | sha256sum -c -
            grep '^diff --git' /tmp/atomic-terminal-capture.patch
            git apply --verbose --check --index --directory=backend /tmp/atomic-terminal-capture.patch
            git apply --index --directory=backend /tmp/atomic-terminal-capture.patch
          } 2>&1 | tee "$RUNNER_TEMP/atomic-terminal-capture-apply.log"
      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomic-terminal-capture-apply-diagnostics
          path: ${{ runner.temp }}/atomic-terminal-capture-apply.log
          if-no-files-found: warn
          retention-days: 1
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Normalize canonical formatting
        working-directory: backend
        run: |
          python -m ruff check --fix \
            app/modules/ai/egress_confirmation_core.py \
            app/modules/ai/egress_runtime.py \
            app/modules/ai/execution.py \
            app/modules/ai/flow_record_capture.py \
            app/modules/ai/token_flow_service.py \
            app/modules/ai/token_flow_terminalization.py \
            tests/test_token_flow_final_record_capture.py || true
      - name: Validate atomic terminal capture
        id: validate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          {
            set -e
            python -m ruff check \
              app/modules/ai/egress_confirmation_core.py \
              app/modules/ai/egress_runtime.py \
              app/modules/ai/execution.py \
              app/modules/ai/flow_record_capture.py \
              app/modules/ai/token_flow_service.py \
              app/modules/ai/token_flow_terminalization.py \
              tests/test_token_flow_final_record_capture.py
            python -m pytest -q --tb=short \
              tests/test_token_flow_final_record_capture.py \
              tests/test_token_flow_confirmed_length_resume.py \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_token_flow_local_runtime_integration.py \
              tests/test_ai_egress_confirmation.py
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/atomic-terminal-capture.log"
          exit ${PIPESTATUS[0]}
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomic-terminal-capture-validation
          path: ${{ runner.temp }}/atomic-terminal-capture.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit reviewed source only
        if: steps.validate.outcome == 'success'
        run: |
          git add \
            backend/app/modules/ai/egress_confirmation_core.py \
            backend/app/modules/ai/egress_runtime.py \
            backend/app/modules/ai/execution.py \
            backend/app/modules/ai/flow_record_capture.py \
            backend/app/modules/ai/token_flow_service.py \
            backend/app/modules/ai/token_flow_terminalization.py \
            backend/tests/test_token_flow_final_record_capture.py
          git rm \
            .github/workflows/apply-atomic-terminal-capture-once.yml \
            .jarvis-tmp/atomic-terminal-capture.patch.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: atomically terminalize and capture records'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
