name: Apply Continuation Settings UI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Patch and build frontend
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
        run: |
          set -euxo pipefail
          git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
          python scripts/apply_continuation_settings_ui.py
          npm ci --prefix frontend
          npm run build --prefix frontend
          rm scripts/apply_continuation_settings_ui.py
          rm .github/workflows/export-frontend-source.yml
          rm .github/workflows/apply-continuation-settings-ui.yml
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Expose continuation guard in AI settings UI"
          git push origin "HEAD:$TARGET_BRANCH"
