name: Fix 050 cycle wording once

on:
  push:
    branches:
      - spec/050-flowsheet-dag-definition

permissions:
  contents: write

jobs:
  patch:
    if: github.repository == 'AlbertoRacerro/JarvisOS_v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/050-flowsheet-dag-definition
          fetch-depth: 0
      - name: Correct directed-cycle canonicalization
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/specs/050-flowsheet-dependency-dag.md')
          text = path.read_text(encoding='utf-8')
          old = 'Cycle paths are canonicalized by rotating each path to its lexicographically smallest\nnode and choosing the lexicographically smaller direction when equivalent.'
          new = 'Cycle paths are canonicalized by rotating each directed path to its lexicographically\nsmallest node. Edge direction is never reversed.'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one cycle wording anchor, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/fix-050-cycle-wording-once.yml').unlink()
      - name: Commit corrected definition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/050-flowsheet-dependency-dag.md .github/workflows/fix-050-cycle-wording-once.yml
          git commit -m "Clarify directed cycle canonicalization"
          git push origin HEAD:spec/050-flowsheet-dag-definition
