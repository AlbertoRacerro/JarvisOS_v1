name: Apply spec 072 implementation status

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - name: Patch registry and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 072 | ready | — | BLUEREV-PROCESS-3: explicit symmetric hydraulic topology M1 |'
          new = '| 072 | in_review | [#172](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/172) | BLUEREV-PROCESS-3: explicit symmetric hydraulic topology M1 |'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one registry row match, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/apply-072-status.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/specs/STATUS.md .github/workflows/apply-072-status.yml
          git commit -m 'Mark spec 072 in review'
          git push origin HEAD:spec/072-process-topology
