name: Define spec 072 status

on:
  push:
    branches:
      - spec/072-process-topology-definition
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology-definition
          fetch-depth: 0
      - name: Patch canonical registry
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old_priority = '''6. Preserve the merged `047`–`051` and `071` process-model, editable-binding,
             forward-DOF, dependency-graph, and stale-propagation foundation. Promote and
             implement `052` CAD-LINK before residual UI work unless a concrete runtime
             blocker is recorded; Hermes work must not indefinitely displace measurable
             BlueRev engineering progress.
          7. Run `069` MEMORY-CONSOLIDATE-0 as the first Hermes dogfood only after 066–068
             are merged and the required local route is qualified.
          8. Continue `063`/`064`, `012` → `033`, and residual conversation/UI rows according
             to dependencies, explicit maintainer priority, and measured value.
          '''
          new_priority = '''6. Preserve the merged `047`–`052` and `071` process-model, editable-binding,
             forward-DOF, dependency-graph, stale-propagation, and deterministic M0 CAD-link
             foundation.
          7. Promote and implement `072` before residual UI work. It must separate installed
             geometry from the representative hydraulic path and establish explicit symmetric
             topology before any multi-part CAD-LINK-1 claim; Hermes work must not indefinitely
             displace measurable BlueRev engineering progress.
          8. Run `069` MEMORY-CONSOLIDATE-0 as the first Hermes dogfood only after 066–068
             are merged and the required local route is qualified.
          9. Continue `063`/`064`, `012` → `033`, and residual conversation/UI rows according
             to dependencies, explicit maintainer priority, and measured value.
          '''
          if text.count(old_priority) != 1:
              raise SystemExit(f'priority block match count={text.count(old_priority)}')
          text = text.replace(old_priority, new_priority, 1)

          old_row = '''| 071 | merged | [#147](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/147) | MODEL-SCENARIO-DOF-0: editable bindings, scenario runs, and degree-of-freedom inspection | 040, 043, 047 | Expose immutable value-free model input contracts, side-effect-free forward binding/DOF preview, parameter-backed or manual scenario bindings, existing-runner execution, and one bounded Domain Foundation panel; no inverse solver, targets, optimizer, automatic promotion, or embedded design defaults. |
          '''
          new_row = old_row + '''| 072 | ready | — | BLUEREV-PROCESS-3: explicit symmetric hydraulic topology M1 | 043, 047, 050, 051, 052, 071 | Add one deterministic fixed-topology closed loop with common supply/return sections and 1–12 identical parallel branches; separate installed geometry from the representative hydraulic path, emit a canonical topology manifest, and prove reduction to 047 without adding a generic network solver, CAD layout, automatic recompute, or UI. |
          '''
          if text.count(old_row) != 1:
              raise SystemExit(f'071 row match count={text.count(old_row)}')
          path.write_text(text.replace(old_row, new_row, 1), encoding='utf-8')
          PY
      - name: Commit registry update and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/define-spec-072-status.yml
          git add docs/specs/STATUS.md
          git commit -m "Promote spec 072 process topology definition"
          git push origin HEAD:spec/072-process-topology-definition
