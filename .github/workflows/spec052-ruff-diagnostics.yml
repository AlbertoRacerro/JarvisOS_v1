name: Spec 052 Ruff diagnostics

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture lint output
        shell: bash
        run: |
          mkdir -p reports
          cd backend
          python -m ruff check app tests ../scripts/check_spec_status.py ../scripts/cheap_review.py ../scripts/manual_review.py > ../reports/spec052-ruff-boundaries.txt 2>&1 || true
          cd ..
          rm .github/workflows/spec052-ruff-diagnostics.yml
      - name: Commit diagnostic report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture spec 052 Ruff diagnostics"
          git push origin HEAD:spec/052-cad-link
