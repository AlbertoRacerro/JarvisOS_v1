name: Apply final record capture once

on:
  pull_request:
    types: [synchronize]
    branches: [impl/061b-confirmed-length-loop]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 162
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Materialize reviewed source
        shell: bash
        run: |
          set -o pipefail
          {
            cat \
              .jarvis-tmp/final-record-capture.patch.gz.b64.part1 \
              .jarvis-tmp/final-record-capture.patch.gz.b64.part2 \
              | base64 -d | gzip -d > /tmp/final-record-capture.patch
            echo '49b1a09a33c046a3477e6f72e0142a8efbbd54896d815f3e20e42e87dbecdb47  /tmp/final-record-capture.patch' \
              | sha256sum -c -
            git apply --check --index --directory=backend /tmp/final-record-capture.patch
            git apply --index --directory=backend /tmp/final-record-capture.patch

            base64 -d .jarvis-tmp/flow-record-capture.py.gz.b64 \
              | gzip -d > backend/app/modules/ai/flow_record_capture.py
            echo 'bda01d75f956bb508adcf18d57c70c355c6a7e09651f7ef3cb5cbddfefc4cac4  backend/app/modules/ai/flow_record_capture.py' \
              | sha256sum -c -

            base64 -d .jarvis-tmp/test-token-flow-final-record-capture.py.gz.b64 \
              | gzip -d > backend/tests/test_token_flow_final_record_capture.py
            echo '7e9ed1df93902cb5a991c152b445ab1513149b2214c59a6b7e5c28a6e11d8568  backend/tests/test_token_flow_final_record_capture.py' \
              | sha256sum -c -
          } 2>&1 | tee "$RUNNER_TEMP/final-record-capture-apply.log"
      - name: Upload materialization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-record-capture-apply-diagnostics
          path: ${{ runner.temp }}/final-record-capture-apply.log
          if-no-files-found: warn
          retention-days: 1
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Normalize canonical formatting
        working-directory: backend
        run: |
          python -m ruff check --fix \
            app/core/database.py \
            app/core/token_flow_schema.py \
            app/modules/ai/egress_confirmation_core.py \
            app/modules/ai/execution.py \
            app/modules/ai/flow_record_capture.py \
            app/modules/ai/record_capture.py \
            app/modules/memory/service.py \
            tests/test_token_flow_final_record_capture.py || true
      - name: Validate exactly-once capture
        id: validate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          {
            set -e
            python -m ruff check \
              app/core/database.py \
              app/core/token_flow_schema.py \
              app/modules/ai/egress_confirmation_core.py \
              app/modules/ai/execution.py \
              app/modules/ai/flow_record_capture.py \
              app/modules/ai/record_capture.py \
              app/modules/memory/service.py \
              tests/test_token_flow_final_record_capture.py
            python -m pytest -q --tb=short \
              tests/test_token_flow_final_record_capture.py \
              tests/test_token_flow_confirmed_length_resume.py \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_token_flow_local_runtime_integration.py \
              tests/test_ai_egress_confirmation.py
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/final-record-capture.log"
          exit ${PIPESTATUS[0]}
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-record-capture-validation
          path: ${{ runner.temp }}/final-record-capture.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit reviewed source only
        if: steps.validate.outcome == 'success'
        run: |
          git add \
            backend/app/core/database.py \
            backend/app/core/token_flow_schema.py \
            backend/app/modules/ai/egress_confirmation_core.py \
            backend/app/modules/ai/execution.py \
            backend/app/modules/ai/flow_record_capture.py \
            backend/app/modules/ai/record_capture.py \
            backend/app/modules/memory/service.py \
            backend/tests/test_token_flow_final_record_capture.py
          git rm \
            .github/workflows/apply-final-record-capture-once.yml \
            .github/workflows/export-final-record-capture-source.yml \
            .jarvis-tmp/final-record-capture.patch.gz.b64 \
            .jarvis-tmp/final-record-capture.patch.gz.b64.part1 \
            .jarvis-tmp/final-record-capture.patch.gz.b64.part2 \
            .jarvis-tmp/flow-record-capture.py.gz.b64 \
            .jarvis-tmp/test-token-flow-final-record-capture.py.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat: capture final flow records exactly once'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
