name: Reconcile 050 ready once

on:
  push:
    branches:
      - spec/050-flowsheet-dag-definition

permissions:
  contents: write

jobs:
  reconcile:
    if: github.repository == 'AlbertoRacerro/JarvisOS_v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/050-flowsheet-dag-definition
          fetch-depth: 0
      - name: Mark 050 ready and remove workflow
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 050 | planned | — | FLOWSHEET-1 dependency DAG | 047, 048, 049 | Materialize an inspectable graph from existing provenance without a recompute engine; normalize legacy FK/source forms at read time and own the shared `<kind>:<id>` resolver. |'
          new = '| 050 | ready | — | FLOWSHEET-1 dependency DAG | 047, 048, 049 | Materialize an inspectable graph from existing provenance without a recompute engine; normalize legacy FK/source forms at read time and own the shared `<kind>:<id>` resolver. |'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one 050 planned row, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/reconcile-050-ready-once.yml').unlink()
      - name: Commit reconciled definition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/STATUS.md .github/workflows/reconcile-050-ready-once.yml
          git commit -m "Mark spec 050 ready"
          git push origin HEAD:spec/050-flowsheet-dag-definition
