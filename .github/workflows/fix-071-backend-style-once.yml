name: Fix 071 backend style once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Normalize only 071 Python files
        run: |
          python -m ruff check --fix \
            backend/app/core/schema.py \
            backend/app/modules/runner/input_contracts.py \
            backend/app/modules/runner/models.py \
            backend/app/modules/runner/routes.py \
            backend/app/modules/runner/service.py \
            backend/tests/test_model_scenario_dof.py
          python -m ruff format \
            backend/app/core/schema.py \
            backend/app/modules/runner/input_contracts.py \
            backend/app/modules/runner/models.py \
            backend/app/modules/runner/routes.py \
            backend/app/modules/runner/service.py \
            backend/tests/test_model_scenario_dof.py
          python -m ruff check \
            backend/app/core/schema.py \
            backend/app/modules/runner/input_contracts.py \
            backend/app/modules/runner/models.py \
            backend/app/modules/runner/routes.py \
            backend/app/modules/runner/service.py \
            backend/tests/test_model_scenario_dof.py
          rm .github/workflows/fix-071-backend-style-once.yml
      - name: Commit normalized files
        run: |
          git config user.name "jarvisos-implementation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/app/core/schema.py backend/app/modules/runner backend/tests/test_model_scenario_dof.py .github/workflows/fix-071-backend-style-once.yml
          git commit -m "Normalize 071 backend style"
          git push origin HEAD:impl/071-model-scenario-dof
