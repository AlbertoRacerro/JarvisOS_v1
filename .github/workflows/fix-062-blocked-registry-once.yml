name: Align 062 blocked registry once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.number == 168 && github.head_ref == 'status/062-frontend-pending'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: status/062-frontend-pending
          fetch-depth: 0
      - name: Align blocked registry row
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          status = Path('docs/specs/STATUS.md')
          text = status.read_text(encoding='utf-8')
          old = '| 062 | blocked | [#166](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/166), [#167](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/167) | GRADE-0 | 021, 059b, 061a, 061b | Backend grade authority and complete read-only outcome cohorts are merged. The operator-visible four-choice result surface is blocked pending joint operator design of placement, interaction states, accessibility, revision and withdrawal behavior, and stale-subject conflict handling; no autonomous frontend implementation is authorized. |'
          new = '| 062 | blocked | — | GRADE-0 | 021, 059b, 061a, 061b | Backend PRs #166 and #167 are merged. The operator-visible four-choice result surface is blocked pending joint operator design of placement, interaction states, accessibility, revision and withdrawal behavior, and stale-subject conflict handling; no autonomous frontend implementation is authorized. |'
          if text.count(old) != 1:
              raise SystemExit('expected one linked blocked 062 row')
          status.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('backend/tests/test_grade_status_registry.py')
          text = test.read_text(encoding='utf-8')
          text = text.replace('    assert "pull/166" in row\n', '    assert "Backend PRs #166 and #167 are merged" in row\n')
          text = text.replace('    assert "pull/167" in row\n', '')
          test.write_text(text, encoding='utf-8')
          PY
      - name: Commit update and remove workflow
        shell: bash
        run: |
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/fix-062-blocked-registry-once.yml
          git add docs/specs/STATUS.md backend/tests/test_grade_status_registry.py
          git commit -m "Align blocked 062 registry contract"
          git push origin HEAD:status/062-frontend-pending
