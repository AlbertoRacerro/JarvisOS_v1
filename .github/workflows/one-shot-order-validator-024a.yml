name: One-shot 024-A order validator

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync-validator:
    if: github.event.pull_request.number == 77 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Add exact pre-validation contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/modules/bluecad/models.py")
          text = path.read_text(encoding="utf-8")
          old = """    element_order: Literal[1, 2] = 1
              refinements: dict[str, float] | None = None
              quality: _AnalysisMeshQuality | None = None

              @model_validator(mode=\"after\")"""
          new = """    element_order: Literal[1, 2] = 1
              refinements: dict[str, float] | None = None
              quality: _AnalysisMeshQuality | None = None

              @field_validator(\"element_order\", mode=\"before\")
              @classmethod
              def _validate_element_order(cls, value: Any) -> int:
                  if type(value) is not int or value not in (1, 2):
                      raise ValueError(\"mesh.element_order must be integer 1 or 2\")
                  return value

              @model_validator(mode=\"after\")"""
          if text.count(old) != 1:
              raise SystemExit("unexpected _AnalysisMesh validator shape")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Commit validator and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-shot-order-validator-024a.yml
          git add backend/app/modules/bluecad/models.py
          git commit -m "Reject coerced quadratic element orders"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
