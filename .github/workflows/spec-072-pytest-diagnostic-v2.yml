name: Spec 072 pytest diagnostic v2

on:
  push:
    branches:
      - spec/072-process-topology-definition

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology-definition
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture first failure
        working-directory: backend
        run: |
          set +e
          python -m pytest -q -x > ../docs/specs/.tmp-072-pytest.txt 2>&1
          code=$?
          echo "exit_code=$code" >> ../docs/specs/.tmp-072-pytest.txt
          exit 0
      - name: Commit diagnostic and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/spec-072-pytest-diagnostic-v2.yml
          git add docs/specs/.tmp-072-pytest.txt
          git commit -m "Capture corrected spec 072 pytest failure"
          git push origin HEAD:spec/072-process-topology-definition
