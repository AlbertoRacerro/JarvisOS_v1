name: One-shot 024-A high-order guard

on:
  push:
    branches: [impl/spec-024-a-quadratic-tetrahedra]
    paths: [.github/workflows/one-shot-024a-high-order-guard.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/spec-024-a-quadratic-tetrahedra
      - name: Apply exact fail-closed guard and regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          mesh_path = Path("backend/app/modules/bluecad/mesh_adapter.py")
          text = mesh_path.read_text(encoding="utf-8")
          old = '_VOLUME_ELEMENT_PREFIXES = ("C3D", "DC3D")\n'
          new = '''_VOLUME_ELEMENT_PREFIXES = ("C3D", "DC3D")
          _HIGH_ORDER_INVALID_LOG_PATTERNS = (
              re.compile(r"\\b(?P<count>\\d+)\\s+elements?\\s+with\\s+jac\\.?\\s*<\\s*0\\b", re.IGNORECASE),
              re.compile(r"\\bnegative(?:\\s+|-)?jacobians?\\b", re.IGNORECASE),
              re.compile(r"\\binverted\\s+(?:high[- ]order\\s+)?elements?\\b", re.IGNORECASE),
          )
          '''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''    warnings = [
              line
              for line in log_path.read_text(encoding="utf-8").splitlines()
              if "warning" in line.lower() or "quality" in line.lower()
          ]
          '''
          new = '''    log_lines = log_path.read_text(encoding="utf-8").splitlines()
              warnings = [line for line in log_lines if "warning" in line.lower() or "quality" in line.lower()]
          '''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''        )
              if counts["physical_groups"].get("BODY", 0) <= 0:
          '''
          new = '''        )
              if element_order == 2:
                  high_order_error = _high_order_invalid_error(log_lines)
                  if high_order_error is not None:
                      errors.append(high_order_error)
              if counts["physical_groups"].get("BODY", 0) <= 0:
          '''
          assert text.count(old) == 1
          text = text.replace(old, new)

          marker = '\n\ndef _parse_inp_counts(text: str, refs: list[tuple[str, str, str]]) -> dict[str, Any]:\n'
          helper = '''
          
          def _high_order_invalid_error(log_lines: list[str]) -> dict[str, Any] | None:
              diagnostics: list[str] = []
              reported_invalid_elements = 0
              for line in log_lines:
                  for pattern in _HIGH_ORDER_INVALID_LOG_PATTERNS:
                      match = pattern.search(line)
                      if match is None:
                          continue
                      count_text = match.groupdict().get("count")
                      if count_text is not None:
                          count = int(count_text)
                          if count <= 0:
                              break
                          reported_invalid_elements = max(reported_invalid_elements, count)
                      diagnostics.append(line)
                      break
              if not diagnostics:
                  return None
              detail: dict[str, Any] = {"requested_order": 2, "diagnostics": diagnostics}
              if reported_invalid_elements > 0:
                  detail["reported_invalid_elements"] = reported_invalid_elements
              return {"code": "MESH_HIGH_ORDER_INVALID", "detail": detail}
          '''
          assert text.count(marker) == 1
          text = text.replace(marker, helper + marker)
          mesh_path.write_text(text, encoding="utf-8")

          fake_path = Path("backend/tests/bluecad/fixtures/fake_gmsh.py")
          text = fake_path.read_text(encoding="utf-8")
          old = '''if "ignoreorder" in cwd:
              mode = "ignoreorder"
          '''
          new = '''if "ignoreorder" in cwd:
              mode = "ignoreorder"
          elif "negativejac" in cwd:
              mode = "negativejac"
          elif "zerojac" in cwd:
              mode = "zerojac"
          '''
          assert text.count(old) == 1
          text = text.replace(old, new)
          old = 'print(f"Info: fake gmsh quality ok requested_order={requested_order} effective_order={effective_order}")\n'
          new = '''if mode == "negativejac":
              print("Warning: 244 elements with jac. < 0")
          elif mode == "zerojac":
              print("Info: 0 elements with jac. < 0")
          print(f"Info: fake gmsh quality ok requested_order={requested_order} effective_order={effective_order}")
          '''
          assert text.count(old) == 1
          fake_path.write_text(text.replace(old, new), encoding="utf-8")

          test_path = Path("backend/tests/bluecad/test_mesh_adapter.py")
          text = test_path.read_text(encoding="utf-8")
          marker = '\n\n@pytest.mark.parametrize("value", [0, 3, True, 1.0, "2"])\n'
          tests = '''
          
          def test_order_two_rejects_positive_negative_jacobian_count(tmp_path: Path) -> None:
              result = mesh_analysis_spec(
                  _analysis(tmp_path, 2),
                  tmp_path / "negativejac",
                  registry_path=_registry(tmp_path),
              )
              assert result["verdict"] == "fail"
              assert result["errors"] == [
                  {
                      "code": "MESH_HIGH_ORDER_INVALID",
                      "detail": {
                          "requested_order": 2,
                          "diagnostics": ["Warning: 244 elements with jac. < 0"],
                          "reported_invalid_elements": 244,
                      },
                  }
              ]
              assert len(result["attempts"]) == 1
              assert result["attempts"][0]["counts"]["volume_element_types"] == {"C3D10": 1}
          
          
          def test_order_two_accepts_explicit_zero_negative_jacobian_count(tmp_path: Path) -> None:
              result = mesh_analysis_spec(
                  _analysis(tmp_path, 2),
                  tmp_path / "zerojac",
                  registry_path=_registry(tmp_path),
              )
              assert result["verdict"] == "pass"
              assert result["attempts"][0]["counts"]["volume_element_types"] == {"C3D10": 1}
          '''
          assert text.count(marker) == 1
          test_path.write_text(text.replace(marker, tests + marker), encoding="utf-8")
          PY
      - name: Commit patch and remove one-shot workflow
        shell: bash
        run: |
          rm .github/workflows/one-shot-024a-high-order-guard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/modules/bluecad/mesh_adapter.py \
                  backend/tests/bluecad/fixtures/fake_gmsh.py \
                  backend/tests/bluecad/test_mesh_adapter.py \
                  .github/workflows/one-shot-024a-high-order-guard.yml
          git commit -m "Reject invalid quadratic meshes before solving"
          git push origin HEAD:impl/spec-024-a-quadratic-tetrahedra
