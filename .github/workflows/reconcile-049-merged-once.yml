name: Reconcile 049 merged once

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  reconcile:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.head.ref == 'docs/049-merged-status' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/049-merged-status
          fetch-depth: 0
      - name: Mark 049 merged and remove workflow
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/specs/STATUS.md')
          text = path.read_text(encoding='utf-8')
          old = '| 049 | in_review | [#153](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/153) | BLUEREV-PROCESS-2: buoyancy and light/transmittance proxies | 043, 047 | Add hardware mass and safety factor to buoyancy; require explicit optical path length; label proxies honestly and expose the measurements that would promote real light models. |'
          new = '| 049 | merged | [#153](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/153) | BLUEREV-PROCESS-2: buoyancy and light/transmittance proxies | 043, 047 | Add hardware mass and safety factor to buoyancy; require explicit optical path length; label proxies honestly and expose the measurements that would promote real light models. |'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one 049 in_review row, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/reconcile-049-merged-once.yml').unlink()
      - name: Commit reconciled registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/STATUS.md .github/workflows/reconcile-049-merged-once.yml
          git commit -m "Mark spec 049 merged"
          git push origin HEAD:docs/049-merged-status
