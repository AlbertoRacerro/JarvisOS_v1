name: Spec 052 final lint fix

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Add missing import and clean diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/tests/test_cad_link.py")
          text = path.read_text(encoding="utf-8")
          old = "from collections.abc import Iterator\n"
          if text.count(old) != 1:
              raise SystemExit("unexpected test import block")
          path.write_text(text.replace(old, "import json\nfrom collections.abc import Iterator\n", 1), encoding="utf-8")

          for disposable in (
              Path("reports/spec052-ruff-boundaries.txt"),
              Path(".github/workflows/spec052-ruff-finalize.yml"),
          ):
              if disposable.exists():
                  disposable.unlink()
          PY
      - name: Commit final lint fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix final spec 052 lint finding"
          git push origin HEAD:spec/052-cad-link
