name: Diagnose Pytest 062b

on:
  pull_request:
    branches:
      - impl/062a-grade-authority
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 167
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture focused cohort tests
        working-directory: backend
        shell: bash
        run: |
          python -m pytest -q tests/test_flow_grade_cohorts.py > /tmp/pytest-062b.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-062b-output
          path: /tmp/pytest-062b.txt
          if-no-files-found: error
          retention-days: 1
