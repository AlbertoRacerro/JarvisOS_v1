name: Diagnose Ruff 062a

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 166
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Capture Ruff output
        shell: bash
        run: |
          ruff check backend/app/core/database.py backend/app/core/grade_schema.py backend/app/modules/ai/flow_grade_contracts.py backend/app/modules/ai/flow_grade_event_store.py backend/app/modules/ai/flow_grade_events.py backend/app/modules/ai/flow_grade_evidence.py backend/app/modules/ai/flow_grade_models.py backend/app/modules/ai/flow_grade_read.py backend/app/modules/ai/flow_grade_routes.py backend/app/modules/ai/flow_grade_subjects.py backend/app/modules/ai/routes.py backend/app/modules/ai/token_flow_service.py backend/app/modules/ai/token_flow_terminalization.py backend/tests/test_flow_grades.py backend/tests/test_flow_grade_boundaries.py > /tmp/ruff-062a.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-062a-output
          path: /tmp/ruff-062a.txt
          if-no-files-found: error
          retention-days: 1
