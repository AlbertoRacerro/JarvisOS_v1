name: Apply exact 061b confirmation resume once

on:
  pull_request:
    types: [synchronize]
    branches: [spec/061b-token-flow-continuation]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 160 &&
      github.event.pull_request.head.ref == 'impl/061b-confirmation-resume'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Decode and apply reviewed patches
        run: |
          base64 -d .jarvis-tmp/061b-confirmation-resume.patch.gz.b64 \
            | gzip -d > /tmp/061b-confirmation-resume.patch
          echo 'dc51664bdd988585b0735eb571d807946573bd6d6172dad59b9634522c8423c8  /tmp/061b-confirmation-resume.patch' \
            | sha256sum -c -
          git apply --check --index /tmp/061b-confirmation-resume.patch
          git apply --index /tmp/061b-confirmation-resume.patch

          echo '2a430c1a5bb1024ce6cefe6824d8151f431a3171982c5877538b51baa9ca15ff  .jarvis-tmp/061b-confirmation-resume-diagnostic.patch' \
            | sha256sum -c -
          git apply --check --index .jarvis-tmp/061b-confirmation-resume-diagnostic.patch
          git apply --index .jarvis-tmp/061b-confirmation-resume-diagnostic.patch

          echo '6e937a4af5d40e8eabd17d1d6cfa928c7e350c61023eb7b326ab1767b5560532  .jarvis-tmp/061b-confirmation-resume-followup.patch' \
            | sha256sum -c -
          git apply --check --index .jarvis-tmp/061b-confirmation-resume-followup.patch
          git apply --index .jarvis-tmp/061b-confirmation-resume-followup.patch

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Normalize repository import order
        working-directory: backend
        run: python -m ruff check --fix app/modules/ai/egress_confirmation.py

      - name: Validate confirmation resume
        id: validate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            set -e
            python -m ruff check \
              app/core/egress_schema.py \
              app/modules/ai/egress_persistence.py \
              app/modules/ai/egress_lifecycle.py \
              app/modules/ai/egress_revalidation.py \
              app/modules/ai/egress_runtime.py \
              app/modules/ai/egress_confirmation.py \
              app/modules/ai/token_flow_confirmation_resume.py \
              tests/test_ai_egress_confirmation.py \
              tests/test_token_flow_external_runtime_integration.py
            python -m pytest -q --tb=short \
              tests/test_ai_egress_confirmation.py \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_token_flow_continuation_transaction.py \
              tests/test_token_flow_terminalization.py \
              tests/test_token_flow_status.py
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/061b-confirmation-resume.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 061b-confirmation-resume-validation
          path: ${{ runner.temp }}/061b-confirmation-resume.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit reviewed source only
        if: steps.validate.outputs.status == '0'
        run: |
          git add backend/app/modules/ai/egress_confirmation.py
          git rm \
            .github/workflows/apply-061b-confirmation-resume.yml \
            .github/workflows/export-061b-confirmation-resume-source.yml \
            .jarvis-tmp/061b-confirmation-resume.patch.gz.b64 \
            .jarvis-tmp/061b-confirmation-resume-diagnostic.patch \
            .jarvis-tmp/061b-confirmation-resume-followup.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat: resume confirmed external continuations'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Enforce validation
        if: always()
        run: test "${{ steps.validate.outputs.status }}" = '0'
