name: One-shot 024-A status sync

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync-status:
    if: github.event.pull_request.number == 77 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact lifecycle replacements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/STATUS.md")
          text = path.read_text(encoding="utf-8")
          replacements = {
              """1. Merge definition PR [#76](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/76),
             then implement `024` in ordered slices: `024-A` (C3D10), `024-B`
             (solid-face pressure proof), and `024-C` (analytic battery).""":
              """1. Complete `024-A` (verified C3D10) in implementation PR
             [#77](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/77), then implement
             `024-B` (solid-face pressure proof) and `024-C` (analytic battery) in order.""",
              """| 024 | ready | — | FEM verification battery | 008, 009, 021b | Implement ordered slices 024-A (verified C3D10), 024-B (solid-face pressure mapping and real reaction-balance proof), and 024-C (location-specific cantilever, Lamé, and Kirsch analytic battery). |""":
              """| 024 | in_review | [#77](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/77) | FEM verification battery | 008, 009, 021b | Slice 024-A verified C3D10 is under review in #77; 024-B solid-face pressure proof and 024-C location-specific analytic battery remain pending. |""",
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one exact STATUS match, found {count}: {old[:80]!r}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit status and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-shot-status-024a.yml
          git add docs/specs/STATUS.md
          git commit -m "Record 024-A implementation review"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
