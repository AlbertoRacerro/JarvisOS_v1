name: Apply exact 061b runtime patch once

on:
  pull_request:
    types: [synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.repository == 'AlbertoRacerro/JarvisOS_v1' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Verify and apply exact patch
        run: |
          cat \
            .jarvis-tmp/061b-runtime.patch.00 \
            .jarvis-tmp/061b-runtime.patch.01 \
            .jarvis-tmp/061b-runtime.patch.02 \
            > /tmp/061b-runtime.patch
          echo '6ea654687f738cb814ac8e6fa1cb930442e8ac935111bf121f23bd15dc383b88  /tmp/061b-runtime.patch' \
            | sha256sum -c -
          git apply --check --index /tmp/061b-runtime.patch
          git apply --index /tmp/061b-runtime.patch

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate patched runtime
        id: validate
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            python -m ruff check \
              app/modules/ai/egress_runtime.py \
              app/modules/ai/execution.py \
              app/modules/ai/token_flow_external_continuation.py \
              app/modules/ai/token_flow_external_runtime.py \
              app/modules/ai/token_flow_external_transaction.py \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_token_flow_local_runtime_integration.py
            python -m pytest -q --tb=short \
              tests/test_token_flow_external_runtime_integration.py \
              tests/test_token_flow_local_runtime_integration.py \
              tests/test_token_flow_external_continuation.py \
              tests/test_token_flow_terminalization.py
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/061b-exact-runtime.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 061b-exact-runtime-validation
          path: ${{ runner.temp }}/061b-exact-runtime.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit reviewed source only
        if: steps.validate.outputs.status == '0'
        run: |
          git rm \
            .github/workflows/apply-061b-exact-runtime.yml \
            .jarvis-tmp/061b-runtime.patch.00 \
            .jarvis-tmp/061b-runtime.patch.01 \
            .jarvis-tmp/061b-runtime.patch.02
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: wire governed external continuations'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Enforce validation
        if: always()
        run: test "${{ steps.validate.outputs.status }}" = '0'
