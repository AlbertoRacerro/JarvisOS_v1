name: Align spec 072 runtime contract

on:
  push:
    branches:
      - spec/072-process-topology

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/072-process-topology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/refine_072_manifest_contract.py
      - run: python -m pip install ruff
      - run: cd backend && python -m ruff check app/modules/runner tests/test_bluerev_process_topology_m1.py tests/test_bluerev_process_topology_m1_runner.py --fix
      - name: Commit contract-aligned implementation
        shell: bash
        run: |
          rm .github/workflows/refine-072-contract.yml scripts/refine_072_manifest_contract.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/modules/runner/examples/bluerev_process_topology_m1_v0.py backend/app/modules/runner/service.py backend/tests/test_bluerev_process_topology_m1.py backend/tests/test_bluerev_process_topology_m1_runner.py schemas/bluerev_process_topology_m1_v0_1.schema.json .github/workflows/refine-072-contract.yml scripts/refine_072_manifest_contract.py
          git commit -m 'Align BlueRev topology M1 runtime contract'
          git push origin HEAD:spec/072-process-topology
