name: Spec 052 deterministic contract amendments

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  amend:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - name: Apply exact contract amendments
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              observed = text.count(old)
              if observed != count:
                  raise SystemExit(f"{path}: expected {count} exact occurrence(s), found {observed}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          replace(
              "backend/app/core/schema.py",
              'CURRENT_SCHEMA_MIGRATION_ID = "0014_grade_0"\nCURRENT_SCHEMA_MIGRATION_NAME = "Flow outcome subjects and append-only human grades"',
              'CURRENT_SCHEMA_MIGRATION_ID = "0015_cad_link_0"\nCURRENT_SCHEMA_MIGRATION_NAME = "Deterministic bundled-047 M0 cylinder links to BLUECAD"',
          )

          replace(
              "backend/tests/test_data_infrastructure.py",
              "    from app.core.database import open_sqlite_connection\n    from app.core.egress_schema import EGRESS_SCHEMA_MIGRATION_ID\n",
              "    from app.core.cad_link_schema import CAD_LINK_SCHEMA_MIGRATION_RECORD\n"
              "    from app.core.database import open_sqlite_connection\n"
              "    from app.core.egress_schema import EGRESS_SCHEMA_MIGRATION_ID\n",
          )
          replace(
              "backend/tests/test_data_infrastructure.py",
              "    assert CURRENT_SCHEMA_MIGRATION_ID == GRADE_SCHEMA_MIGRATION_ID\n",
              '    assert CURRENT_SCHEMA_MIGRATION_ID == CAD_LINK_SCHEMA_MIGRATION_RECORD["migration_id"]\n',
          )
          replace(
              "backend/tests/test_data_infrastructure.py",
              "    assert GRADE_SCHEMA_MIGRATION_ID in migrations\n    assert EGRESS_SCHEMA_MIGRATION_ID in migrations\n",
              '    assert GRADE_SCHEMA_MIGRATION_ID in migrations\n'
              '    assert CAD_LINK_SCHEMA_MIGRATION_RECORD["migration_id"] in migrations\n'
              "    assert EGRESS_SCHEMA_MIGRATION_ID in migrations\n",
          )
          replace(
              "backend/tests/test_data_infrastructure.py",
              '    assert migrations[GRADE_SCHEMA_MIGRATION_ID]["status"] == "applied"\n    assert CURRENT_SCHEMA_MIGRATION_ID in migrations\n',
              '    assert migrations[GRADE_SCHEMA_MIGRATION_ID]["status"] == "applied"\n'
              '    assert migrations[CAD_LINK_SCHEMA_MIGRATION_RECORD["migration_id"]]["status"] == "applied"\n'
              "    assert CURRENT_SCHEMA_MIGRATION_ID in migrations\n",
          )

          replace(
              "backend/app/modules/bluecad/cad_link.py",
              "from app.core.cad_link_schema import CAD_LINK_SCHEMA_STATEMENTS\n",
              "from app.core.cad_link_schema import CAD_LINK_SCHEMA_INDEX_STATEMENTS, CAD_LINK_SCHEMA_STATEMENTS\n",
          )
          replace(
              "backend/app/modules/bluecad/cad_link.py",
              '        source_snapshot[name] = {\n            "parameter_ref": f"parameter:{parameter_id}",\n',
              '        source_snapshot[name] = {\n'
              '            "parameter_ref": f"parameter:{parameter_id}",\n'
              '            "name": str(parameter["name"]),\n',
          )
          replace(
              "backend/app/modules/bluecad/cad_link.py",
              '        "runner_status": str(job["status"]),\n        "source_model_identity": model_identity,\n',
              '        "runner_status": str(job["status"]),\n'
              '        "source_input_payload_digest": _digest(input_payload),\n'
              '        "source_output_payload_digest": _digest(output_payload),\n'
              '        "geometry_spec_version": str(resolved_spec["spec_version"]),\n'
              '        "source_model_identity": model_identity,\n',
          )
          replace(
              "backend/app/modules/bluecad/cad_link.py",
              "    with open_sqlite_connection() as connection:\n        for statement in CAD_LINK_SCHEMA_STATEMENTS:\n            connection.execute(statement)\n        connection.commit()\n",
              "    with open_sqlite_connection() as connection:\n"
              "        for statement in CAD_LINK_SCHEMA_STATEMENTS:\n"
              "            connection.execute(statement)\n"
              "        for statement in CAD_LINK_SCHEMA_INDEX_STATEMENTS:\n"
              "            connection.execute(statement)\n"
              "        connection.commit()\n",
          )

          replace(
              "backend/app/modules/flowsheet/service.py",
              '    for row in rows["bluecad_attempt"]:\n        attempt_ref = _ref("bluecad_attempt", row["id"])\n',
              '    candidate_origins = {\n'
              '        candidate.get("id"): candidate.get("origin") for candidate in rows["bluecad_candidate"]\n'
              '    }\n'
              '    for row in rows["bluecad_attempt"]:\n'
              '        attempt_ref = _ref("bluecad_attempt", row["id"])\n',
          )
          replace(
              "backend/app/modules/flowsheet/service.py",
              '            "process_link_build"\n            if next(\n                (candidate.get("origin") for candidate in rows["bluecad_candidate"] if candidate.get("id") == row.get("candidate_id")),\n                None,\n            ) == "process_linked"\n            else "has_attempt",\n            "dependency"\n            if next(\n                (candidate.get("origin") for candidate in rows["bluecad_candidate"] if candidate.get("id") == row.get("candidate_id")),\n                None,\n            ) == "process_linked"\n            else "provenance",\n',
              '            "process_link_build"\n'
              '            if candidate_origins.get(row.get("candidate_id")) == "process_linked"\n'
              '            else "has_attempt",\n'
              '            "dependency"\n'
              '            if candidate_origins.get(row.get("candidate_id")) == "process_linked"\n'
              '            else "provenance",\n',
          )

          replace(
              "backend/tests/test_cad_link.py",
              '    assert body["source_runner_job_id"] == source["runner_job_id"]\n',
              '    assert body["source_runner_job_id"] == source["runner_job_id"]\n'
              '    assert body["source_input_payload_digest"].startswith("sha256:")\n'
              '    assert body["source_output_payload_digest"].startswith("sha256:")\n'
              '    assert body["geometry_spec_version"] == "bluecad_geometry_spec_v0_1"\n',
          )
          replace(
              "backend/tests/test_cad_link.py",
              '    assert all(item["status"] == "accepted" for item in body["source_snapshot"].values())\n',
              '    assert all(item["status"] == "accepted" for item in body["source_snapshot"].values())\n'
              '    assert all(item["name"].startswith("Canonical ") for item in body["source_snapshot"].values())\n',
          )

          report = Path("reports/spec052-pytest.txt")
          if report.exists():
              report.unlink()
          Path(".github/workflows/spec052-contract-amendments.yml").unlink()
          PY
      - name: Commit contract amendments
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete spec 052 migration and snapshot contracts"
          git push origin HEAD:spec/052-cad-link
