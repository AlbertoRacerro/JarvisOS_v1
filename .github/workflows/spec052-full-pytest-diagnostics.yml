name: Spec 052 full pytest diagnostics

on:
  push:
    branches:
      - spec/052-cad-link

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spec/052-cad-link
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Capture full suite failure
        shell: bash
        run: |
          mkdir -p reports
          cd backend
          python -m pytest -q > ../reports/spec052-full-pytest.txt 2>&1 || true
          cd ..
          rm .github/workflows/spec052-full-pytest-diagnostics.yml
      - name: Commit diagnostic report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture full spec 052 suite diagnostics"
          git push origin HEAD:spec/052-cad-link
