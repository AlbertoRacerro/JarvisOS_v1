name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Apply external token-flow runtime wiring
        id: actuator
        env:
          TARGET_BRANCH: spec/061-token-flow-implementation
          CLEAN_WORKFLOW_COMMIT: 6d0d1b031db107fe55cec3d30db706d42a75f815
        run: |
          set -o pipefail
          set +e
          (
            set -euxo pipefail
            git fetch --depth=20 origin "refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "refs/remotes/origin/$TARGET_BRANCH"
            python scripts/fix_external_wiring_stager.py
            python scripts/apply_token_flow_external_wiring.py
            git checkout "$CLEAN_WORKFLOW_COMMIT" -- .github/workflows/ci.yml
            rm scripts/apply_token_flow_external_wiring.py scripts/fix_external_wiring_stager.py
            git config user.name "JarvisOS automation"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "Wire external runtime into token flows"
            git push origin "HEAD:$TARGET_BRANCH"
          ) 2>&1 | tee "$RUNNER_TEMP/token-flow-external-wiring.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload external wiring diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-flow-external-wiring-log
          path: ${{ runner.temp }}/token-flow-external-wiring.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce external wiring
        run: test "${{ steps.actuator.outputs.status }}" = "0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Spec status registry gate
        run: |
          python scripts/check_spec_status.py --self-test
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python scripts/check_spec_status.py --event "$GITHUB_EVENT_PATH"
          else
            python scripts/check_spec_status.py
          fi

      - name: Manual review tooling offline gate
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: BLUECAD license-boundary import gate
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r"^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)")
          paths = list(Path("backend/app").rglob("*.py"))
          src_root = Path("frontend/src")
          if src_root.exists():
              paths.extend(path for path in src_root.rglob("*") if path.suffix in {".ts", ".tsx"})

          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")

          if violations:
              print("Forbidden in-process GPL tool imports found:")
              print("\n".join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  bluecad-geometry-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run bounded property suite and canonical canary
        id: property
        working-directory: backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -o pipefail
          set +e
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py \
            2>&1 | tee "$RUNNER_TEMP/bluecad-property-canary.log"
          status=${PIPESTATUS[0]}
          elapsed=$SECONDS
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "elapsed=$elapsed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded canary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluecad-property-canary
          path: |
            ${{ runner.temp }}/bluecad-property-canary.log
            ${{ runner.temp }}/bluecad-property-canary-actual.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce property and time gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.property.outputs.status }}" = "0"
          test "${{ steps.property.outputs.elapsed }}" -le 240
