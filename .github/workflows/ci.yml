name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-local-continuation-runtime:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Apply bounded local runtime patch
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          execution = Path("backend/app/modules/ai/execution.py")
          text = execution.read_text(encoding="utf-8")

          old_import = (
              'from app.modules.ai.token_flow_evidence import AttemptEvidence\n'
              'from app.modules.ai.token_flow_runtime import (\n'
          )
          new_import = (
              'from app.modules.ai.token_flow_continuation import (\n'
              '    ContinuationDecision,\n'
              '    apply_continuation_lineage,\n'
              '    evaluate_direct_continuation,\n'
              ')\n'
              'from app.modules.ai.token_flow_continuation_transaction import (\n'
              '    record_continuation_attempt_evidence_in_transaction,\n'
              ')\n'
              'from app.modules.ai.token_flow_evidence import AttemptEvidence\n'
              'from app.modules.ai.token_flow_local_continuation import (\n'
              '    plan_local_continuation,\n'
              ')\n'
              'from app.modules.ai.token_flow_runtime import (\n'
          )
          if old_import not in text:
              raise SystemExit("execution import anchor not found")
          text = text.replace(old_import, new_import, 1)

          old_service_import = (
              'from app.modules.ai.token_flow_service import create_flow, transition_flow_state\n'
              'from app.modules.ai.token_flow_transaction import record_attempt_evidence_in_transaction\n'
          )
          new_service_import = (
              'from app.modules.ai.token_flow_segments import store_protected_segment\n'
              'from app.modules.ai.token_flow_service import (\n'
              '    create_flow,\n'
              '    get_flow,\n'
              '    transition_flow_state,\n'
              ')\n'
              'from app.modules.ai.token_flow_terminalization import (\n'
              '    terminalize_assembled_output,\n'
              ')\n'
              'from app.modules.ai.token_flow_transaction import record_attempt_evidence_in_transaction\n'
          )
          if old_service_import not in text:
              raise SystemExit("execution service import anchor not found")
          text = text.replace(old_service_import, new_service_import, 1)

          old_signature = (
              '    flow_id: str | None = None,\n'
              '    evidence: AttemptEvidence | None = None,\n'
              '    input_tokens_override: int | None = None,\n'
          )
          new_signature = (
              '    flow_id: str | None = None,\n'
              '    evidence: AttemptEvidence | None = None,\n'
              '    continuation_decision: ContinuationDecision | None = None,\n'
              '    input_tokens_override: int | None = None,\n'
          )
          if old_signature not in text:
              raise SystemExit("_write_ai_job signature anchor not found")
          text = text.replace(old_signature, new_signature, 1)

          old_validation = (
              '    if (flow_id is None) != (evidence is None):\n'
              '        raise ValueError("flow_id and attempt evidence must be supplied together")\n'
          )
          new_validation = (
              '    if (flow_id is None) != (evidence is None):\n'
              '        raise ValueError("flow_id and attempt evidence must be supplied together")\n'
              '    if continuation_decision is not None and (flow_id is None or evidence is None):\n'
              '        raise ValueError("continuation decision requires flow and attempt evidence")\n'
          )
          if old_validation not in text:
              raise SystemExit("_write_ai_job validation anchor not found")
          text = text.replace(old_validation, new_validation, 1)

          old_record = dedent('''
                      if flow_id is not None and evidence is not None:
                          record_attempt_evidence_in_transaction(
                              connection,
                              flow_id=flow_id,
                              attempt_id=job_id,
                              evidence=evidence,
                          )
          ''')
          new_record = dedent('''
                      if flow_id is not None and evidence is not None:
                          if continuation_decision is None:
                              record_attempt_evidence_in_transaction(
                                  connection,
                                  flow_id=flow_id,
                                  attempt_id=job_id,
                                  evidence=evidence,
                              )
                          else:
                              record_continuation_attempt_evidence_in_transaction(
                                  connection,
                                  flow_id=flow_id,
                                  attempt_id=job_id,
                                  evidence=evidence,
                                  decision=continuation_decision,
                              )
          ''')
          if old_record not in text:
              raise SystemExit("_write_ai_job transaction anchor not found")
          text = text.replace(old_record, new_record, 1)

          old_external_capture = dedent('''
                  if (
                      external.status == "success"
                      and external.response is not None
                      and normalize_finish_reason(
                          external.response.finish_reason, failed=external.response.error is not None
                      )
                      != "length"
                  ):
          ''')
          new_external_capture = dedent('''
                  if (
                      external.status == "success"
                      and external.response is not None
                      and normalize_finish_reason(
                          external.response.finish_reason, failed=external.response.error is not None
                      )
                      == "stop"
                  ):
          ''')
          if old_external_capture not in text:
              raise SystemExit("external record-capture anchor not found")
          text = text.replace(old_external_capture, new_external_capture, 1)

          old_terminalize = dedent('''
              def _terminalize_local_flow(
                  *,
                  flow_id: str,
                  status: str,
                  attempt_id: str,
                  reason: str | None,
                  finish_reason: str | None = None,
              ) -> None:
                  normalized_finish = normalize_finish_reason(finish_reason, failed=False)
                  if status == "success" and normalized_finish == "length":
                      state = "partial_terminal"
                      terminal_reason = "output_length_limit"
                  elif status == "success":
                      state = "complete"
                      terminal_reason = "completed"
                  else:
                      state = "failed_terminal"
                      terminal_reason = normalize_outcome_reason(reason or status)
                  transition_flow_state(
                      flow_id=flow_id,
                      new_state=state,
                      terminal_reason=terminal_reason,
                      terminal_attempt_id=attempt_id,
                  )
          ''')
          new_terminalize = dedent('''
              def _terminalize_local_flow(
                  *,
                  flow_id: str,
                  status: str,
                  attempt_id: str,
                  reason: str | None,
                  finish_reason: str | None = None,
              ) -> None:
                  normalized_finish = normalize_finish_reason(finish_reason, failed=False)
                  if status == "success" and normalized_finish == "stop":
                      state = "complete"
                      terminal_reason = "completed"
                  elif status == "success":
                      state = "partial_terminal"
                      terminal_reason = f"finish_{normalized_finish}"
                  else:
                      state = "failed_terminal"
                      terminal_reason = normalize_outcome_reason(reason or status)
                  transition_flow_state(
                      flow_id=flow_id,
                      new_state=state,
                      terminal_reason=terminal_reason,
                      terminal_attempt_id=attempt_id,
                  )
          ''')
          if old_terminalize not in text:
              raise SystemExit("local terminalization anchor not found")
          text = text.replace(old_terminalize, new_terminalize, 1)

          helper_marker = "\n\ndef _outcome_with_flow(outcome: AiTaskOutcome, flow_id: str) -> AiTaskOutcome:\n"
          helper = dedent('''

              _LOCAL_CONTINUATION_SENSITIVITY = "S4"


              def _assembled_local_response(response: AIResponse, body_text: str) -> AIResponse:
                  return response.model_copy(
                      update={"text": body_text, "content": body_text}
                  )


              def _run_local_continuations(
                  *,
                  flow_id: str,
                  initial_attempt_id: str,
                  initial_response: AIResponse,
                  initial_outcome: AiTaskOutcome,
                  original_prompt: str,
                  task_kind: str,
                  requested_route_class: str | None,
                  selected_route_class: str,
                  context_digest: str | None,
                  context_sources: list[dict] | None,
                  context_sources_count: int,
                  requested_output_tokens: int | None,
                  adapters: dict[str, AIProviderAdapter],
                  bindings: dict[str, ProviderBinding] | None,
                  workspace_id: str | None,
              ) -> AiTaskOutcome:
                  current_attempt_id = initial_attempt_id
                  current_response = initial_response
                  current_outcome = initial_outcome
                  flow_workspace_id = get_flow(flow_id)["workspace_id"]

                  while True:
                      continuation = evaluate_direct_continuation(
                          flow_id=flow_id,
                          workspace_id=flow_workspace_id,
                          expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                      )
                      if not continuation.eligible:
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=current_attempt_id,
                              new_state="partial_terminal",
                              terminal_reason=f"continuation_{continuation.reason}",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          current_outcome.response = _assembled_local_response(
                              current_response, assembled.body_text
                          )
                          return current_outcome

                      if requested_output_tokens is None or requested_output_tokens <= 0:
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=current_attempt_id,
                              new_state="partial_terminal",
                              terminal_reason="continuation_binding_metadata_incomplete",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          current_outcome.response = _assembled_local_response(
                              current_response, assembled.body_text
                          )
                          return current_outcome

                      plan = plan_local_continuation(
                          decision=continuation,
                          route_class=selected_route_class,
                          task_type=_ai_task_type_for(task_kind),
                          original_prompt=original_prompt,
                          workspace_id=flow_workspace_id,
                          expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          requested_output_tokens=requested_output_tokens,
                          bindings=bindings,
                      )
                      if not plan.ready or plan.binding is None or plan.request is None:
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=current_attempt_id,
                              new_state="partial_terminal",
                              terminal_reason=f"continuation_{plan.reason}",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          current_outcome.response = _assembled_local_response(
                              current_response, assembled.body_text
                          )
                          return current_outcome

                      binding = plan.binding
                      request = plan.request
                      adapter = adapters.get(binding.provider_id)
                      route_decision = RoutingDecision(
                          provider_id=binding.provider_id,
                          model_id=binding.model_id,
                          decision_reason=f"bound:{binding.route_class}",
                      )
                      route_metadata = {
                          "continuation_flow_id": flow_id,
                          "continuation_parent_attempt_id": continuation.parent_attempt_id,
                          "continuation_index": continuation.next_continuation_index,
                          "continuation_segment_count": request.metadata.get(
                              "continuation_segment_count"
                          ),
                      }
                      if adapter is None:
                          evidence = apply_continuation_lineage(
                              no_execution_evidence(
                                  selected_route_class=binding.route_class,
                                  binding=binding,
                                  outcome_reason="adapter_unavailable",
                                  requested_output_ceiling=requested_output_tokens,
                                  effective_output_ceiling=plan.effective_output_tokens,
                                  fallback_index=0,
                              ),
                              continuation,
                          )
                          ledger_id = _write_ai_job(
                              status="config_error",
                              task_kind=task_kind,
                              requested_route_class=requested_route_class,
                              selected_route_class=binding.route_class,
                              decision=route_decision,
                              prompt_digest=canonical_digest(
                                  {"prompt": request.prompt or ""}
                              ),
                              context_digest=context_digest,
                              context_sources=context_sources,
                              response=None,
                              latency_ms=0,
                              error_type="config_error",
                              route_metadata=route_metadata,
                              fallback_index=0,
                              flow_id=flow_id,
                              evidence=evidence,
                              continuation_decision=continuation,
                          )
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=ledger_id,
                              new_state="partial_terminal",
                              terminal_reason="continuation_adapter_unavailable",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          return _outcome_with_flow(
                              AiTaskOutcome(
                                  "config_error",
                                  ledger_id,
                                  binding.route_class,
                                  route_decision,
                                  response=_assembled_local_response(
                                      current_response, assembled.body_text
                                  ),
                                  error_type="config_error",
                                  context_digest=context_digest,
                                  context_sources_count=context_sources_count,
                              ),
                              flow_id,
                          )

                      attempt_started = time.perf_counter()
                      try:
                          response = adapter.complete(request)
                      except Exception as exc:
                          evidence, usage = local_exception_evidence(
                              binding=binding,
                              prompt=request.prompt or "",
                              selected_route_class=binding.route_class,
                              requested_output_ceiling=requested_output_tokens,
                              effective_output_ceiling=plan.effective_output_tokens,
                              fallback_index=0,
                          )
                          evidence = apply_continuation_lineage(evidence, continuation)
                          ledger_id = _write_ai_job(
                              status="provider_error",
                              task_kind=task_kind,
                              requested_route_class=requested_route_class,
                              selected_route_class=binding.route_class,
                              decision=route_decision,
                              prompt_digest=canonical_digest(
                                  {"prompt": request.prompt or ""}
                              ),
                              context_digest=context_digest,
                              context_sources=context_sources,
                              response=None,
                              latency_ms=_elapsed_ms(attempt_started),
                              error_type=type(exc).__name__,
                              route_metadata=route_metadata,
                              fallback_index=0,
                              flow_id=flow_id,
                              evidence=evidence,
                              continuation_decision=continuation,
                              input_tokens_override=usage.input_tokens,
                              output_tokens_override=usage.output_tokens,
                          )
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=ledger_id,
                              new_state="partial_terminal",
                              terminal_reason="continuation_adapter_exception",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          return _outcome_with_flow(
                              AiTaskOutcome(
                                  "provider_error",
                                  ledger_id,
                                  binding.route_class,
                                  route_decision,
                                  response=_assembled_local_response(
                                      current_response, assembled.body_text
                                  ),
                                  error_type=type(exc).__name__,
                                  context_digest=context_digest,
                                  context_sources_count=context_sources_count,
                              ),
                              flow_id,
                          )

                      status, error_type = _response_status(response)
                      evidence = apply_continuation_lineage(
                          local_response_evidence(
                              binding=binding,
                              response=response,
                              selected_route_class=binding.route_class,
                              outcome_reason=error_type or status,
                              requested_output_ceiling=requested_output_tokens,
                              effective_output_ceiling=plan.effective_output_tokens,
                              fallback_index=0,
                          ),
                          continuation,
                      )
                      ledger_id = _write_ai_job(
                          status=status,
                          task_kind=task_kind,
                          requested_route_class=requested_route_class,
                          selected_route_class=binding.route_class,
                          decision=route_decision,
                          prompt_digest=canonical_digest(
                              {"prompt": request.prompt or ""}
                          ),
                          context_digest=context_digest,
                          context_sources=context_sources,
                          response=response,
                          latency_ms=_elapsed_ms(attempt_started),
                          error_type=error_type,
                          route_metadata=route_metadata,
                          fallback_index=0,
                          flow_id=flow_id,
                          evidence=evidence,
                          continuation_decision=continuation,
                      )
                      if status != "success" or response.text is None:
                          _, assembled = terminalize_assembled_output(
                              flow_id=flow_id,
                              terminal_attempt_id=ledger_id,
                              new_state="partial_terminal",
                              terminal_reason=f"continuation_{normalize_outcome_reason(error_type or status)}",
                              workspace_id=flow_workspace_id,
                              expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          )
                          return _outcome_with_flow(
                              AiTaskOutcome(
                                  status,
                                  ledger_id,
                                  binding.route_class,
                                  route_decision,
                                  response=_assembled_local_response(
                                      current_response, assembled.body_text
                                  ),
                                  error_type=error_type,
                                  context_digest=context_digest,
                                  context_sources_count=context_sources_count,
                              ),
                              flow_id,
                          )

                      store_protected_segment(
                          flow_id=flow_id,
                          originating_attempt_id=ledger_id,
                          body_text=response.text,
                          effective_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                          workspace_id=flow_workspace_id,
                      )
                      normalized_finish = normalize_finish_reason(
                          response.finish_reason,
                          failed=False,
                      )
                      current_attempt_id = ledger_id
                      current_response = response
                      current_outcome = _outcome_with_flow(
                          AiTaskOutcome(
                              "success",
                              ledger_id,
                              binding.route_class,
                              route_decision,
                              response=response,
                              context_digest=context_digest,
                              context_sources_count=context_sources_count,
                          ),
                          flow_id,
                      )
                      if normalized_finish == "length":
                          continue

                      final_state = (
                          "complete" if normalized_finish == "stop" else "partial_terminal"
                      )
                      terminal_reason = (
                          "completed"
                          if normalized_finish == "stop"
                          else f"continuation_finish_{normalized_finish}"
                      )
                      _, assembled = terminalize_assembled_output(
                          flow_id=flow_id,
                          terminal_attempt_id=ledger_id,
                          new_state=final_state,
                          terminal_reason=terminal_reason,
                          workspace_id=flow_workspace_id,
                          expected_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                      )
                      assembled_response = _assembled_local_response(
                          response, assembled.body_text
                      )
                      current_outcome.response = assembled_response
                      if normalized_finish == "stop":
                          proposed_ids, parse_error = _create_proposed_records_from_response(
                              task_kind=task_kind,
                              response=assembled_response,
                              ledger_id=ledger_id,
                              workspace_id=workspace_id,
                          )
                          current_outcome.proposed_record_ids = proposed_ids
                          current_outcome.records_parse_error = parse_error
                      return current_outcome
          ''')
          if helper_marker not in text:
              raise SystemExit("local continuation helper marker not found")
          text = text.replace(helper_marker, helper + helper_marker, 1)

          old_final = dedent('''
                      _terminalize_local_flow(
                          flow_id=flow_id,
                          status=status,
                          attempt_id=ledger_id,
                          reason=error_type,
                          finish_reason=response.finish_reason,
                      )
                      if status == "success" and normalize_finish_reason(
                          response.finish_reason, failed=False
                      ) != "length":
                          proposed_record_ids, records_parse_error = _create_proposed_records_from_response(
                              task_kind=task_kind,
                              response=response,
                              ledger_id=ledger_id,
                              workspace_id=workspace_id,
                          )
                          last_outcome.proposed_record_ids = proposed_record_ids
                          last_outcome.records_parse_error = records_parse_error
                      return last_outcome
          ''')
          new_final = dedent('''
                      normalized_finish = normalize_finish_reason(
                          response.finish_reason, failed=False
                      )
                      if (
                          status == "success"
                          and normalized_finish == "length"
                          and bool(response.text)
                      ):
                          store_protected_segment(
                              flow_id=flow_id,
                              originating_attempt_id=ledger_id,
                              body_text=str(response.text),
                              effective_sensitivity_level=_LOCAL_CONTINUATION_SENSITIVITY,
                              workspace_id=get_flow(flow_id)["workspace_id"],
                          )
                          return _run_local_continuations(
                              flow_id=flow_id,
                              initial_attempt_id=ledger_id,
                              initial_response=response,
                              initial_outcome=last_outcome,
                              original_prompt=request.prompt or "",
                              task_kind=task_kind,
                              requested_route_class=requested_route_class,
                              selected_route_class=selected_route_class,
                              context_digest=context_digest,
                              context_sources=context_sources,
                              context_sources_count=context_sources_count,
                              requested_output_tokens=attempt_max,
                              adapters=adapters,
                              bindings=bindings,
                              workspace_id=workspace_id,
                          )

                      _terminalize_local_flow(
                          flow_id=flow_id,
                          status=status,
                          attempt_id=ledger_id,
                          reason=error_type,
                          finish_reason=response.finish_reason,
                      )
                      if status == "success" and normalized_finish == "stop":
                          proposed_record_ids, records_parse_error = _create_proposed_records_from_response(
                              task_kind=task_kind,
                              response=response,
                              ledger_id=ledger_id,
                              workspace_id=workspace_id,
                          )
                          last_outcome.proposed_record_ids = proposed_record_ids
                          last_outcome.records_parse_error = records_parse_error
                      return last_outcome
          ''')
          if old_final not in text:
              raise SystemExit("initial local response anchor not found")
          text = text.replace(old_final, new_final, 1)
          execution.write_text(text, encoding="utf-8")

          terminalization = Path(
              "backend/app/modules/ai/token_flow_terminalization.py"
          )
          terminal_text = terminalization.read_text(encoding="utf-8")
          old_update = '            connection.execute(\n                """\n                UPDATE ai_flows\n'
          new_update = '            updated = connection.execute(\n                """\n                UPDATE ai_flows\n'
          if old_update not in terminal_text:
              raise SystemExit("terminalization update anchor not found")
          terminal_text = terminal_text.replace(old_update, new_update, 1)
          terminal_text = terminal_text.replace(
              '            if connection.total_changes < 1:\n',
              '            if updated.rowcount != 1:\n',
              1,
          )
          terminalization.write_text(terminal_text, encoding="utf-8")
          PY

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run full verified suite
        id: verified
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            python -m ruff check app tests
            ruff_status=$?
            if [ "$ruff_status" -ne 0 ]; then
              exit "$ruff_status"
            fi
            python -m pytest -q --tb=short
          } 2>&1 | tee "$RUNNER_TEMP/local-continuation-runtime.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-continuation-runtime-diagnostics
          path: ${{ runner.temp }}/local-continuation-runtime.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce verified result
        if: always()
        run: test "${{ steps.verified.outputs.status }}" = "0"

      - name: Commit verified runtime slice
        if: steps.verified.outputs.status == '0'
        run: |
          if git diff --quiet -- \
            backend/app/modules/ai/execution.py \
            backend/app/modules/ai/token_flow_terminalization.py; then
            echo "Runtime slice already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/app/modules/ai/execution.py \
            backend/app/modules/ai/token_flow_terminalization.py
          git commit -m "feat: run governed local output continuations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Spec status registry gate
        run: |
          python scripts/check_spec_status.py --self-test
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python scripts/check_spec_status.py --event "$GITHUB_EVENT_PATH"
          else
            python scripts/check_spec_status.py
          fi

      - name: Manual review tooling offline gate
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: BLUECAD license-boundary import gate
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r"^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)")
          paths = list(Path("backend/app").rglob("*.py"))
          src_root = Path("frontend/src")
          if src_root.exists():
              paths.extend(path for path in src_root.rglob("*") if path.suffix in {".ts", ".tsx"})

          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")

          if violations:
              print("Forbidden in-process GPL tool imports found:")
              print("\n".join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  bluecad-geometry-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run bounded property suite and canonical canary
        id: property
        working-directory: backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -o pipefail
          set +e
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py \
            2>&1 | tee "$RUNNER_TEMP/bluecad-property-canary.log"
          status=${PIPESTATUS[0]}
          elapsed=$SECONDS
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "elapsed=$elapsed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded canary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluecad-property-canary
          path: |
            ${{ runner.temp }}/bluecad-property-canary.log
            ${{ runner.temp }}/bluecad-property-canary-actual.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce property and time gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.property.outputs.status }}" = "0"
          test "${{ steps.property.outputs.elapsed }}" -le 240
