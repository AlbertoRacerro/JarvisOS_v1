name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  patch-061-definition:
    if: github.event_name == 'pull_request' && github.head_ref == 'spec/061-token-flow-definition'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact 061 documentation patch and restore workflow
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/061-token-flow-0.md")
          text = path.read_text(encoding="utf-8")

          old_ticket = """A ticket binds exact flow, segment, attempt, policy, packet, and continuation-guard
          identity. Paused state changes only via server-owned ticket consumption/revalidation,
          expiry, cancellation, or deterministic failure."""
          new_ticket = """A ticket always binds exact flow, attempt, policy, packet, and continuation-guard
          identity. Segment and continuation identity are required only when accumulated
          continuation content exists. Initial or other pre-adapter confirmation tickets use
          null segment and continuation fields and never create dummy segments. Paused state
          changes only via server-owned ticket consumption/revalidation, expiry, cancellation,
          or deterministic failure."""

          old_gates = """## Promotion gates

          Before 061 may become `ready`:

          1. 059b is merged and per-binding `ai_jobs`, reservation, egress-attempt services stable.
          2. Registry accepts execution class and rejects contradictions.
          3. Real models have accepted capabilities; external models have pricing.
          4. Fake, local Ollama, and external fixtures prove class, invocation, dispatch, usage,
             accounting, and ambiguous-failure behavior.
          5. External adapters expose reliable normalized dispatch evidence or conservative unknown.
          6. Protected storage supports restart-safe segments.
          7. Confirmation resume and settings control are proven.
          8. Migration ID assigned from implementation-time master.
          9. Exact-head CI and independent review have no unresolved blockers."""
          new_gates = """## Definition promotion gates

          Before this definition may become `ready` for implementation:

          1. 059b is merged and the current per-binding `ai_jobs`, reservation, egress-attempt,
             ticket, and accounting ownership is rechecked against this contract.
          2. The implementation boundary explicitly assigns the registry, adapter-dispatch,
             protected-segment, confirmation-resume, settings, migration, and fixture work to 061
             without requiring those 061-owned changes to exist beforehand.
          3. The next additive migration is selected from implementation-time `master`, not frozen
             by this definition PR.
          4. Exact-head CI and independent review have no unresolved blockers.

          ## Implementation acceptance gates

          The 061 implementation is not complete until:

          1. the registry persists execution class, rejects contradictions, and binds accepted
             real-model capabilities and external pricing;
          2. fake, local Ollama, and external fixtures prove class, invocation, dispatch, usage,
             accounting, and ambiguous-failure behavior;
          3. external adapters expose reliable normalized dispatch evidence or conservative
             `unknown`;
          4. protected storage supports restart-safe segments without exposing bodies through safe
             ledgers or status surfaces;
          5. initial and continuation confirmation resume, expiry, and settings control are proven;
          6. the additive migration and all required regression, privacy, accounting, and BLUECAD
             evidence pass on the implementation exact head."""

          if text.count(old_ticket) != 1:
              raise SystemExit("ticket block mismatch")
          if text.count(old_gates) != 1:
              raise SystemExit("promotion block mismatch")

          text = text.replace(old_ticket, new_ticket).replace(old_gates, new_gates)
          path.write_text(text, encoding="utf-8")
          PY

          git show origin/master:.github/workflows/ci.yml > .github/workflows/ci.yml
          git diff --check
          git config user.name "JarvisOS Maintainer Actuator"
          git config user.email "actions@users.noreply.github.com"
          git add docs/specs/061-token-flow-0.md .github/workflows/ci.yml
          git diff --cached --quiet && { echo "No patch produced"; exit 1; }
          git commit -m "Clarify 061 confirmation and readiness gates"
          git push origin "HEAD:${HEAD_REF}"

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Spec status registry gate
        run: |
          python scripts/check_spec_status.py --self-test
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python scripts/check_spec_status.py --event "$GITHUB_EVENT_PATH"
          else
            python scripts/check_spec_status.py
          fi

      - name: Manual review tooling offline gate
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: BLUECAD license-boundary import gate
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r"^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)")
          paths = list(Path("backend/app").rglob("*.py"))
          src_root = Path("frontend/src")
          if src_root.exists():
              paths.extend(path for path in src_root.rglob("*") if path.suffix in {".ts", ".tsx"})

          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")

          if violations:
              print("Forbidden in-process GPL tool imports found:")
              print("\n".join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  bluecad-geometry-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run bounded property suite and canonical canary
        id: property
        working-directory: backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -o pipefail
          set +e
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py \
            2>&1 | tee "$RUNNER_TEMP/bluecad-property-canary.log"
          status=${PIPESTATUS[0]}
          elapsed=$SECONDS
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "elapsed=$elapsed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded canary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluecad-property-canary
          path: |
            ${{ runner.temp }}/bluecad-property-canary.log
            ${{ runner.temp }}/bluecad-property-canary-actual.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce property and time gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.property.outputs.status }}" = "0"
          test "${{ steps.property.outputs.elapsed }}" -le 240
