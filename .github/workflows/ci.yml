name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-assembled-digest-recompute:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.number == 145
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Apply bounded recompute patch
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path("backend/app/modules/ai/token_flow_service.py")
          text = path.read_text(encoding="utf-8")
          old_block = (
              '        output_digest = None\n'
              '        if flow["terminal_attempt_id"] is not None:\n'
              '            terminal_attempt = _require_latest_attempt(\n'
              '                connection, flow_id, str(flow["terminal_attempt_id"])\n'
              '            )\n'
              '            _validate_terminal_status(str(flow["state"]), terminal_attempt["status"])\n'
              '            output_digest = terminal_attempt["output_digest"]\n'
              '            if output_digest is not None:\n'
              '                output_digest = _output_digest(output_digest)\n'
              '        if flow["state"] in {"complete", "partial_terminal"}:\n'
              '            output_digest = _output_digest(output_digest)\n'
          )
          new_block = (
              '        terminal_attempt = None\n'
              '        if flow["terminal_attempt_id"] is not None:\n'
              '            terminal_attempt = _require_latest_attempt(\n'
              '                connection, flow_id, str(flow["terminal_attempt_id"])\n'
              '            )\n'
              '            _validate_terminal_status(str(flow["state"]), terminal_attempt["status"])\n'
              '        output_digest = _terminal_output_digest(\n'
              '            connection,\n'
              '            flow_id=flow_id,\n'
              '            flow=flow,\n'
              '            terminal_attempt=terminal_attempt,\n'
              '        )\n'
          )
          helper_marker = "\n\ndef _validate_evidence(\n"
          helper = dedent('''

          def _terminal_output_digest(
              connection: sqlite3.Connection,
              *,
              flow_id: str,
              flow: sqlite3.Row,
              terminal_attempt: sqlite3.Row | None,
          ) -> str | None:
              segments = connection.execute(
                  """
                  SELECT segment_index, originating_attempt_id, body_text, body_digest
                  FROM ai_flow_segments
                  WHERE flow_id = ?
                  ORDER BY segment_index
                  """,
                  (flow_id,),
              ).fetchall()
              if segments:
                  indexes = [int(row["segment_index"]) for row in segments]
                  if indexes != list(range(len(segments))):
                      raise TokenFlowConflictError(
                          "terminal protected segment indexes changed"
                      )
                  bodies: list[str] = []
                  originating_attempt_ids: list[str] = []
                  for segment in segments:
                      body = segment["body_text"]
                      if not isinstance(body, str) or not body:
                          raise TokenFlowConflictError(
                              "terminal protected segment body is malformed"
                          )
                      body_digest = canonical_digest({"text": body})
                      if segment["body_digest"] != body_digest:
                          raise TokenFlowConflictError(
                              "terminal protected segment digest evidence changed"
                          )
                      origin_id = str(segment["originating_attempt_id"])
                      origin = connection.execute(
                          "SELECT output_digest FROM ai_jobs WHERE id = ? AND flow_id = ?",
                          (origin_id, flow_id),
                      ).fetchone()
                      if origin is None or origin["output_digest"] != body_digest:
                          raise TokenFlowConflictError(
                              "terminal protected segment origin evidence changed"
                          )
                      bodies.append(body)
                      originating_attempt_ids.append(origin_id)
                  if len(set(originating_attempt_ids)) != len(originating_attempt_ids):
                      raise TokenFlowConflictError(
                          "terminal protected segment origins are duplicated"
                      )
                  if (
                      terminal_attempt is not None
                      and terminal_attempt["output_digest"] is not None
                      and originating_attempt_ids[-1] != terminal_attempt["id"]
                  ):
                      raise TokenFlowConflictError(
                          "terminal output attempt no longer owns the final segment"
                      )
                  output_digest: str | None = canonical_digest(
                      {"text": "".join(bodies)}
                  )
              else:
                  output_digest = (
                      terminal_attempt["output_digest"]
                      if terminal_attempt is not None
                      else None
                  )
                  if output_digest is not None:
                      output_digest = _output_digest(output_digest)

              if flow["state"] in {"complete", "partial_terminal"}:
                  output_digest = _output_digest(output_digest)
              persisted = flow["final_output_digest"]
              if persisted is not None and persisted != output_digest:
                  raise TokenFlowConflictError(
                      "terminal flow digest evidence changed"
                  )
              return output_digest
          ''')
          if new_block in text and "def _terminal_output_digest(" in text:
              raise SystemExit(0)
          if old_block not in text:
              raise SystemExit("expected terminal digest block was not found")
          if helper_marker not in text:
              raise SystemExit("terminal digest helper marker was not found")
          text = text.replace(old_block, new_block, 1)
          text = text.replace(helper_marker, helper + helper_marker, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run focused terminalization tests
        id: focused
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          set +e
          {
            python -m ruff check \
              app/modules/ai/token_flow_service.py \
              app/modules/ai/token_flow_terminalization.py \
              tests/test_token_flow_terminalization.py
            ruff_status=$?
            if [ "$ruff_status" -ne 0 ]; then
              exit "$ruff_status"
            fi
            python -m pytest -q --tb=short \
              tests/test_token_flow_terminalization.py \
              tests/test_token_flow_service.py
          } 2>&1 | tee "$RUNNER_TEMP/terminalization-focused.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminalization-focused-diagnostics
          path: ${{ runner.temp }}/terminalization-focused.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce focused result
        if: always()
        run: test "${{ steps.focused.outputs.status }}" = "0"

      - name: Commit verified patch
        if: steps.focused.outputs.status == '0'
        run: |
          if git diff --quiet -- backend/app/modules/ai/token_flow_service.py; then
            echo "Patch already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/modules/ai/token_flow_service.py
          git commit -m "fix: derive terminal digest from protected segments"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Spec status registry gate
        run: |
          python scripts/check_spec_status.py --self-test
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python scripts/check_spec_status.py --event "$GITHUB_EVENT_PATH"
          else
            python scripts/check_spec_status.py
          fi

      - name: Manual review tooling offline gate
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: BLUECAD license-boundary import gate
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r"^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)")
          paths = list(Path("backend/app").rglob("*.py"))
          src_root = Path("frontend/src")
          if src_root.exists():
              paths.extend(path for path in src_root.rglob("*") if path.suffix in {".ts", ".tsx"})

          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")

          if violations:
              print("Forbidden in-process GPL tool imports found:")
              print("\n".join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  bluecad-geometry-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run bounded property suite and canonical canary
        id: property
        working-directory: backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -o pipefail
          set +e
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py \
            2>&1 | tee "$RUNNER_TEMP/bluecad-property-canary.log"
          status=${PIPESTATUS[0]}
          elapsed=$SECONDS
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "elapsed=$elapsed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded canary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluecad-property-canary
          path: |
            ${{ runner.temp }}/bluecad-property-canary.log
            ${{ runner.temp }}/bluecad-property-canary-actual.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce property and time gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.property.outputs.status }}" = "0"
          test "${{ steps.property.outputs.elapsed }}" -le 240
