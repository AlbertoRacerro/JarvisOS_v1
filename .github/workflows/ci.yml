name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  patch-061-readiness-wording:
    if: github.event_name == 'pull_request' && github.head_ref == 'spec/061-token-flow-definition'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact wording patch and restore canonical CI
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/061-token-flow-0.md")
          text = path.read_text(encoding="utf-8")
          old = """Status: planned full-spec draft. `docs/specs/STATUS.md` is authoritative. This
          contract must not become `ready` until 059b is implemented and merged, the exact
          post-059b execution/accounting services are rechecked, and enabled bindings have
          accepted execution-class and capability metadata."""
          new = """Status: planned full-spec draft. `docs/specs/STATUS.md` is authoritative. This
          contract must not become `ready` until 059b is implemented and merged, the exact
          post-059b execution/accounting ownership is rechecked, and the required execution-class
          and capability metadata contract is accepted as 061-owned implementation scope."""
          if text.count(old) != 1:
              raise SystemExit("status precondition block mismatch")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

          git show origin/master:.github/workflows/ci.yml > .github/workflows/ci.yml
          git diff --check
          git config user.name "JarvisOS Maintainer Actuator"
          git config user.email "actions@users.noreply.github.com"
          git add docs/specs/061-token-flow-0.md .github/workflows/ci.yml
          git diff --cached --quiet && { echo "No patch produced"; exit 1; }
          git commit -m "Clarify 061 definition readiness precondition"
          git push origin "HEAD:${HEAD_REF}"

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Spec status registry gate
        run: |
          python scripts/check_spec_status.py --self-test
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python scripts/check_spec_status.py --event "$GITHUB_EVENT_PATH"
          else
            python scripts/check_spec_status.py
          fi

      - name: Manual review tooling offline gate
        run: |
          python scripts/cheap_review.py --self-test
          python scripts/manual_review.py --self-test

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: BLUECAD license-boundary import gate
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pattern = re.compile(r"^\s*(?:import\s+(?:gmsh|FreeCAD|calculix)\b|from\s+(?:gmsh|FreeCAD|calculix)\b)")
          paths = list(Path("backend/app").rglob("*.py"))
          src_root = Path("frontend/src")
          if src_root.exists():
              paths.extend(path for path in src_root.rglob("*") if path.suffix in {".ts", ".tsx"})

          violations = []
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}: {line.strip()}")

          if violations:
              print("Forbidden in-process GPL tool imports found:")
              print("\n".join(violations))
              sys.exit(1)
          PY

      - name: Ruff
        working-directory: backend
        run: >-
          python -m ruff check app tests ../scripts/check_spec_status.py
          ../scripts/cheap_review.py ../scripts/manual_review.py

      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  bluecad-geometry-canary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      JARVISOS_BLUECAD_CANARY_PROFILE: ubuntu24-py311
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run bounded property suite and canonical canary
        id: property
        working-directory: backend
        shell: bash
        env:
          JARVISOS_BLUECAD_CANARY_ACTUAL: ${{ runner.temp }}/bluecad-property-canary-actual.json
        run: |
          set -o pipefail
          set +e
          SECONDS=0
          python -m pytest -q \
            tests/bluecad/test_geometry_property_invariants.py \
            tests/bluecad/test_manifest_determinism_canary.py \
            2>&1 | tee "$RUNNER_TEMP/bluecad-property-canary.log"
          status=${PIPESTATUS[0]}
          elapsed=$SECONDS
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "elapsed=$elapsed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded canary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluecad-property-canary
          path: |
            ${{ runner.temp }}/bluecad-property-canary.log
            ${{ runner.temp }}/bluecad-property-canary-actual.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce property and time gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.property.outputs.status }}" = "0"
          test "${{ steps.property.outputs.elapsed }}" -le 240
