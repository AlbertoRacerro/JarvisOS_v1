name: Register 071 implementation once

on:
  push:
    branches:
      - impl/071-model-scenario-dof

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/071-model-scenario-dof
          fetch-depth: 0

      - name: Update exact registry row
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/specs/STATUS.md")
          text = path.read_text(encoding="utf-8")
          old = "| 071 | ready | — | MODEL-SCENARIO-DOF-0: editable bindings, scenario runs, and degree-of-freedom inspection | 040, 043, 047 |"
          new = "| 071 | in_review | [#147](https://github.com/AlbertoRacerro/JarvisOS_v1/pull/147) | MODEL-SCENARIO-DOF-0: editable bindings, scenario runs, and degree-of-freedom inspection | 040, 043, 047 |"
          if text.count(old) != 1:
              raise SystemExit("unexpected 071 registry row")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm .github/workflows/reconcile-071-implementation-status-once.yml

      - name: Commit registry state
        shell: bash
        run: |
          git config user.name "jarvisos-registry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/specs/STATUS.md .github/workflows/reconcile-071-implementation-status-once.yml
          git commit -m "Register spec 071 implementation PR"
          git push origin HEAD:impl/071-model-scenario-dof
