name: Merge master into 062b once

on:
  pull_request:
    branches:
      - master
    types: [synchronize]

permissions:
  contents: write

jobs:
  align:
    if: github.event.pull_request.number == 167 && github.head_ref == 'impl/062b-grade-cohorts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: impl/062b-grade-cohorts
          fetch-depth: 0
      - name: Merge current master
        shell: bash
        run: |
          git config user.name "JarvisOS automation"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin master
          git merge --no-ff -X ours origin/master -m "Merge master into 062b grade cohorts"
      - name: Remove one-shot workflow and push
        shell: bash
        run: |
          git rm .github/workflows/merge-master-into-062b-once.yml
          git commit -m "Remove 062b alignment workflow"
          git push origin HEAD:impl/062b-grade-cohorts
